<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盘 · 玄命</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #9a6e2a;
    --gold-light: #c9a84c;
    --gold-dim: #b8892e;
    --ink: #fafaf7;
    --ink-2: #f4f2ec;
    --ink-3: #ede9e0;
    --ink-4: #e5e0d4;
    --stone: #d0c8b8;
    --mist: #c0b8a8;
    --text: #1a1812;
    --text-dim: #5a5448;
    --text-faint: #9a9080;
    --red: #a03030;
    --blue: #2a5a9a;
    --green: #2a7a4a;
    --white: #fafaf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(154,110,42,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(42,90,154,0.02) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(154,110,42,0.06) 40px, rgba(154,110,42,0.06) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(154,110,42,0.06) 40px, rgba(154,110,42,0.06) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    position: relative;
  }

  header::after {
    content: '☰';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%) translateY(50%);
    background: var(--ink);
    padding: 0 16px;
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 8px;
  }

  .logo-zh {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 48px;
    color: var(--gold);
    letter-spacing: 16px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 6px;
    margin-top: 8px;
  }

  /* Input Panel */
  .input-panel {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 40px;
    margin: 48px 0;
    position: relative;
  }

  .input-panel::before {
    content: '命盘推算';
    position: absolute;
    top: -1px;
    left: 40px;
    transform: translateY(-50%);
    background: var(--ink-2);
    padding: 0 16px;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
  }

  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 3px;
  }

  input, select {
    background: var(--ink-3);
    border: 1px solid var(--stone);
    border-radius: 1px;
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    font-size: 15px;
    padding: 12px 16px;
    width: 100%;
    transition: border-color 0.3s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--gold-dim);
    background: var(--ink-4);
  }

  select option {
    background: var(--ink-3);
  }

  .form-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  /* ---- 日期选择区域 ---- */
  .date-section {
    margin-bottom: 28px;
  }

  .date-section-title {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 4px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.1);
  }

  .date-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .date-tab {
    padding: 8px 20px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: -1px;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
  }

  .date-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .date-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .date-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .date-field label {
    font-size: 11px;
  }

  .date-field input {
    padding: 10px 12px;
    font-size: 15px;
  }

  .cal-btn {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .cal-btn:hover {
    background: rgba(201,168,76,0.2);
  }

  .date-tab-content { display: none; }
  .date-tab-content.active { display: block; }

  /* ---- 弹出日历 ---- */
  .cal-popup {
    position: fixed;
    z-index: 1000;
    background: var(--ink-3);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 0;
    min-width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }

  .cal-popup.open { display: block; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    background: rgba(201,168,76,0.05);
  }

  .cal-nav {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 10px;
    transition: color 0.2s;
  }

  .cal-nav:hover { color: var(--gold-light); }

  .cal-title {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 3px;
    cursor: pointer;
  }

  .cal-grid {
    padding: 12px;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }

  .cal-weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    padding: 4px;
    letter-spacing: 1px;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    text-align: center;
    padding: 7px 4px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cal-day:hover { background: rgba(201,168,76,0.15); color: var(--gold-light); }
  .cal-day.other-month { color: var(--text-faint); }
  .cal-day.selected { background: rgba(201,168,76,0.25); color: var(--gold); border: 1px solid rgba(201,168,76,0.5); }
  .cal-day.today { color: var(--gold-light); font-weight: bold; }
  .cal-day.empty { cursor: default; }

  .cal-lunar-day {
    font-size: 9px;
    color: var(--text-faint);
    margin-top: 1px;
    line-height: 1;
  }

  .cal-selected-day .cal-lunar-day { color: var(--gold-dim); }

  /* 农历日历 */
  .cal-lunar-header {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    margin-bottom: 6px;
  }

  /* 年份/月份选择模式 */
  .cal-year-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 4px;
    padding: 12px;
    max-height: 220px;
    overflow-y: auto;
  }

  .cal-year-item {
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }

  .cal-year-item:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
  .cal-year-item.selected { color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

  .cal-month-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 4px;
    padding: 12px;
  }

  .cal-month-item {
    text-align: center;
    padding: 10px 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    letter-spacing: 2px;
  }

  .cal-month-item:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
  .cal-month-item.selected { color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

  .cal-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: none;
  }
  .cal-overlay.open { display: block; }

  .sync-hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-hint::before {
    content: '⇄';
    color: var(--gold-dim);
  }

  .btn-analyze {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    letter-spacing: 8px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-analyze::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-analyze:hover::before {
    transform: translateX(0);
  }

  .btn-analyze:hover {
    color: var(--gold-light);
    box-shadow: 0 0 30px rgba(201,168,76,0.15);
  }

  .btn-analyze:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Collapsed input panel */
  .input-panel.collapsed {
    padding: 0 !important;
    margin: 12px 0;
    border-color: rgba(201,168,76,0.1);
  }
  .input-panel.collapsed::before { display: none; }
  .input-panel .collapsed-bar {
    display: none;
    padding: 10px 20px;
    cursor: pointer;
    align-items: center;
    justify-content: space-between;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .input-panel.collapsed .collapsed-bar { display: flex; }
  .input-panel.collapsed .input-inner { display: none; }
  .input-panel .collapsed-bar:hover { color: var(--gold); }
  .collapsed-expand-icon { color: var(--gold-dim); font-size: 14px; }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 60px;
  }

  .loading-char {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 40px;
    color: var(--gold);
    display: inline-block;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    margin-top: 20px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 14px;
  }

  /* Results */
  #results {
    display: none;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section */
  .section {
    margin-bottom: 40px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .section-num {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 32px;
    color: rgba(201,168,76,0.3);
    line-height: 1;
  }

  .section-title {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
  }

  /* 四柱表格 */
  .pillars-table {
    display: grid;
    grid-template-columns: 80px repeat(4, 1fr);
    border: 1px solid rgba(201,168,76,0.2);
    overflow: hidden;
  }

  .pillars-table .cell {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    font-size: 14px;
    line-height: 1.4;
  }

  .pillars-table .cell:last-child {
    border-right: none;
  }

  .pillars-table .row-label {
    background: rgba(201,168,76,0.05);
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pillars-table .col-header {
    background: rgba(201,168,76,0.08);
    color: var(--gold);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 16px;
    letter-spacing: 4px;
  }

  .tg-char {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }

  .shishen {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 1px;
    display: inline-block;
    margin-top: 4px;
  }

  /* 天干地支颜色 */
  .wuxing-wood { color: #2d7a3a; }
  .wuxing-fire { color: #aa3030; }
  .wuxing-earth { color: #8a6010; }
  .wuxing-metal { color: #3a6888; }
  .wuxing-water { color: #2a4a9a; }

  /* 五行图表 */
  .wuxing-chart {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
  }

  .pentagon-wrap {
    display: flex;
    justify-content: center;
  }

  .wuxing-bars {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .bar-item {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    gap: 12px;
    align-items: center;
  }

  .bar-label {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    text-align: center;
  }

  .bar-track {
    height: 8px;
    background: var(--ink-4);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    transition: width 1s ease;
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 100%;
    background: rgba(255,255,255,0.4);
  }

  .bar-pct {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    white-space: nowrap;
  }

  /* 大运流年 */
  .dayun-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) var(--ink-3);
  }

  .dayun-item {
    flex: 0 0 68px;
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 12px 6px 8px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    cursor: default;
  }

  .dayun-item.current {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    padding-top: 26px;
  }

  .dayun-item.current::before {
    content: '当前';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: var(--gold);
    color: var(--ink);
    font-size: 9px;
    padding: 3px 0;
    letter-spacing: 2px;
    text-align: center;
    white-space: nowrap;
  }

  .dayun-age {
    font-size: 9px;
    color: var(--text-faint);
    margin-bottom: 4px;
    letter-spacing: 0;
  }

  .dayun-gz {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    justify-content: center;
    gap: 4px;
  }

  .liuyear-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 5px;
    margin-top: 12px;
  }

  .liuyear-item {
    background: var(--ink-3);
    border: 1px solid var(--stone);
    padding: 5px 4px;
    text-align: center;
  }

  .liuyear-item.current-year {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.05);
  }

  .liuyear-year {
    font-size: 9px;
    color: var(--text-faint);
  }

  .liuyear-gz {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 16px;
    margin-top: 4px;
  }

  /* AI分析 */
  .ai-panel {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 40px;
    position: relative;
  }

  .ai-panel::before {
    content: '✦';
    position: absolute;
    top: 20px;
    right: 24px;
    color: var(--gold-dim);
    font-size: 20px;
    animation: pulse 3s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .ai-content {
    line-height: 2;
    font-size: 15px;
    color: var(--text);
    white-space: pre-wrap;
  }

  .ai-tag {
    display: inline-block;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 11px;
    padding: 2px 10px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 1px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.1);
    margin-bottom: 16px;
  }

  .info-item {
    background: var(--ink-2);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 2px;
  }

  .info-value {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    color: var(--text);
  }

  /* Error */
  .error-msg {
    background: rgba(201,76,76,0.1);
    border: 1px solid rgba(201,76,76,0.3);
    padding: 16px 24px;
    color: #e09090;
    font-size: 14px;

<script>
// ==============================
// 八字核心数据
// ==============================

const TIANGAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DIZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const WUXING_TG = ['木','木','火','火','土','土','金','金','水','水'];
const WUXING_DZ = ['水','土','木','木','土','火','火','土','金','金','土','水'];
const YINYANG_TG = ['阳','阴','阳','阴','阳','阴','阳','阴','阳','阴'];
const YINYANG_DZ = ['阳','阴','阳','阴','阳','阴','阳','阴','阳','阴','阳','阴'];
const NAYIN = [
  '海中金','炉中火','大林木','路旁土','剑锋金','山头火','涧下水','城头土',
  '白蜡金','杨柳木','泉中水','屋上土','霹雳火','松柏木','长流水','沙中金',
  '山下火','平地木','壁上土','金箔金','覆灯火','天河水','大驿土','钗钏金',
  '桑柘木','大溪水','沙中土','天上火','石榴木','大海水'
];
const CHANGSHENG = ['长生','沐浴','冠带','临官','帝旺','衰','病','死','墓','绝','胎','养'];

// 藏干
const CANGGAN = {
  '子':['壬'], '丑':['己','癸','辛'], '寅':['甲','丙','戊'],
  '卯':['乙'], '辰':['戊','乙','癸'], '巳':['丙','庚','戊'],
  '午':['丁','己'], '未':['己','丁','乙'], '申':['庚','壬','戊'],
  '酉':['辛'], '戌':['戊','辛','丁'], '亥':['壬','甲']
};

// 十二长生起始地支（对天干）
const CHANGSHENG_START = {
  '甲':2, '乙':6, '丙':2, '丁':10, '戊':2, '己':10,
  '庚':8, '辛':0, '壬':8, '癸':2
};
const YANGGAN = ['甲','丙','戊','庚','壬'];

// ==============================
// 万年历核心：求年柱月柱日柱时柱
// ==============================

// 节气数据 (简化版，以标准节气时间估算月干支起始)
// 精确版需要完整节气数据库，这里用近似算法
const JIEQI_MONTHS = [
  // 寅月从立春(约2月4日)开始
  {m:2,d:4},{m:3,d:6},{m:4,d:5},{m:5,d:6},
  {m:6,d:6},{m:7,d:7},{m:8,d:7},{m:9,d:8},
  {m:10,d:8},{m:11,d:7},{m:12,d:7},{m:1,d:6}
];

function getSolarYear(year, month, day) {
  // 返回干支年：以立春(约2月4日)为界换年
  let y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  return y;
}

function getYearGanzhi(year) {
  const idx = ((year - 4) % 60 + 60) % 60;
  return { tg: TIANGAN[idx % 10], dz: DIZHI[idx % 12], idx };
}

function getMonthGanzhi(year, month, day) {
  // FIX: 修复月柱undefined bug - lunarMonthIdx=-1时归入腊月(11)
  const solarYear = getSolarYear(year, month, day);
  const inputDate = new Date(year, month - 1, day);
  let lunarMonthIdx = -1;

  for (let i = 0; i < 12; i++) {
    const jq = JIEQI_MONTHS[i];
    const jqDate = new Date(year, jq.m - 1, jq.d);
    let nextDate;
    if (i < 11) {
      const nj = JIEQI_MONTHS[i + 1];
      const njYear = (nj.m === 1) ? year + 1 : year;
      nextDate = new Date(njYear, nj.m - 1, nj.d);
    } else {
      nextDate = new Date(year + 1, 1, 4); // 下一年立春
    }
    if (inputDate >= jqDate && inputDate < nextDate) {
      lunarMonthIdx = i;
      break;
    }
  }

  // 未匹配（极少边界情况）：归入上一年腊月
  if (lunarMonthIdx === -1) lunarMonthIdx = 11;

  const ygIdx = ((solarYear - 4) % 10 + 10) % 10;
  // 五虎遁年起月法：甲己→丙寅(2), 乙庚→戊寅(4), 丙辛→庚寅(6), 丁壬→壬寅(8), 戊癸→甲寅(0)
  const monthTgBase = ((ygIdx % 5) * 2 + 2) % 10;
  const monthTgIdx = (monthTgBase + lunarMonthIdx) % 10;
  const monthDzIdx = (2 + lunarMonthIdx) % 12;

  return {
    tg: TIANGAN[monthTgIdx],
    dz: DIZHI[monthDzIdx],
    monthIdx: lunarMonthIdx
  };
}

// 日柱：以2000年1月1日(戊午日, idx=54)为基准
// 锚点：万年历确认1995年4月26日=丁亥日(idx=23)，由此反推2000/1/1的idx=54
function getDayGanzhi(year, month, day) {
  const base = new Date(2000, 0, 1);
  const target = new Date(year, month - 1, day);
  const diff = Math.round((target - base) / 86400000);
  const idx = ((54 + diff) % 60 + 60) % 60;
  return { tg: TIANGAN[idx % 10], dz: DIZHI[idx % 12], idx };
}

function getHourGanzhi(dayTgIdx, hour) {
  // 时辰
  let dzIdx;
  if (hour === 23 || hour === 0) dzIdx = 0;
  else dzIdx = Math.floor((hour + 1) / 2) % 12;
  
  const tgBase = (dayTgIdx % 5) * 2;
  const tgIdx = (tgBase + dzIdx) % 10;
  return { tg: TIANGAN[tgIdx], dz: DIZHI[dzIdx] };
}

function getChangsheng(tg, dz) {
  const tgIdx = TIANGAN.indexOf(tg);
  const dzIdx = DIZHI.indexOf(dz);
  const startDz = CHANGSHENG_START[tg];
  const isYang = YANGGAN.includes(tg);
  let diff;
  if (isYang) {
    diff = (dzIdx - startDz + 12) % 12;
  } else {
    diff = (startDz - dzIdx + 12) % 12;
  }
  return CHANGSHENG[diff];
}

function getNayin(tgIdx, dzIdx) {
  const ganzhiIdx = Math.floor(((tgIdx) * 6 + dzIdx * 0.5)) % 30;
  // 纳音：每两个干支共一纳音
  const pairIdx = Math.floor(((tgIdx % 10) + (dzIdx % 12)) / 2) % 30;
  // 简化算法
  const idx60 = ((tgIdx % 10) * 6) % 30;
  return NAYIN[Math.abs(tgIdx * 3 + Math.floor(dzIdx/2)) % 30];
}

// 十神
function getShishen(riTg, targetTg) {
  const riWx = WUXING_TG[TIANGAN.indexOf(riTg)];
  const targetWx = WUXING_TG[TIANGAN.indexOf(targetTg)];
  const riYy = YINYANG_TG[TIANGAN.indexOf(riTg)];
  const targetYy = YINYANG_TG[TIANGAN.indexOf(targetTg)];
  const same = riYy === targetYy;
  
  const SHENG = {木:'火',火:'土',土:'金',金:'水',水:'木'};
  const KE = {木:'土',土:'水',水:'火',火:'金',金:'木'};
  
  if (targetWx === riWx) return same ? '比肩' : '劫财';
  if (SHENG[riWx] === targetWx) return same ? '食神' : '伤官';
  if (SHENG[targetWx] === riWx) return same ? '偏印' : '正印';
  if (KE[riWx] === targetWx) return same ? '偏财' : '正财';
  if (KE[targetWx] === riWx) return same ? '七杀' : '正官';
  return '';
}

// ==============================
// 计算整体命盘
// ==============================

function calcBazi(year, month, day, hour, gender) {
  // 早子时（0:00–01:00）：时柱为子时，但日柱以前一天（昨日）计
  let calcYear = year, calcMonth = month, calcDay = day;
  if (hour === 0) {
    const prev = new Date(year, month - 1, day - 1);
    calcYear  = prev.getFullYear();
    calcMonth = prev.getMonth() + 1;
    calcDay   = prev.getDate();
  }

  const yearGZ  = getYearGanzhi(calcYear);
  const monthGZ = getMonthGanzhi(calcYear, calcMonth, calcDay);
  const dayGZ   = getDayGanzhi(calcYear, calcMonth, calcDay);
  const dayTgIdx = TIANGAN.indexOf(dayGZ.tg);
  const hourGZ  = getHourGanzhi(dayTgIdx, hour);

  const pillars = [
    { label: '年柱', ...yearGZ, cs: getChangsheng(dayGZ.tg, yearGZ.dz) },
    { label: '月柱', ...monthGZ, cs: getChangsheng(dayGZ.tg, monthGZ.dz) },
    { label: '日柱', ...dayGZ, cs: '日主' },
    { label: '时柱', ...hourGZ, cs: getChangsheng(dayGZ.tg, hourGZ.dz) }
  ];

  // 五行统计
  const wuxingCount = {木:0, 火:0, 土:0, 金:0, 水:0};
  pillars.forEach(p => {
    wuxingCount[WUXING_TG[TIANGAN.indexOf(p.tg)]]++;
    wuxingCount[WUXING_DZ[DIZHI.indexOf(p.dz)]]++;
    // 藏干
    CANGGAN[p.dz]?.forEach(cg => {
      wuxingCount[WUXING_TG[TIANGAN.indexOf(cg)]] += 0.5;
    });
  });

  // 大运
  const dayuns = calcDayun(year, month, day, monthGZ.monthIdx, gender, yearGZ.tg);

  // 十神
  pillars.forEach((p, i) => {
    if (i !== 2) {
      p.shishen_tg = getShishen(dayGZ.tg, p.tg);
    } else {
      p.shishen_tg = '日主';
    }
    p.shishen_dz = CANGGAN[p.dz]?.[0] ? getShishen(dayGZ.tg, CANGGAN[p.dz][0]) : '';
    p.canggan = CANGGAN[p.dz] || [];
  });

  // 空亡
  const dayIdx = dayGZ.idx;
  const xunStart = Math.floor(dayIdx / 10) * 10;
  const kongwang = DIZHI[(xunStart % 12) + 10] + DIZHI[(xunStart % 12) + 11] || '戌亥';

  return { pillars, wuxingCount, dayuns, dayGZ, yearGZ, kongwang, gender };
}

function calcDayun(year, month, day, monthIdx, gender, yearTg) {
  // 阳年男、阴年女顺排；阴年男、阳年女逆排
  const yearTgIdx = TIANGAN.indexOf(yearTg);
  const isYangYear = yearTgIdx % 2 === 0;
  const isMale = gender === 'male';
  const shun = (isYangYear && isMale) || (!isYangYear && !isMale);

  // 起运岁数：从出生日到下一个(顺)或上一个(逆)节气的天数/3
  // 简化：用固定算法估算，通常3-8岁起运
  const qiyunAge = 3 + (Math.abs(monthIdx * 3 + day) % 5);

  const dayuns = [];
  // 月柱干支索引
  const monthTgBase = (Math.floor(((year - 4) % 10 + 10) % 10 / 1) % 5) * 2;
  const startTgIdx = TIANGAN.indexOf(TIANGAN[monthTgBase + monthIdx % 10]) ;
  
  // 重新计算月柱干支索引
  const yearSolar = getSolarYear(year, month, day);
  const ygIdx = ((yearSolar - 4) % 10 + 10) % 10;
  const mTgBase = (ygIdx % 5) * 2;
  const mTgIdx = (mTgBase + monthIdx) % 10;
  const mDzIdx = (2 + monthIdx) % 12;

  for (let i = 1; i <= 10; i++) {
    let tgIdx, dzIdx;
    if (shun) {
      tgIdx = (mTgIdx + i) % 10;
      dzIdx = (mDzIdx + i) % 12;
    } else {
      tgIdx = (mTgIdx - i + 100) % 10;
      dzIdx = (mDzIdx - i + 120) % 12;
    }
    dayuns.push({
      tg: TIANGAN[tgIdx],
      dz: DIZHI[dzIdx],
      startAge: qiyunAge + (i - 1) * 10,
      endAge: qiyunAge + i * 10 - 1,
      startYear: year + qiyunAge + (i - 1) * 10
    });
  }
  return { list: dayuns, qiyunAge };
}

function renderWuxing(wuxingCount) {
  const total = Object.values(wuxingCount).reduce((a,b) => a+b, 0);
  const items = [
    {name:'木', color:'#2d7a3a', count: wuxingCount['木']},
    {name:'火', color:'#aa3030', count: wuxingCount['火']},
    {name:'土', color:'#8a6010', count: wuxingCount['土']},
    {name:'金', color:'#3a6888', count: wuxingCount['金']},
    {name:'水', color:'#2a4a9a', count: wuxingCount['水']},
  ];

  // FIX 7: Bars with explicit inline background-color + show percentage
  let barsHtml = '';
  items.forEach(item => {
    const pct = total > 0 ? Math.round(item.count / total * 100) : 0;
    barsHtml += `
      <div class="bar-item">
        <div class="bar-label" style="color:${item.color}">${item.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background-color:${item.color};height:100%;"></div>
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;
  });
  document.getElementById('wuxingBars').innerHTML = barsHtml;

  // FIX 6: Pentagon SVG - labels placed at labelR=r+22 to avoid overlap
  // SVG viewBox 200x200, cx=100,cy=100, r=72 (leaves room for labels at r+22=94)
  const cx = 100, cy = 100, r = 72, labelR = 94;
  const angles = [-90, -18, 54, 126, 198];

  const outerPts = angles.map(a => {
    const rad = a * Math.PI / 180;
    return `${(cx + r * Math.cos(rad)).toFixed(1)},${(cy + r * Math.sin(rad)).toFixed(1)}`;
  }).join(' ');

  // Data polygon: min radius 8 so always visible
  const dataCoords = items.map((item, i) => {
    const ratio = total > 0 ? item.count / (total / 5 * 2.5) : 0;
    const pr = Math.max(8, Math.min(r * ratio, r));
    const rad = angles[i] * Math.PI / 180;
    return { x: (cx + pr * Math.cos(rad)).toFixed(1), y: (cy + pr * Math.sin(rad)).toFixed(1) };
  });

  const dataPts = dataCoords.map(p => `${p.x},${p.y}`).join(' ');

  let svgHtml = '';

  // Grid rings at 1/3, 2/3, 1
  [1/3, 2/3, 1].forEach(f => {
    const gPts = angles.map(a => {
      const rad = a * Math.PI / 180;
      return `${(cx + r*f * Math.cos(rad)).toFixed(1)},${(cy + r*f * Math.sin(rad)).toFixed(1)}`;
    }).join(' ');
    svgHtml += `<polygon points="${gPts}" fill="none" stroke="rgba(201,168,76,${f===1?0.2:0.08})" stroke-width="1"/>`;
  });

  // Axis lines
  angles.forEach(a => {
    const rad = a * Math.PI / 180;
    svgHtml += `<line x1="${cx}" y1="${cy}" x2="${(cx+r*Math.cos(rad)).toFixed(1)}" y2="${(cy+r*Math.sin(rad)).toFixed(1)}" stroke="rgba(201,168,76,0.12)" stroke-width="1"/>`;
  });

  // Data area
  svgHtml += `<polygon points="${dataPts}" fill="rgba(201,168,76,0.18)" stroke="rgba(201,168,76,0.7)" stroke-width="1.5"/>`;
  dataCoords.forEach(p => {
    svgHtml += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="rgba(201,168,76,0.8)"/>`;
  });

  // Labels at labelR - NO overlap with data area since labelR > r
  items.forEach((item, i) => {
    const rad = angles[i] * Math.PI / 180;
    const lx = (cx + labelR * Math.cos(rad)).toFixed(1);
    const ly = (cy + labelR * Math.sin(rad) + 5).toFixed(1);
    svgHtml += `<text x="${lx}" y="${ly}" text-anchor="middle" fill="${item.color}" font-size="14" font-family="'Noto Serif SC','SimSun',serif" font-weight="600">${item.name}</text>`;
  });

  document.getElementById('pentagonChart').innerHTML = svgHtml;
}

// 另外首字节最高4位=春节公历月，次4位=春节公历日
const LUNAR_INFO = [

  0x24AEB5,0x04AE4A,0x6AA5BE,0x0A5252,0x0B2546,0x5B52BB,0x0B544F,0x0B6A43,0x699BD7,0x049751,//1960-1969
  0x04A745,0x5AA7B9,0x0AD54E,0x056A43,0x4AADB7,0x09AD4C,0x74AEB1,0x04AE46,0x0A4EB9,0x6A4D4E,//1970-1979
  0x0A1642,0x5D25B6,0x0D524B,0x0DA53F,0x66AA53,0x056D48,0x04AE3C,0x4AE7B0,0x0A4D45,0x5AA5B9,//1980-1989
  0x0B244D,0x0AD442,0x6ADA36,0x055249,0x056D3D,0x4AB5B1,0x096D46,0x24ADBA,0x04AB4E,0x04A543,//1990-1999
  0x5AA5B7,0x0AD54C,0x056A40,0x4AB5B4,0x0A5748,0x652ABC,0x0D2650,0x0D5244,0x5DD4B8,0x0DA54D,//2000-2009

  0x056A44,0x49ADB8,0x04AD4C,0x04AE41,0x6AA5B5,0x0A524A,0x4B253D,0x0B5452,0x0B6A47,0x699BBB,//2040-2049

function getLunarYearData(y) {
  return LUNAR_INFO[y - 1900] || 0;
}

function getLunarLeapMonth(y) {
  return getLunarYearData(y) & 0xf;
}

function getLunarLeapDays(y) {
  const lm = getLunarLeapMonth(y);
  if (!lm) return 0;
  return (getLunarYearData(y) & 0x10000) ? 30 : 29;
}

function getLunarMonthDays(y, m) {
  return (getLunarYearData(y) & (0x10000 >> m)) ? 30 : 29;
}

function getLunarYearDays(y) {
  let sum = 348;
  for (let i = 0x8000; i > 0x8; i >>= 1) {
    sum += (getLunarYearData(y) & i) ? 1 : 0;
  }
  return sum + getLunarLeapDays(y);
}

// 农历春节对应的公历日期（通过数据包头计算）
function getLunarYearOffset(y) {
  const d = getLunarYearData(y);
  // 高24位包含春节月日
  const springMonth = (d >> 20) & 0xf || 1;
  const springDay = (d >> 16) & 0xf || 1;
  // 简化：直接用已知春节数据
  return { month: springMonth, day: springDay };
}

// 公历转农历（核心算法）
function solar2lunar(y, m, d) {
  // 基准：1900年1月31日 = 农历1900年正月初一
  const baseDate = new Date(1900, 0, 31);
  const objDate = new Date(y, m - 1, d);
  let offset = Math.round((objDate - baseDate) / 86400000);

  let dayCyl, monCyl, yearCyl;
  let leap = 0, isLeap = false;
  let lunarY = 1900, lunarM = 1, lunarD = 1;

  // 找农历年
  let i;
  for (i = 1900; i < 2050 && offset > 0; i++) {
    const daysInYear = getLunarYearDays(i);
    offset -= daysInYear;
  }
  if (offset < 0) {
    offset += getLunarYearDays(--i);
  }
  lunarY = i;

  // 找农历月
  leap = getLunarLeapMonth(i);
  isLeap = false;
  let j;
  for (j = 1; j <= 12 && offset > 0; j++) {
    if (leap > 0 && j === leap + 1 && !isLeap) {
      --j;
      isLeap = true;
      const leapDays = getLunarLeapDays(lunarY);
      offset -= leapDays;
    } else {
      offset -= getLunarMonthDays(lunarY, j);
    }
    if (isLeap && j === leap) isLeap = false;
  }
  if (offset === 0 && leap > 0 && j === leap + 1) {
    if (isLeap) { isLeap = false; } else { isLeap = true; --j; }
  }
  if (offset < 0) {
    offset += isLeap ? getLunarLeapDays(lunarY) : getLunarMonthDays(lunarY, j);
    --j;
  }
  lunarM = j;
  lunarD = offset + 1;

  return { year: lunarY, month: lunarM, day: lunarD, isLeap };
}

// 农历转公历（遍历查找）
function lunar2solar(ly, lm, ld, isLeap) {
  // 找该农历年正月初一对应公历
  const baseDate = new Date(1900, 0, 31);
  let offset = 0;
  for (let i = 1900; i < ly; i++) {
    offset += getLunarYearDays(i);
  }
  const leapM = getLunarLeapMonth(ly);
  for (let j = 1; j < lm; j++) {
    if (leapM === j) offset += getLunarLeapDays(ly);
    offset += getLunarMonthDays(ly, j);
  }
  if (isLeap) offset += getLunarMonthDays(ly, lm);
  offset += ld - 1;
  const result = new Date(baseDate.getTime() + offset * 86400000);
  return { year: result.getFullYear(), month: result.getMonth() + 1, day: result.getDate() };
}

const LUNAR_MONTH_NAMES = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY_NAMES = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function lunarMonthName(m, isLeap) {
  return (isLeap ? '闰' : '') + LUNAR_MONTH_NAMES[m - 1] + '月';
}

function lunarDayName(d) {
  return LUNAR_DAY_NAMES[d - 1] || d + '日';
}

let activeTab = 'solar';
// 日历状态
let calMode = 'solar'; // 'solar' | 'lunar'
let calViewYear = 1980, calViewMonth = 1;
let calSelectMode = 'days'; // 'days' | 'months' | 'years'

// 已选公历日期（主数据源）
let selectedSolarYear = 1980, selectedSolarMonth = 1, selectedSolarDay = 1;

function switchDateTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.date-tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'solar') || (i === 1 && tab === 'lunar'));
  });
  document.getElementById('tab-solar').classList.toggle('active', tab === 'solar');
  document.getElementById('tab-lunar').classList.toggle('active', tab === 'lunar');
}

function onSolarInput() {
  const y = parseInt(document.getElementById('solar-year').value);
  const m = parseInt(document.getElementById('solar-month').value);
  const d = parseInt(document.getElementById('solar-day').value);
  if (y >= 1900 && y <= 2050 && m >= 1 && m <= 12 && d >= 1 && d <= 31) {
    selectedSolarYear = y; selectedSolarMonth = m; selectedSolarDay = d;
    try {
      const lunar = solar2lunar(y, m, d);
      document.getElementById('solar-sync-hint').textContent =
        `对应农历：${lunar.year}年${lunarMonthName(lunar.month, lunar.isLeap)}${lunarDayName(lunar.day)}`;
      // 同步农历输入框
      document.getElementById('lunar-year').value = lunar.year;
      document.getElementById('lunar-month').value = lunar.month;
      document.getElementById('lunar-day').value = lunar.day;
      document.getElementById('lunar-sync-hint').textContent =
        `对应公历：${y}年${m}月${d}日`;
    } catch(e) {}
  }
}

function onLunarInput() {
  const ly = parseInt(document.getElementById('lunar-year').value);
  const lm = parseInt(document.getElementById('lunar-month').value);
  const ld = parseInt(document.getElementById('lunar-day').value);
  if (ly >= 1900 && ly <= 2050 && lm >= 1 && lm <= 13 && ld >= 1 && ld <= 30) {
    try {
      const solar = lunar2solar(ly, lm, ld, false);
      selectedSolarYear = solar.year; selectedSolarMonth = solar.month; selectedSolarDay = solar.day;
      document.getElementById('solar-year').value = solar.year;
      document.getElementById('solar-month').value = solar.month;
      document.getElementById('solar-day').value = solar.day;
      document.getElementById('lunar-sync-hint').textContent =
        `对应公历：${solar.year}年${solar.month}月${solar.day}日`;
      document.getElementById('solar-sync-hint').textContent =
        `对应农历：${ly}年${LUNAR_MONTH_NAMES[lm-1]}月${lunarDayName(ld)}`;
    } catch(e) {}
  }
}

// ==============================
// 日历弹窗
// ==============================

function openCal(mode) {
  calMode = mode;
  calSelectMode = 'days';
  if (mode === 'solar') {
    calViewYear = selectedSolarYear || 1980;
    calViewMonth = selectedSolarMonth || 1;
  } else {
    try {
      const lunar = solar2lunar(selectedSolarYear, selectedSolarMonth, selectedSolarDay);
      calViewYear = lunar.year;
      calViewMonth = lunar.month;
    } catch(e) {
      calViewYear = 1980; calViewMonth = 1;
    }
  }
  document.getElementById('calOverlay').classList.add('open');
  const popup = document.getElementById('calPopup');
  popup.classList.add('open');

  // Position popup near the button
  const btn = event.target.closest('.cal-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    const popW = 320;
    let left = rect.left;
    if (left + popW > window.innerWidth) left = window.innerWidth - popW - 10;
    let top = rect.bottom + 8;
    if (top + 380 > window.innerHeight) top = rect.top - 390;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }

  renderCal();
}

function closeCal() {
  document.getElementById('calOverlay').classList.remove('open');
  document.getElementById('calPopup').classList.remove('open');
}

function calNavigate(dir) {
  if (calSelectMode === 'years') {
    calViewYear += dir * 12;
  } else if (calSelectMode === 'months') {
    calViewYear += dir;
  } else {
    calViewMonth += dir;
    if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
    if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
  }
  renderCal();
}

function calToggleMode() {
  if (calSelectMode === 'days') calSelectMode = 'months';
  else if (calSelectMode === 'months') calSelectMode = 'years';
  else calSelectMode = 'days';
  renderCal();
}

function renderCal() {
  const body = document.getElementById('calBody');
  const title = document.getElementById('calTitle');

  if (calSelectMode === 'years') {
    const start = Math.floor(calViewYear / 12) * 12;
    title.textContent = `${start} – ${start + 11}`;
    let html = '<div class="cal-year-grid">';
    for (let y = start; y < start + 12; y++) {
      const sel = (calMode === 'solar' && y === selectedSolarYear) ||
                  (calMode === 'lunar' && (() => { try { return solar2lunar(selectedSolarYear,selectedSolarMonth,selectedSolarDay).year === y; } catch(e){ return false; } })());
      html += `<div class="cal-year-item${sel?' selected':''}" onclick="calSelectYear(${y})">${y}</div>`;
    }
    html += '</div>';
    body.innerHTML = html;
    return;
  }

  if (calSelectMode === 'months') {
    title.textContent = `${calViewYear}年`;
    const CN_MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const LUNAR_MONTHS_CN = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const names = calMode === 'solar' ? CN_MONTHS : LUNAR_MONTHS_CN;
    let html = '<div class="cal-month-grid">';
    for (let m = 1; m <= 12; m++) {
      const sel = (calMode === 'solar' && calViewYear === selectedSolarYear && m === selectedSolarMonth) ||
                  (calMode === 'lunar' && (() => { try { const l=solar2lunar(selectedSolarYear,selectedSolarMonth,selectedSolarDay); return l.year===calViewYear && l.month===m; } catch(e){ return false; } })());
      html += `<div class="cal-month-item${sel?' selected':''}" onclick="calSelectMonth(${m})">${names[m-1]}</div>`;
    }
    html += '</div>';
    body.innerHTML = html;
    return;
  }

  // Days view
  if (calMode === 'solar') {
    renderSolarCalDays();
  } else {
    renderLunarCalDays();
  }
}

function calSelectYear(y) { calViewYear = y; calSelectMode = 'months'; renderCal(); }
function calSelectMonth(m) { calViewMonth = m; calSelectMode = 'days'; renderCal(); }

function renderSolarCalDays() {
  const title = document.getElementById('calTitle');
  const CN_MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  title.textContent = `${calViewYear}年 ${CN_MONTHS[calViewMonth-1]}`;

  const firstDay = new Date(calViewYear, calViewMonth - 1, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const daysInPrev = new Date(calViewYear, calViewMonth - 1, 0).getDate();

  let html = `
    <div class="cal-grid">
      <div class="cal-weekdays">
        ${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
  `;

  // Prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const lunar = solar2lunar(calViewMonth === 1 ? calViewYear-1 : calViewYear, calViewMonth === 1 ? 12 : calViewMonth-1, d);
    html += `<div class="cal-day other-month" onclick="calPickSolar(${calViewMonth===1?calViewYear-1:calViewYear},${calViewMonth===1?12:calViewMonth-1},${d})">
      ${d}<span class="cal-lunar-day">${lunarDayName(lunar.day)}</span></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const isSelected = calViewYear === selectedSolarYear && calViewMonth === selectedSolarMonth && d === selectedSolarDay;
    let lunar;
    try { lunar = solar2lunar(calViewYear, calViewMonth, d); } catch(e) { lunar = {day:1}; }
    const lunarLabel = lunar.day === 1 ? lunarMonthName(lunar.month, lunar.isLeap) : lunarDayName(lunar.day);
    html += `<div class="cal-day${isSelected?' selected':''}" onclick="calPickSolar(${calViewYear},${calViewMonth},${d})">
      ${d}<span class="cal-lunar-day">${lunarLabel}</span></div>`;
  }

  // Next month fill
  const remaining = 42 - firstDay - daysInMonth;
  for (let d = 1; d <= remaining && remaining < 7; d++) {
    const lunar = solar2lunar(calViewMonth === 12 ? calViewYear+1 : calViewYear, calViewMonth === 12 ? 1 : calViewMonth+1, d);
    html += `<div class="cal-day other-month" onclick="calPickSolar(${calViewMonth===12?calViewYear+1:calViewYear},${calViewMonth===12?1:calViewMonth+1},${d})">
      ${d}<span class="cal-lunar-day">${lunarDayName(lunar.day)}</span></div>`;
  }

  html += '</div></div>';
  document.getElementById('calBody').innerHTML = html;
}

function renderLunarCalDays() {
  const title = document.getElementById('calTitle');
  title.textContent = `${calViewYear}年 ${lunarMonthName(calViewMonth, false)}`;

  const daysInMonth = getLunarMonthDays(calViewYear, calViewMonth);
  // 找本农历月初一对应的公历（用于确定星期）
  const firstSolar = lunar2solar(calViewYear, calViewMonth, 1, false);
  const firstDow = new Date(firstSolar.year, firstSolar.month - 1, firstSolar.day).getDay();

  let html = `
    <div class="cal-grid">
      <div class="cal-weekdays">
        ${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
  `;

  // Empty cells before first day
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  // Get current lunar from selected solar
  let selLunar;
  try { selLunar = solar2lunar(selectedSolarYear, selectedSolarMonth, selectedSolarDay); } catch(e) { selLunar = {}; }

  for (let d = 1; d <= daysInMonth; d++) {
    const isSelected = selLunar.year === calViewYear && selLunar.month === calViewMonth && selLunar.day === d;
    const solar = lunar2solar(calViewYear, calViewMonth, d, false);
    html += `<div class="cal-day${isSelected?' selected':''}" onclick="calPickLunar(${calViewYear},${calViewMonth},${d})">
      <span style="font-size:11px;color:var(--text-dim)">${solar.month}/${solar.day}</span>
      <span style="font-size:14px;margin-top:2px">${lunarDayName(d)}</span></div>`;
  }

  html += '</div></div>';
  document.getElementById('calBody').innerHTML = html;
}

function calPickSolar(y, m, d) {
  selectedSolarYear = y; selectedSolarMonth = m; selectedSolarDay = d;
  document.getElementById('solar-year').value = y;
  document.getElementById('solar-month').value = m;
  document.getElementById('solar-day').value = d;
  onSolarInput();
  // Update calendar view
  calViewYear = y; calViewMonth = m;
  closeCal();
}

function calPickLunar(ly, lm, ld) {
  try {
    const solar = lunar2solar(ly, lm, ld, false);
    calPickSolar(solar.year, solar.month, solar.day);
    // Update lunar fields
    document.getElementById('lunar-year').value = ly;
    document.getElementById('lunar-month').value = lm;
    document.getElementById('lunar-day').value = ld;
  } catch(e) {}
  closeCal();
}

function collapseInput(name, year, month, day) {
  const panel = document.getElementById('inputPanel');
  panel.classList.add('collapsed');
  const label = name ? `命主：${name}` : `${year}年${month}月${day}日`;
  document.getElementById('collapsedLabel').textContent = label + '　|　点击重新输入';
}

function expandInput() {
  document.getElementById('inputPanel').classList.remove('collapsed');
}

// 主流程
// ==============================

async function analyze() {
  const name = document.getElementById('name').value;
  const gender = document.getElementById('gender').value;
  const year = selectedSolarYear;
  const month = selectedSolarMonth;
  const day = selectedSolarDay;
  const hour = parseInt(document.getElementById('hour').value);
  const birthplace = document.getElementById('birthplace').value;

  const errEl = document.getElementById('errorMsg');
  errEl.style.display = 'none';

  if (!year || !month || !day) {
    errEl.textContent = '请填写完整的出生年月日';
    errEl.style.display = 'block';
    return;
  }
  if (year < 1900 || year > 2100) {
    errEl.textContent = '出生年份请填写 1900–2100 之间';
    errEl.style.display = 'block';
    return;
  }

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('loadingText').textContent = '正在推演命盘，稍候片刻…';
  document.getElementById('results').style.display = 'none';
  document.getElementById('loading').style.display = 'block';

  // 折叠输入面板
  collapseInput(name, year, month, day);

  try {
    // 1. 本地计算八字（用于大运/五行等后续推演）
    const bazi = calcBazi(year, month, day, hour, gender);
    const inputData = { name, gender, year, month, day, hour, birthplace };

    // 2. 尝试用万年历API校验年/月/日柱干支（时柱本地算）
    // API：https://api.t1qq.com/api/tool/day/time（免费，无需key）
    // 参数: y=年 m=月 d=日 h=时辰(0-23)
    // 早子时(hour=0)对应的日柱是前一天，API要查前一天
    const apiDay  = (hour === 0) ? (new Date(year, month-1, day-1)).getDate()  : day;
    const apiMonth= (hour === 0) ? (new Date(year, month-1, day-1)).getMonth()+1 : month;
    const apiYear = (hour === 0) ? (new Date(year, month-1, day-1)).getFullYear() : year;
    const apiHour = (hour === 23 || hour === 0) ? 23 : hour; // 子时传23

    let apiVerified = false;
    try {
      const apiUrl = `https://api.t1qq.com/api/tool/day/time?y=${apiYear}&m=${apiMonth}&d=${apiDay}&h=${apiHour}`;
      const resp = await Promise.race([
        fetch(apiUrl),
        new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 4000))
      ]);
      if (resp.ok) {
        const data = await resp.json();
        if (data && data.baizi) {
          // API返回的四柱干支（年/月/日），用来覆盖本地计算
          const bz = data.baizi;
          // bz.year/month/day 格式如 "乙亥" "庚辰" "丁亥"
          function parseGZ(s) {
            if (!s || s.length < 2) return null;
            const tg = s[0], dz = s[1];
            if (TIANGAN.includes(tg) && DIZHI.includes(dz)) return { tg, dz };
            return null;
          }
          const apiYear_gz  = parseGZ(bz.year);
          const apiMonth_gz = parseGZ(bz.month);
          const apiDay_gz   = parseGZ(bz.day);
          if (apiYear_gz && apiMonth_gz && apiDay_gz) {
            // 用API结果覆盖年/月/日柱的天干地支
            bazi.pillars[0].tg = apiYear_gz.tg;  bazi.pillars[0].dz = apiYear_gz.dz;
            bazi.pillars[1].tg = apiMonth_gz.tg; bazi.pillars[1].dz = apiMonth_gz.dz;
            bazi.pillars[2].tg = apiDay_gz.tg;   bazi.pillars[2].dz = apiDay_gz.dz;
            // 同步更新 dayGZ（影响十神/长生/时柱）
            bazi.dayGZ.tg = apiDay_gz.tg;
            bazi.dayGZ.dz = apiDay_gz.dz;
            bazi.dayGZ.idx = TIANGAN.indexOf(apiDay_gz.tg) + (DIZHI.indexOf(apiDay_gz.dz) >= TIANGAN.indexOf(apiDay_gz.tg) % 2 ? 0 : 0);
            // 重新计算时柱（时柱依赖日主天干）
            const newDayTgIdx = TIANGAN.indexOf(apiDay_gz.tg);
            const hourDzIdx = (hour === 23 || hour === 0) ? 0 : Math.floor((hour + 1) / 2) % 12;
            const hourTgBase = (newDayTgIdx % 5) * 2;
            bazi.pillars[3].tg = TIANGAN[(hourTgBase + hourDzIdx) % 10];
            bazi.pillars[3].dz = DIZHI[hourDzIdx];
            // 重新计算十神
            bazi.pillars.forEach((p, i) => {
              if (i !== 2) p.shishen_tg = getShishen(bazi.dayGZ.tg, p.tg);
              else p.shishen_tg = '日主';
              p.shishen_dz = bazi.canggan?.[0] ? getShishen(bazi.dayGZ.tg, (CANGGAN[p.dz]||[])[0]) : '';
            });
            apiVerified = true;
          }
        }
      }
    } catch(apiErr) {
      console.warn('万年历API查询失败，使用本地算法：', apiErr.message);
    }

    // 标记是否经过API校验
    inputData.apiVerified = apiVerified;

    // 3. 渲染全部命盘数据
    renderBasicInfo(bazi, inputData);
    renderPillars(bazi.pillars);
    renderWuxing(bazi.wuxingCount);
    renderDayun(bazi.dayuns, year);

    // 3. 隐藏 loading，先把命盘结果展示出来
    document.getElementById('loading').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    // Scroll to top of results after analysis
    setTimeout(function(){ document.getElementById('tab-basic').scrollIntoView({behavior:'smooth', block:'start'}); setNavActive('basic'); }, 200);

    // 4. AI 断语单独处理（不阻塞命盘显示）
  const baziStr = bazi.pillars.map(p => `${p.label}[${p.tg}${p.dz}]`).join(' ');
  const wxStr   = Object.entries(bazi.wuxingCount).map(([k,v]) => `${k}:${v.toFixed(1)}`).join(' ');
  
  // 月令分析辅助
  const monthPillar = bazi.pillars[1];
  const monthDzIdx = DIZHI.indexOf(monthPillar.dz);
  const monthDzName = ['子月（冬·水令）','丑月（冬末·土令）','寅月（春·木令）','卯月（春·木令）',
    '辰月（春末·土令）','巳月（夏·火令）','午月（夏·火令）','未月（夏末·土令）',
    '申月（秋·金令）','酉月（秋·金令）','戌月（秋末·土令）','亥月（冬·水令）'][monthDzIdx];
  const cangganMonth = (CANGGAN[monthPillar.dz] || []).join('、');
  const dayGZInfo = `日主${bazi.dayGZ.tg}（${WUXING_TG[TIANGAN.indexOf(bazi.dayGZ.tg)]}·${YINYANG_TG[TIANGAN.indexOf(bazi.dayGZ.tg)]}）`;

    // 滚动到结果区
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });

    document.getElementById('aiContent').innerHTML = '<span style="color:var(--text-faint)">正在推演断语，稍候…</span>';
    callAI({ name, gender, year, month, day, hour, birthplace, bazi, baziStr, wxStr, monthDzName, cangganMonth, dayGZInfo });
    // 注意：callAI 不 await，让命盘立即可见，AI 内容异步填入

  } catch(e) {
    console.error(e);
    errEl.textContent = '推演失败：' + e.message;
    errEl.style.display = 'block';
    expandInput();
    document.getElementById('loading').style.display = 'none';
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

async function callAI({ name, gender, year, month, day, hour, birthplace, bazi, baziStr, wxStr, monthDzName, cangganMonth, dayGZInfo }) {

  const genderStr = gender === 'male' ? '男' : '女';
  const pillarsDetail = bazi.pillars.map(p => {
    const cgSS = (p.canggan || []).map(cg => `${cg}(${getShishen(bazi.dayGZ.tg, cg)})`).join('、');
    return `${p.label}：${p.tg}${p.dz}　天干十神[${p.shishen_tg}]　藏干[${cgSS || '无'}]　长生[${p.cs}]`;
  }).join('\n');

  const dayunStr = bazi.dayuns.list.slice(0,8).map(d => {
    const tgSS = getShishen(bazi.dayGZ.tg, d.tg);
    const dzMainCG = CANGGAN[d.dz]?.[0];
    const dzSS = dzMainCG ? getShishen(bazi.dayGZ.tg, dzMainCG) : '';
    return `${d.startAge}岁(${d.startYear})：${d.tg}${d.dz}[干${tgSS}${dzSS?'·支'+dzSS:''}]`;
  }).join('　');

  const currentYear   = new Date().getFullYear();
  const currentYearGZ = getYearGanzhi(currentYear);
  
  // 当前大运
  const currentDayun = bazi.dayuns.list.find(d => d.startYear <= currentYear && d.startYear + 10 > currentYear) 
    || bazi.dayuns.list[0];
  const currentDayunSS_tg = currentDayun ? getShishen(bazi.dayGZ.tg, currentDayun.tg) : '';
  const currentDayunMain = currentDayun ? (CANGGAN[currentDayun.dz]?.[0] || '') : '';
  const currentDayunSS_dz = currentDayunMain ? getShishen(bazi.dayGZ.tg, currentDayunMain) : '';
  const currentDayunStr = currentDayun ? 
    `${currentDayun.tg}${currentDayun.dz}运（干${currentDayunSS_tg}·支${currentDayunSS_dz}，${currentDayun.startAge}至${currentDayun.startAge+9}岁）` : '未知';

  const prompt = `你是一位精通子平命理的命师，深研《子平真诠》《碧渊赋》《造微论》《人鉴论》《爱憎赋》《万金赋》《挈要捷驰玄妙诀》《渊源集说》《四言独步》《五行生克赋》《论八字撮要法》《格局生死引用》等经典全书。请以月令用神为纲，逐步推断以下命造，不得以星辰神煞替代格局论断。

命主资料：
姓名：${name || '未知'}　性别：${genderStr}　出生：${year}年${month}月${day}日${hour}时
出生地：${birthplace || '未知'}

四柱：${baziStr}
月令：${monthDzName}（藏干：${cangganMonth}）
${dayGZInfo}
${pillarsDetail}
五行：${wxStr}　空亡：${bazi.kongwang}
起运：${bazi.dayuns.qiyunAge}岁　大运列表：${dayunStr}
当前大运：${currentDayunStr}

请依以下八节逐一推断，每节须有实质内容，不得泛言：

【一·提纲用神】
「先观气节之浅深，后看财官之向背」——先判断节气深浅（月令本气得令程度），再论财官格局走向。
「宜向之而运背→决之贫贱；宜背之而运向→断之困穷」——用神所喜之方向与大运相背，必贫贱；与大运相顺，虽命格稍差亦可发达。
专求月令。审月令本气、中气、余气孰当令；逐一核查四柱透干（以透干为清用，透而又会支者尤重），判断用神所取。若月令自有用神，不另立外格；若月令同气（建禄月劫），则于四柱别取财官煞食为用，说明所取之由。

▸ 气候调候优先检查（碧渊赋核心法则，须于格局论断前先行验证）：
  「丙丁生于冬月，贵乎戊己当头」——火日主生冬，水旺克火，须戊己土隔水护火，否则火熄命危。
  「庚辛产于夏天，妙乎壬癸得局」——金日主生夏，火旺克金，须壬癸水泄火救金，方成大器。
  「甲乙秋生，贵宜玄武（壬癸）」——木秋生金旺克木，须壬癸水印生身护木，透丙丁伤官莫作凶看（甲乙秋生透丙丁，莫作伤看）。
  「庚辛夏长，妙用勾陈（戊己）」——金夏生火旺，须戊己土生金泄火，戊己夏产露庚辛，当为贵论。
  「丙丁水多嫌北地，逢戊己反作贵推」——火命水多，戊己土制水护火为救神，反主贵。
  「庚辛火旺怕南方，遇戊己反成荣断」——金命火旺，戊己土生金泄火为救神，反成荣贵。
  「火带水多，贵行木运；土逢木旺，荣入火乡」——水多克火宜木运（木泄水生火）；木旺克土宜火运（火泄木生土）。
  「庚逢水重，水冷金寒喜炎热；戊遇酉多，身衰气锐爱荧煌」——金水寒命喜火暖；戊土被金泄气过重，亦喜火生。
  气候不调者，指出所缺调候字及需行何方位运补足。

▸ 特殊从化格检查（优先于常规月令格，若符合则单独论断）：
  「从象」：日主无根，四柱全从一行（从财/从官杀/从印/从食），须无一点日主根气方成；从格喜行从神旺运，最忌日主根气复生。若天干有同类字或有根，不成从格。
  「化象」：甲己化土、乙庚化金、丙辛化水、丁壬化木、戊癸化火；须化神得时乘令，四支局全；有争合（二甲一己）或妒合（甲己旁有乙）则化不成；化真者名公巨卿，化假者孤儿异姓。「化成禄旺者生，化成禄绝者死」——化格命主，化神所在之长生旺地运则发，化神处绝地运则危。
  「五行专旺格」（碧渊赋）：亥卯未逢甲乙曲直格；寅午戌遇丙丁炎上格；巳酉丑庚辛从革格；申子辰壬癸润下格；辰戌丑未戊己稼穡格。此类格局喜行旺运，忌克泄太过；「太过无克制者贫贱，不及无生扶者夭折」。
  若以上皆不符合，则依常规月令取用神。

【二·格局定位与成败】
点明格局名称（正官格／财格／印格／食神格／七杀格／伤官格／阳刃格／建禄月劫格，或特殊变格）。
依成格条件逐一验证：

▸ 特殊外格检查（若符合则优先单独论断，不套常规八格）：
  归禄格（日禄居时，无官星）：「青云得路，专禄带食伤权掌閫外」，生平不喜官星，喜财运助发；归禄带食伤者主掌兵权外务。「日禄归时刑冲破害，见七杀官星空亡冲刃必死」——归禄格最忌刑冲。
  时上偏财格：别宫忌见比劫，时上偏财须孤，见兄弟则财被分夺。
  壬骑龙背（阳水叠逢辰位）：壬日多见辰，忌见壬癸巳午；喜行财官运。
  六乙鼠贵（阴木独遇子时）：乙日子时，喜财官，忌刑冲。
  井栏叉（庚日全逢润下子申辰）：忌壬癸巳午，时遇子申福减半；喜西方金运。
  六阴朝阳（六辛日逢戊子时）：嫌午未，运喜西方；季月只作印看。
  六癸日时逢寅（刑合格）：岁月怕戊己二方。
  拱禄拱贵：填实则凶（若命局中某字填实了所拱之位，格破）；「飞天拱禄嫌填实，最怕绊神来犯干」。
  若不符以上外格，则依八格常规论断：
▸ 官杀清浊辨（万金赋核心法则，须于格局定位前先行检验）：
  「官杀混杂当寿夭」——官杀双透而无法制化，主寿元有损，贫贱之命。
  「去官留杀」：命中官杀混杂，以合去或冲去正官而留七杀清格，此后「留杀去官莫逢官」——再逢官星入命则格又杂，凶。
  「留官去杀」：以合去或冲去七杀而留正官清格，此后「留官去杀莫逢杀」——再逢七杀则官杀又混，凶。
  「官杀受伤人必夭」：此处"受伤"非指食伤制杀（制化为吉），而指官杀星被冲破、合绊、空亡——命之主干断绝，格局全毁，主夭。
  清格后须守其纯，岁运不得再来污格，否则祸不旋踵。
▸ 官格：财印相辅，无伤冲，无官煞混杂则成；逢伤须佩印救之，混煞须合清则成。正官须纯一，月令得之为正，官杀混杂须行制伏（火乡制庚申混杀）方可发福；官印相生最贵，"有官无印非真官"。正官大忌刑冲破害；「正官无印，居官不显」——官印须并全方贵。
▸ 财格：身强无重劫则成；「财多生官须身健」，身弱财多则财旺生官反克身（财旺生鬼）；正财忌官星（官盗财气）、忌比劫分夺、忌身弱；偏财为众人之财，尤怕比劫分夺，财盛身弱逢官运则双重克身；「财旺生官者，贵少而富多」——财格成局多主富而非贵；「财轻勿经劫地，频见妻灾」。
▸ 印格：「有官无印非真官，有印无官反成其福」；官印双全最贵；月令得印最紧，时上次之；忌财破印（财伤印主破家离祖）；印绶多而身太旺，须官杀制衡方有用；「印旺官生，必作钧衡之任」——官印并旺主宰执重臣。
▸ 食神格：食神有气胜财官；食神居先七杀居后衣禄丰厚；身强食旺财透为贵格；忌偏印（枭神/倒食）夺食，忌官星（食神不喜官），忌身弱印多；喜财相生，喜身旺，不喜印绶（印能制食）；「食神有气胜财官，只怕伤残前外截」——食神最忌被枭印夺食或刑冲破害。
▸ 七杀格：食神制杀上也，印护杀次之；「元有制伏喜行杀旺运，元无制伏喜行制伏运」；制伏太过亦祸（制伏复行制伏，如灰烬无焰）；身旺合杀（贪合忘杀）为贵；忌财党杀，忌印去食护杀；身强有制为偏官（贵），身弱无制为七杀（凶）。「阳刃入官杀，威震边疆」——刃杀俱全主掌兵权。
▸ 伤官格：须依五行分类断之——
  「火土伤官」宜伤尽，最忌官星透露，见官祸百端；
  「金水伤官」要见官，见官反为秀气，带煞尤贵；
  「木火伤官」官有旺则可用，喜官星根深；
  「土金伤官」官去返成官，伤官与官互相制衡；
  「水木伤官」财官两见始为欢，须财官俱全方贵。
  通则：伤官务要伤尽（留一点则见官即祸）；身弱伤重须佩印；伤官生财转凶为吉；伤官忌见官（金水除外）；运逢官星而无财印救，祸不可言。
  「腊月伤官喜见官」：丑月（冬末）寒气极重，伤官见官不为祸，反借官星调候，此为特例。
  「伤官见贵者，官高而财足」——伤官佩印见官，反主官高。
  「伤官财印俱彰」的解法：身旺者取财为用（用财则去印）；身弱者取印为用（用印则去财）；用财去印、用印去财，方能发福。
▸ 阳刃格：「杀无刃不显，刃无杀不威」，刃杀俱全非常人命；「劫财阳刃有官杀，台阁之臣」——刃杀俱全且有官者主台阁重臣；宜官煞制刃，财印相随尤贵；「命有刃无杀→逢杀旺运反转为福」；「命有刃有杀→岁运再逢刃杀则大祸」；忌财旺（财生杀），忌三合会刃（刃过旺），忌伤食合官。
▸ 建禄月劫：孤官无辅不贵；须财印相随，或食伤化劫；「归禄带食伤，权掌閫外」——禄格带食伤主外任掌权。
▸ 弃命从格（须优先于常规格局判断）：
  弃命从财：日主无根，财星当令，四柱全从财气，须无一点比印方成；「弃命从财须要会财」——须财局成会；「从财忌杀」——从财格见杀则克身变凶。
  弃命从杀：日主无根，七杀当令，全局从杀；「弃命从杀须要会杀」；「从杀喜财」——财生杀旺为美；「命逢根气，命殒无猜」——从格命主忌见日主根气复生，逢则必凶。
  身弱入格：「身弱弃命要无根，官居宰辅」——身弱而从格纯粹者，反主大贵；「主衰身化得其时，位近天廷」——化格得时者同。
  「身弱徒然入格，纵发早亡」——从格或化格若根气稍存（非真从），纵有一时发达，终主早亡。
指出该命成格之处与败格隐患，有救应则说明救应之字。带忌者点明忌在何处。
「格清局正，当为台阁之臣；格局驳杂，居安须虑危」——以格局纯杂定品第大方向。

▸ 宝法四诀连锁验证（格局互克的关键检查）：
  「逢官看财」：官格中，财是否在场生官？有财则官格富贵双全；无财则官孤无辅，格降一等。
  「逢财看杀」：财格中，是否有七杀透出？有杀无制则财生杀旺，由富贵之格变贫贱之格；须见食制方解。
  「逢杀看印」：杀格中，是否有印绶化杀？有印则杀化权贵；无印无食则杀克身，凶。
  「逢印看官」：印格中，是否有官星生印？有官则官印相生，格局清贵；无官则印格孤立，清而不贵。
  依上述四诀，对此命格局作一轮复验，补充初步判断的遗漏。

▸ 生克连环链判断（最高层命格诊断）：
  「富贵链」：财→生官→生印→生身，四环俱通且无冲破，富贵双全，格局最高。
  「凶穷链」：比劫/财→党杀→攻身，三环俱动且无食制，凶穷两逼，最下格。
  须识别此命属何种连环结构，以定命格大势。
  「富莫富于纯粹，贫莫贫于战争；贵莫贵于秀实，贱莫贱于反伤」——以此定命格品质总纲。

▸ 去官留杀 vs 去杀留官辨：
  「去杀留官」→论福，官纯则贵；
  「去官留杀」→有威权，以杀化权则贵（须有制/印）；
  二者皆须看哪一方根气更强、更有制化，不可一律以官为贵、以杀为凶。

▸ 合官/合杀的特殊处理：「合官非为贵取」（官被合则以官论贵须重审，合后官星失用则格降）；「合杀莫作凶推」（杀被合则杀化为闲神，凶势大减，甚至转化为「贪合忘杀」之福）。须重新定格，勿沿用合前之判断。

【三·用神旺衰与喜忌】
以月令、通根、长生帝旺综合断日主旺衰（注意：阳长生有力，阴长生稍弱；逢库为根，不必逢冲；得比肩不如通根）。明确喜用神与忌神。
特别注意干支有别：天干动而有为（透出即用），地支静以待用（须会合透清方发动）；支中暗藏之神，逢运透干方见其验。

▸ 「四柱元有病，要去病；不去病不发」：指出此命之「病」（忌神）在何处，「药」（克制忌神之字）是否已存于命，若无则需运补。「无伤不贵，有病者奇」——有病有药者反而成就非凡，无忌神则格局平淡。
▸ 格局品质口诀（杂论）：「一格二格，非卿即相；三格四格，财官不纯，非隶卒多是九流」——格局越杂越降品。「入格清奇者富，入格不成者贫」；「源清者其流必远，本浊者所作无成」；「八字超群，不贵则当大富；五行驳杂，居安可不虑危」。
▸ 官杀混杂判断：月令正官而时干透偏官（或反之），则混杂须清；清法：以合去一方（如乙合庚留辛，或丙合辛留庚），或以食伤制杀存官；混而不清者，降格论断。
▸ 倒食（偏印）克食神：如甲见壬克丙食神，主有始无终、财源屡败、福浅寿薄；用食神格或财格者，须先检查是否有偏印克食之字。
▸ 劫财辨：五阳见五阴为败财（克妻害子），五阴见五阳为劫财（破耗、防小人，不克妻）；须区分论断。
▸ 日主强弱总诀：「天元虽旺若无依倚是常人；日主太柔纵遇财官为寒士；身旺无依不迁祖便死外地」；「衰则变官为鬼，旺则化鬼为官」——日主旺衰直接决定官星性质。「日干旺而灾咎寡，财命衰而惆怅多」；「太过宜脱剥，不及喜生扶」。
▸ 五行生克精义（五行生克赋）：死木宜活水濡；顽金喜火煅；火隔水不能熔金（水多隔绝，金不受克）；金沉水岂能克木（金沉于水，失克木之力）；活木忌埋根之铁（根被金克则折）；水寒不流，木寒不发，土寒不生，火寒不烈，金寒不熔——须调候温养。北金恋水沉形（水多金沉无用）；南木飞灰脱体（火旺木焚失根）；东水旺木以枯源（木盛水缩失生）；西土实金虚己（金多土散）；火因土晦（土多火埋）。五行贵在中和，须以此精义辨别五行质量，而非单以数量多寡论强弱。
▸ 四言独步要诀（格局精要）：月令见禄不住祖屋，一见财官自然发福；财官临库不冲不发；提纲有用最怕刑冲，冲运则缓冲用则凶；「先财后印反成其福，先印后财反成其辱」——财印在柱中出现的先后顺序决定吉凶方向；「印绶根轻旺中显达，印绶根深旺中不发」——印绶深根反碍发达，须细辨。
▸ 特殊日柱检查（若适用则注明）：
  日贵（丁酉、丁亥、癸巳、癸卯）：忌刑冲破害、空亡；主仁德纯粹；刑冲则贵人生怒反祸。
  日德（甲寅、戊辰、丙辰、庚辰、壬戌）：忌财官、刑冲、魁罡；主慈善福厚；「日德见魁罡，遇刑冲贫寒之士」。
  魁罡（壬辰、庚戌、戊戌、庚辰）：叠见掌大权；忌财官（一见祸至）；「魁罡见财星，总得地禄食之人」。
  金神（癸酉、己巳、乙丑时）：「金神入火逢刃杀，贵而无疑」；喜火制入火乡为贵；忌水乡。
  坐财日（乙巳、戊辰、庚午、辛未、丙子、丁丑、戊寅、己卯、辛巳、壬午、甲申、乙酉等）：日坐财官，妻贤多助，富贵有基。

【四·调候参验】
结合生月气候审五行寒燥，以「既济」为贵：
▸ 冬木：冻水不生木，喜火调候；身印两旺透食尤为秀气；透官难必贵。「壬癸路经南域，主健财贵堪图」——水命行南方火运，财贵可期。
▸ 夏木：木火通明，不利见官；伤官佩印其秀百倍；燥土不灵。「甲乙运入西方，身旺功名可许」——木命行西方金运，身旺则功名有望。
▸ 三冬水冷金寒：得火相扶，莫作等闲；壬日午位号「禄马同乡」，癸日巳宫乃「财官双美」。「庚逢水重，水冷金寒喜炎热」——金水寒命，火运为救。

    const response = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) {
      const err = await response.text();
      throw new Error("Worker 返回错误: " + err);
    }

    const data = await response.json();
    if (!data.result) throw new Error(data.error || "Worker 返回空内容");

    renderAiContent(data.result);
    // 不改变导航高亮，保持用户当前浏览位置

  } catch(e) {
    document.getElementById("aiContent").innerHTML =
      "<div style=\"color:#c08080;line-height:1.8\"><b>断语推演失败</b><br>" + e.message + "</div>";
  }
}


// ===== SIDEBAR NAV + SCROLL SYNC =====
// Click nav button → smooth scroll to that section
function switchTab(name) {
  const el = document.getElementById('tab-' + name);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  // Also update active state immediately
  setNavActive(name);
}

function setNavActive(name) {
  document.querySelectorAll('.side-nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('.side-nav-btn[data-target="tab-' + name + '"]');
  if (btn) btn.classList.add('active');
}

// Wire up nav button clicks
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.side-nav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      const target = btn.getAttribute('data-target');
      const name = target.replace('tab-', '');
      switchTab(name);
    });
  });
});

// Scroll sync: observe which section is in view and highlight nav
(function() {
  var observer;
  function initScrollSync() {
    const sections = ['tab-basic', 'tab-dayun', 'tab-ai'];
    const navBtns = {};
    sections.forEach(function(id) {
      navBtns[id] = document.querySelector('.side-nav-btn[data-target="' + id + '"]');
    });

    if (observer) observer.disconnect();
    observer = new IntersectionObserver(function(entries) {
      // Find the topmost visible section
      var best = null, bestY = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const rect = entry.boundingClientRect;
          if (rect.top < bestY) { bestY = rect.top; best = entry.target.id; }
        }
      });
      if (best) {
        sections.forEach(function(id) {
          if (navBtns[id]) navBtns[id].classList.toggle('active', id === best);
        });
      }
    }, { threshold: 0.15, rootMargin: '-60px 0px -40% 0px' });

    sections.forEach(function(id) {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  }

  // Re-init when results become visible
  var resultsEl = document.getElementById('results');
  if (resultsEl) {
    var resObs = new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        if (m.type === 'attributes' && m.attributeName === 'style') {
          if (resultsEl.style.display !== 'none') {
            setTimeout(initScrollSync, 100);
          }
        }
      });
    });
    resObs.observe(resultsEl, { attributes: true });
  }
})();

// ── AI 断语渲染：果前因后，点击展开/收折 ─────────────────────────────────
function renderAiContent(rawText) {
  var el = document.getElementById('aiContent');
  if (!rawText || !rawText.trim()) {
    el.innerHTML = '<span style="color:var(--text-faint)">（未获得分析结果）</span>';
    return;
  }

  var lines = rawText.split('\n');
  var outMain = '', outDayun = '';
  var inDayun = false;
  var dayunKeys = ['大运', '流年', '运程', '运势'];
  // 去重：防止模型重复输出同一章节
  var seenSections = {};

  for (var ri = 0; ri < lines.length; ri++) {
    var line = lines[ri].trim();
    if (!line) continue;

    var hm = line.match(/^「(.+?)」(.*)$/);  // unused
    var hm2 = line.match(/^【(.+?)】(.*)$/);
    if (hm2) {
      var title = hm2[1];
      if (seenSections[title]) continue;
      seenSections[title] = true;
      inDayun = dayunKeys.some(function(k){ return title.indexOf(k) >= 0; });
      var titleHtml = '<div class="ai-section-title">' + title + '</div>';
      var restHtml = hm2[2].trim() ? (buildItem(hm2[2].trim()) || '') : '';
      if (inDayun) { outDayun += titleHtml + restHtml; }
      else         { outMain  += titleHtml + restHtml; }
      continue;
    }
    var itemHtml = buildItem(line);
    if (!itemHtml) continue;
    if (inDayun) { outDayun += itemHtml; }
    else         { outMain  += itemHtml; }
  }

  el.innerHTML = outMain;

  var dayunEl  = document.getElementById('aiDayunContent');
  var dayunSec = document.getElementById('aiDayunSection');
  if (dayunEl && outDayun) {
    dayunEl.innerHTML = outDayun;
    if (dayunSec) dayunSec.style.display = 'block';
    dayunEl.querySelectorAll('.ai-item.has-yin .ai-guo').forEach(function(g){
      g.addEventListener('click', function(){ g.closest('.ai-item').classList.toggle('open'); });
    });
  }
  el.querySelectorAll('.ai-item.has-yin .ai-guo').forEach(function(guo) {
    guo.addEventListener('click', function() {
      guo.closest('.ai-item').classList.toggle('open');
    });
  });
}

function buildItem(line) {
  // 过滤废话（无实质内容的断语）
  var stripped = line.replace(/[（(][^）)]*[）)]/g, '');
  var uselessPatterns = [
    '没有特别值得注意','没有特别需要注意','没有特别突出',
    '比较平淡，没有','无特殊从化','没有明显特点','没有特别',
    '无需特别','无特别关注'
  ];
  for (var i = 0; i < uselessPatterns.length; i++) {
    if (stripped.indexOf(uselessPatterns[i]) >= 0) return '';
  }

  // 找第一个全角（或半角( — 括号前是黑字结论，括号内到最后一个）是灰字依据
  var idxFull = line.indexOf('\uff08');
  var idxHalf = line.indexOf('(');
  var endFull = line.lastIndexOf('\uff09');
  var endHalf = line.lastIndexOf(')');

  // 选最早出现的开括号
  var idx = -1, end = -1;
  if (idxFull >= 0 && (idxHalf < 0 || idxFull <= idxHalf)) {
    idx = idxFull; end = endFull;
  } else if (idxHalf >= 0) {
    idx = idxHalf; end = endHalf;
  }

  if (idx > 0 && end > idx) {
    // guo = 括号前 + 括号后（尾部补充文字也留在黑字）
    var before = line.slice(0, idx).replace(/[。，、；：\s]+$/, '');
    var after  = line.slice(end + 1).replace(/^[，、；：\s]+/, '');
    var guo = before + (after ? after : '');
    var yin = line.slice(idx + 1, end).trim();
    if (guo && yin) {
      return '<div class="ai-item has-yin">' +
        '<div class="ai-guo"><span class="ai-arrow">&#9658;</span><span>' + guo + '</span></div>' +
        '<div class="ai-yin">' + yin + '</div>' +
        '</div>';
    }
  }
  // 无括号：清理残余括号后直接显示
  var cleaned = line.replace(/[（(][^）)]*[）)]/g, '').replace(/[。，、；\s]+$/, '');
  if (!cleaned) return '';
  return '<div class="ai-item"><div class="ai-guo">' +
    '<span style="display:inline-block;width:16px;flex-shrink:0"></span>' +
    '<span>' + cleaned + '</span></div></div>';
}
