<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字命盘 · 玄命</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #9a6e2a;
    --gold-light: #c9a84c;
    --gold-dim: #b8892e;
    --ink: #fafaf7;
    --ink-2: #f4f2ec;
    --ink-3: #ede9e0;
    --ink-4: #e5e0d4;
    --stone: #d0c8b8;
    --mist: #c0b8a8;
    --text: #1a1812;
    --text-dim: #5a5448;
    --text-faint: #9a9080;
    --red: #a03030;
    --blue: #2a5a9a;
    --green: #2a7a4a;
    --white: #fafaf7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ink);
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(154,110,42,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 80%, rgba(42,90,154,0.02) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(154,110,42,0.06) 40px, rgba(154,110,42,0.06) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(154,110,42,0.06) 40px, rgba(154,110,42,0.06) 41px);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  header {
    padding: 40px 0 32px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    position: relative;
  }

  header::after {
    content: '☰';
    position: absolute;
    bottom: -1px;
    left: 50%;
    transform: translateX(-50%) translateY(50%);
    background: var(--ink);
    padding: 0 16px;
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 8px;
  }

  .logo-zh {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 48px;
    color: var(--gold);
    letter-spacing: 16px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(201,168,76,0.3);
  }

  .logo-sub {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 6px;
    margin-top: 8px;
  }

  /* Input Panel */
  .input-panel {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 40px;
    margin: 48px 0;
    position: relative;
  }

  .input-panel::before {
    content: '命盘推算';
    position: absolute;
    top: -1px;
    left: 40px;
    transform: translateY(-50%);
    background: var(--ink-2);
    padding: 0 16px;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
  }

  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: var(--gold);
    border-style: solid;
  }
  .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
  .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
  .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
  .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  label {
    font-size: 12px;
    color: var(--gold-dim);
    letter-spacing: 3px;
  }

  input, select {
    background: var(--ink-3);
    border: 1px solid var(--stone);
    border-radius: 1px;
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
    font-size: 15px;
    padding: 12px 16px;
    width: 100%;
    transition: border-color 0.3s;
    outline: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus {
    border-color: var(--gold-dim);
    background: var(--ink-4);
  }

  select option {
    background: var(--ink-3);
  }

  .form-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 24px;
    margin-bottom: 24px;
  }

  /* ---- 日期选择区域 ---- */
  .date-section {
    margin-bottom: 28px;
  }

  .date-section-title {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 4px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .date-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(201,168,76,0.1);
  }

  .date-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .date-tab {
    padding: 8px 20px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    margin-bottom: -1px;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
  }

  .date-tab.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .date-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: end;
  }

  .date-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .date-field label {
    font-size: 11px;
  }

  .date-field input {
    padding: 10px 12px;
    font-size: 15px;
  }

  .cal-btn {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .cal-btn:hover {
    background: rgba(201,168,76,0.2);
  }

  .date-tab-content { display: none; }
  .date-tab-content.active { display: block; }

  /* ---- 弹出日历 ---- */
  .cal-popup {
    position: fixed;
    z-index: 1000;
    background: var(--ink-3);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 0;
    min-width: 300px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    display: none;
  }

  .cal-popup.open { display: block; }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    background: rgba(201,168,76,0.05);
  }

  .cal-nav {
    background: none;
    border: none;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    padding: 4px 10px;
    transition: color 0.2s;
  }

  .cal-nav:hover { color: var(--gold-light); }

  .cal-title {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 15px;
    color: var(--gold);
    letter-spacing: 3px;
    cursor: pointer;
  }

  .cal-grid {
    padding: 12px;
  }

  .cal-weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }

  .cal-weekday {
    text-align: center;
    font-size: 11px;
    color: var(--text-faint);
    padding: 4px;
    letter-spacing: 1px;
  }

  .cal-days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day {
    text-align: center;
    padding: 7px 4px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.15s;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cal-day:hover { background: rgba(201,168,76,0.15); color: var(--gold-light); }
  .cal-day.other-month { color: var(--text-faint); }
  .cal-day.selected { background: rgba(201,168,76,0.25); color: var(--gold); border: 1px solid rgba(201,168,76,0.5); }
  .cal-day.today { color: var(--gold-light); font-weight: bold; }
  .cal-day.empty { cursor: default; }

  .cal-lunar-day {
    font-size: 9px;
    color: var(--text-faint);
    margin-top: 1px;
    line-height: 1;
  }

  .cal-selected-day .cal-lunar-day { color: var(--gold-dim); }

  /* 农历日历 */
  .cal-lunar-header {
    display: grid;
    grid-template-columns: repeat(7,1fr);
    margin-bottom: 6px;
  }

  /* 年份/月份选择模式 */
  .cal-year-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 4px;
    padding: 12px;
    max-height: 220px;
    overflow-y: auto;
  }

  .cal-year-item {
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
  }

  .cal-year-item:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
  .cal-year-item.selected { color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

  .cal-month-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 4px;
    padding: 12px;
  }

  .cal-month-item {
    text-align: center;
    padding: 10px 4px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    letter-spacing: 2px;
  }

  .cal-month-item:hover { background: rgba(201,168,76,0.15); color: var(--gold); }
  .cal-month-item.selected { color: var(--gold); border: 1px solid rgba(201,168,76,0.4); }

  .cal-overlay {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: none;
  }
  .cal-overlay.open { display: block; }

  .sync-hint {
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 8px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sync-hint::before {
    content: '⇄';
    color: var(--gold-dim);
  }

  .btn-analyze {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.08));
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    letter-spacing: 8px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .btn-analyze::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.2), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-analyze:hover::before {
    transform: translateX(0);
  }

  .btn-analyze:hover {
    color: var(--gold-light);
    box-shadow: 0 0 30px rgba(201,168,76,0.15);
  }

  .btn-analyze:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Collapsed input panel */
  .input-panel.collapsed {
    padding: 0 !important;
    margin: 12px 0;
    border-color: rgba(201,168,76,0.1);
  }
  .input-panel.collapsed::before { display: none; }
  .input-panel .collapsed-bar {
    display: none;
    padding: 10px 20px;
    cursor: pointer;
    align-items: center;
    justify-content: space-between;
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }
  .input-panel.collapsed .collapsed-bar { display: flex; }
  .input-panel.collapsed .input-inner { display: none; }
  .input-panel .collapsed-bar:hover { color: var(--gold); }
  .collapsed-expand-icon { color: var(--gold-dim); font-size: 14px; }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 60px;
  }

  .loading-char {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 40px;
    color: var(--gold);
    display: inline-block;
    animation: spin 3s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .loading-text {
    margin-top: 20px;
    color: var(--text-dim);
    letter-spacing: 4px;
    font-size: 14px;
  }

  /* Results */
  #results {
    display: none;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Section */
  .section {
    margin-bottom: 40px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .section-num {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 32px;
    color: rgba(201,168,76,0.3);
    line-height: 1;
  }

  .section-title {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: 6px;
  }

  /* 四柱表格 */
  .pillars-table {
    display: grid;
    grid-template-columns: 80px repeat(4, 1fr);
    border: 1px solid rgba(201,168,76,0.2);
    overflow: hidden;
  }

  .pillars-table .cell {
    padding: 16px 12px;
    text-align: center;
    border-right: 1px solid rgba(201,168,76,0.1);
    border-bottom: 1px solid rgba(201,168,76,0.1);
    font-size: 14px;
    line-height: 1.4;
  }

  .pillars-table .cell:last-child {
    border-right: none;
  }

  .pillars-table .row-label {
    background: rgba(201,168,76,0.05);
    color: var(--gold-dim);
    font-size: 12px;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pillars-table .col-header {
    background: rgba(201,168,76,0.08);
    color: var(--gold);
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 16px;
    letter-spacing: 4px;
  }

  .tg-char {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }

  .shishen {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 1px;
    display: inline-block;
    margin-top: 4px;
  }

  /* 天干地支颜色 */
  .wuxing-wood { color: #2d7a3a; }
  .wuxing-fire { color: #aa3030; }
  .wuxing-earth { color: #8a6010; }
  .wuxing-metal { color: #3a6888; }
  .wuxing-water { color: #2a4a9a; }

  /* 五行图表 */
  .wuxing-chart {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 32px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
  }

  .pentagon-wrap {
    display: flex;
    justify-content: center;
  }

  .wuxing-bars {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .bar-item {
    display: grid;
    grid-template-columns: 40px 1fr 40px;
    gap: 12px;
    align-items: center;
  }

  .bar-label {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    text-align: center;
  }

  .bar-track {
    height: 8px;
    background: var(--ink-4);
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    transition: width 1s ease;
    position: relative;
  }

  .bar-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 100%;
    background: rgba(255,255,255,0.4);
  }

  .bar-pct {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    white-space: nowrap;
  }

  /* 大运流年 */
  .dayun-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--gold-dim) var(--ink-3);
  }

  .dayun-item {
    flex: 0 0 68px;
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 12px 6px 8px;
    text-align: center;
    transition: all 0.3s;
    position: relative;
    cursor: default;
  }

  .dayun-item.current {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
    padding-top: 26px;
  }

  .dayun-item.current::before {
    content: '当前';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    background: var(--gold);
    color: var(--ink);
    font-size: 9px;
    padding: 3px 0;
    letter-spacing: 2px;
    text-align: center;
    white-space: nowrap;
  }

  .dayun-age {
    font-size: 9px;
    color: var(--text-faint);
    margin-bottom: 4px;
    letter-spacing: 0;
  }

  .dayun-gz {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 22px;
    color: var(--text);
    margin-bottom: 4px;
    display: flex;
    justify-content: center;
    gap: 4px;
  }

  .liuyear-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 5px;
    margin-top: 12px;
  }

  .liuyear-item {
    background: var(--ink-3);
    border: 1px solid var(--stone);
    padding: 5px 4px;
    text-align: center;
  }

  .liuyear-item.current-year {
    border-color: var(--gold-dim);
    background: rgba(201,168,76,0.05);
  }

  .liuyear-year {
    font-size: 9px;
    color: var(--text-faint);
  }

  .liuyear-gz {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 16px;
    margin-top: 4px;
  }

  /* AI分析 */
  .ai-panel {
    background: var(--ink-2);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 40px;
    position: relative;
  }

  .ai-panel::before {
    content: '✦';
    position: absolute;
    top: 20px;
    right: 24px;
    color: var(--gold-dim);
    font-size: 20px;
    animation: pulse 3s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .ai-content {
    line-height: 2;
    font-size: 15px;
    color: var(--text);
    white-space: pre-wrap;
  }

  .ai-tag {
    display: inline-block;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    font-size: 11px;
    padding: 2px 10px;
    letter-spacing: 3px;
    margin-bottom: 16px;
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
  }

  /* Info grid */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
    gap: 1px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.1);
    margin-bottom: 16px;
  }

  .info-item {
    background: var(--ink-2);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 2px;
  }

  .info-value {
    font-family: 'Noto Serif SC', 'SimSun', '宋体', serif; font-weight: 600;
    font-size: 18px;
    color: var(--text);
  }

  /* Error */
  .error-msg {
    background: rgba(201,76,76,0.1);
    border: 1px solid rgba(201,76,76,0.3);
    padding: 16px 24px;
    color: #e09090;
    font-size: 14px;

<div class="container">

  <!-- Header -->

  <!-- Input Panel -->

      <!-- 公历 -->
      <div id="tab-solar" class="date-tab-content active">

    </div><!-- end side-content -->
    </div><!-- end results-with-nav -->
  </div><!-- end results -->

</div>

const QTBJ_DATA = {"甲1":"初春尚有馀寒，得丙癸逢，富贵双全。癸藏丙透，名寒木向阳，主大富贵。倘风水不及，亦不失儒林俊秀。如无丙癸，平常人也。","甲2":"庚金得所，名阳刃驾杀，可云小贵，异途显达，或主武职，但要财资之。柱中逢才，英雄独压万人。若见癸水，困了才杀，主为光棍，重刃必定遭凶。性情凶暴。书曰：木旺宜火之光辉，秋闱可试。木向春生，处世安然有寿。日主无依，却喜运行才地。","甲3":"木气相竭。先取庚金，次用壬水。庚壬两透，一榜堪图。但要运用相生，风水阴德，方许富贵。或见一二庚金，独取壬水。壬透清秀之人，才学必富。或天乾透出二丙，庚藏支下，此钝斧无钢，富贵难求。若有壬癸破火，堪作秀才。或柱中全无一水，戊己透干，支成土局，又作弃命从才，因人而致富贵，妻子有能。或见戊己，及比劫多者，名为杂气夺才，此人劳碌到老，无驭内之权。女命合此，女掌男权，贤能内助，若比劫重见，淫恶不堪。或支成金局，方可用丁，不然，三月无用丁之法。惟有先庚后壬取用。书曰：甲乙生寅卯，庚辛干上逢，离南推富贵，坎地却为凶。","甲4":"四月甲木退气，丙火司权，先癸后丁。庚金太多，甲反受病。若得壬水，方配得中和，此人性好清高，假装富贵。即荫袭显达，终日好作祸乱，善辨巧谈，喜作诗文。此理最验。如一庚二丙，稍有富贵。金多火多，又为下格。或癸丁与庚齐透天干，此命可言科甲，即风水浅薄，亦有选拔之才。癸水不出，虽有庚金丁火，不过富中取贵异途官职而已。壬透可云一富，若全无点水，又无庚金丁火，一派丙戊，此无用之人也。","甲5":"木性虚焦，一理共推。五月先癸后丁庚金次之。六月三伏生寒，丁火退气。先丁后庚，无癸亦可。或五月乏癸，用丁亦可，要运行北地为隹。总之五六月用丁火，虽运行北地，不致于死。却不利运行火地，号曰木化成灰必死。行西程又不吉，号曰伤官遇杀，不测灾来，惟东方则吉，北方次之。此五六月用丁之说也。凡用神太多，不宜克制，须泄之为妙。","甲6":"六月甲木，木性虚焦，三伏生寒，丁火退气，先丁后庚，无癸亦可。六月庚丁两透，亦为上上之格，用神既透，木火通明，自然大富大贵。或丁火太多，癸水亦多，反作平人。若柱中多金，名曰杀重身轻，先富后贫。或满柱丙火，又加丁火，不见官杀，谓之伤官伤尽最为奇，反成清贵，定主才学过人，科甲有望。凡用神太多，不宜克制，须泄之为妙。六月尤可，五月决不可。","甲7":"丁火为尊，庚金次之，庚金不可少。火隔水不能熔金，故丁火熔金，必赖甲木引助，方成洪炉。若有癸水阻隔，便灭丁火，壬水无碍，且能合丁，但须见戊土，方可制水存火。","甲8":"木囚金旺。丁火为先，次用丙火，庚金再次。一丁一庚，科甲定显。癸水一透，科甲不全。丙庚两透，富大贵小。丙丁全无，僧道之命。丙透无癸，富贵双全。有癸制丙，寻常之人。支成火局，可许假贵，戊己一透，可作富翁。或支成金局，乾露庚金，为木被金伤，必主残疾，得丙丁破金，亦主老来暗疾。或支成木局，乾透比劫，反取庚金为先，次用丁火。","甲9":"木星凋零，独爱丁火，壬癸滋扶，丁壬癸透，戊己亦透，此命配得中和，可许一榜。庚金得所，科甲定然。或见一二比肩，无庚金制之，平常人也。倘运不得用，贫无立锥。一命，甲辰、甲戌、甲辰、甲戌、身伴明君，富贵寿考，此为天元一气，又名一才一用。遇比用才，专取季土。或见庚丙，可许入泮，白手成家。用火者，木妻火子，子肖妻贤。或四柱木多，用丙用丁，皆不足异，端用庚金为妙。凡四季甲木，总不外乎庚金。譬如木为犁，能疏季土，非庚金为犁嘴，安能疏土虽用丙丁，癸庚决不可少也。九月却不取土妻庚子，当取水妻木子。凡甲木，多见戊己，定作弃命从才而看。从才格，取火妻土子。或见一派丙丁伤金，不过假道斯文，有壬癸破了丙丁，技艺之流。无壬癸破火，支又成火局，乃为枯朽之木，有庚亦何能为力，定作孤贫下贱之辈，男女一理。或有假伤官，得地逢生，此正合甲乙秋生贵元武之说，用水制伤官者，以金为妻，水为子。或丁戊俱多，总不见水，又为伤官生财格，亦可云富贵，此格取火为妻，土为子。凡甲多庚透，大贵。庚藏，小贵。若柱中多庚，则又以丁为奇，富贵人也。如庚申年、丙戌月、甲申日、壬申时，此主功名显达，有文学。若无庚丙年月，又无火星出乾，虽曰好学，终困名场","甲10":"庚丁为要，丙火次之。忌壬水泛身，须戊土制之。若庚丁两透，又加戊出乾，名曰去浊留清，富贵之极，即乏丁火，亦稍有富贵。或甲多制戊，庚金无根，平常人也。庚戊若透，虽出比劫，必定富而寿。或多比劫，只一庚出乾，坐禄逢生乃为舍丁从庚，略富贵。或支见申亥，戊己得所，以救庚丁，可许科甲。若单己透，其力弱小，不过贡监而已。用庚，土妻金子。用丁，木妻火子。","甲11":"木性生寒，丁先庚后，丙火佐之。癸水司权，为火金之病。庚丁两透，支见巳寅，科甲有准，风水不及，选拔有之。若癸透伤丁。无戊己辅救，残疾之人。或壬水重出，丁火全无者，庸人也，得丙方妙。或支成水局，加以壬透，名为水泛木浮，死无棺木。总之十一月甲木，为寒枝，不比春木清茂，端取庚丁。透壬无丙，不过刀笔异途，武职有验。用庚，土妻金子。用火，木妻火子。","甲12":"天寒气冻，木性极寒，无生发之象，先用庚劈甲，方引丁火始得木火有通明之象，故丁次之。庚丁两透，科甲恩封。庚透丁藏，小贵。丁透庚藏，小富贵。无庚者，贫贱。无丁者，寒儒。或有丁透重重，亦是富贵中人，但须比肩，能发丁之焰，自有德业才能。如无比肩，寻常之士，稍有衣食而已。或支多见水，即有比肩，亦属平常。总之腊月甲木，虽有庚金，丁不可少。乏庚略可，乏丁无用。经云：甲木无根，男女夭寿。","乙1":"必须用丙，因天气尤有馀寒，非丙不暖，虽有癸水，恐凝寒气，故以丙火为先，癸水次之。丙癸两透，科甲定然，或有丙无癸门户阐扬。或丙多乏癸，名曰春旱。独阳不长，浊富之人。或丙少癸多，又为困丙，终为寒士。或癸己多见，为湿土之木皆下格。用丙者，木妻火子。用癸水见火多者，金妻水子。","乙2":"阳气渐升，木不寒矣，以丙为君，癸为臣，丙癸两透，不透庚金，大富大贵。或天乾透庚，支下无辰，不能化金，得癸透养木亦为贵，若见水库，则为假化，平常人也。","乙3":"阳气愈炽，先癸后丙。癸丙两透，不见己庚，玉堂之客。见己庚者，平常之人。或一乙逢庚，不见己者，亦主小富贵，但不显达。或多水见己，只恐高才不第。见戊堪发异途。或庚己混杂，丙癸全，则为下格。或见水局，丙戊高透，亦主科甲。或柱中全无丙戊，支合水局，此离乡之命。或见一派癸水，又有辛金，则作旺看。得一戊己制癸，亦可云小富贵。若一派壬水，不特贫贱，而且夭折。有一戊己，方云有寿，但终为技术之人。又或庚辰时月，名二庚争合，乃贫贱之辈。如年乾见丁破庚，可云从化，亦不失武职之权。用癸者，金妻水子。癸多用丙者，木妻火子。","乙4":"自有丙火，端取癸水为尊。四月乙木专用癸水，丙火酌用，虽以庚辛佐癸，须辛透为清。癸透、庚辛又透，科甲定然，独一点癸水、无金，是水无根，虽出天干，不过秀才小富，须要大运相扶。或土多困癸，贫贱之人。丙戊太多，支成火局，瞽目之流。用癸者，金妻水子。乙逢双女木伤残，若见辛金寿必难，不得丙丁来制伏，岂知安乐不久长。","乙5":"丁火司权，禾稼俱旱。上半月属阳，仍用癸水。下半月属阴，三伏生寒，丙癸齐用。柱多金水，丙火为先，馀皆用癸水为先。乙木重逢火位，名为气散之文，支成火局，泄乙精神，须用癸滋。癸透有根，富贵双全。或庚辛年上，癸透时干，定许科甲，无癸者常人。若见丙透，支成火局，阳焦木性，此人残疾，无癸必夭，见壬可解。或火土太多，其人愚贱，或为僧道门下闲人。","乙6":"木性且寒，柱多金水，丙火为尊。支成水局，乙得无伤。癸水透干，大富大贵。无癸定作常人，运不行北，困苦一生。凡五六月乙木，气退枯焦，用癸水切忌戊己杂乱，则为下格。或甲木高透，制伏土神名为去浊留清，可许俊秀。土多乏甲秀气脱空，庸人而已。或丙癸两透，加以甲透制戊，选拔定然。若不见丙癸，只有丁火，亦属常人，有壬、可充衣食。或柱中无水，又无比劫出乾，乃为弃命从才，富大贵小，能招贤德之妻。从才格以火为妻，土为子。或一派戊土出乾，不见比肩，名为才多身弱，终为富屋贫人。或丙辛化水，嫖赌破家，终非承受之儿。或一派乙木，不见丙癸，名为乱臣无主劳碌奔波，又加支多辛金，僧道之辈。或一派甲木，无癸无丙，又无庚金，此人一生虚浮，总不诚实。有庚制甲，乃有谋之人，但嗜酒贪花，多欲败德，不修品行，男女一理。总之夏月之乙木，端用癸水，丙火酌用，庚辛次之。","乙7":"庚金乘令，庚虽输情于乙妹，怎奈干乙难合支金。柱见庚多，乙难受载。或丙透干，又加巳出埋金，此格可云科甲。有己透、加丙，亦是上命。七月喜己土为用，或不见丙癸。己土必不可少，此则以火为妻，土为子。或癸透、丙藏、庚少，此不用己，可许贡拔。无丙、有癸透者，不失刀笔门户。有支下庚多，癸又藏者，无丙己二神，平常人物。或生辰时，此为从化，反主富贵。凡化合格皆以所生之神为用。化金者，戊为用神，特忌丙丁煆炼破格。从化者以火为妻，土为子。其馀以金为妻。妻必贤美。以水为子，子必克肖，但忌刑冲。凡命皆然，不特此也。秋乙逢金，非贫即夭。秋生乙木忌根枯，根既枯槁，贫苦到老。","乙8":"芝兰禾稼均退。以丹桂为乙木。在白露之后，桂蕊未开，端用癸水以滋桂萼。若秋分后，桂花已开，却喜向阳，又宜用丙，癸水次之，丙癸两透，科甲名臣。或支成金局，宜暗藏丁，无丁制金，恐木被金伤。若无水火，此人劳碌。或得癸水，为子得母，其人一生丰盈。或丙癸两透，戊土杂出，亦主异路功名。生秋分后，有丙无癸，亦略富贵。若有癸无丙，名利虚花。若四柱不见丙癸，下格。或癸在年（月）干，丙透时干，名为木火文星，定主上达。生于秋分后方佳。或生上半月无癸，姑用壬水，不然，枯木无用，必作贫人。又四柱多见戊己，下格。用癸者，金妻、水子。用丙者，木妻、火子。用壬者，金妻水子。甲乙遇强金，魂归西土，青龙逢兑旺，且贫且贱。乙木生居酉，莫逢巳酉丑，富贵坎离宫，贫穷申酉守。木逢金旺巳伤，再遇金乡，岂不损寿。","乙9":"根枯叶落，必赖癸水滋养。如见甲申时，名为藤萝系甲，可秋可冬。若见癸水，又遇辛金发水之源，定主科甲。或有癸无辛，常人。有辛无癸，贫贱。或四柱壬多，水难生乙，亦是寻常之辈。或支多戊土，又逢天干，作从才看，无比劫方妙，一逢比劫，富屋贫人。用癸者，金妻、水子。但子女艰难，季土克制故也。","乙10":"木不受气，而壬水司令，取丙为用，戊土次之。丙戊两透，科甲定然。有丙无戊，虽不科甲，亦入儒林。支多丙火，运入火乡，亦主显达。或水多无戊，乙性漂浮，流荡之徒。若不见丙巳，妻子难全，或一点壬水，即多见戊土，亦为不妙，得甲制戊，可许能干，但为人好生祸乱，构讼生非，男女一理。支成木局，时值小阳，此又如春木同旺，若有癸出，须取戊为尊，加以丙透，科甲之人。若无丙戊二字，自成自败，终非承受之辈。","乙11":"花木寒冻，一阳来复，喜用丙火解冻，则花木有向阳之意，不宜用癸以冻花木，故端用丙火。有一二点丙火出乾，无癸制者，可许科甲。即丙藏支内，亦有选拔恩封，得此不贵，必因风水薄。或壬癸出乾，有戊制，可作能人，即丙在支内，亦是俊秀。若壬透无戊，贫贱之人。支成水局，乾透壬癸，丙丁全无，虽有戊制，贫乏到老，运至南方，稍有衣食。丁火有亦如无，丁乃灯烛之火，岂能解严寒之冻。设无丙丁，戊土多见，金水奔流，下贱。或有戊己无火，亦属常人，但不至下贱。或一派丁火，大奸大诈之徒。如无甲引丁，孤鳏到老。丁火见甲，必主麟趾振振，芝兰绕膝。或成水局，壬癸两透，则木浮矣，不特贫贱，而且夭折，得一戊救方可。冬月之木，虽取戊制水，不可作用，端取丙火则可。用火者，木妻、火子。用土者，火妻、土子。乙木生于冬至之后，坐下木局，得丙透乾者，富贵之造。即丁出乾，亦有衣禄，须忌癸制丁。乙木生于冬月，己土透干，又有丙透，大富贵之造。","乙12":"冬月乙木，花木寒冻，一阳来复，喜用丙火解冻，不宜用癸以冻花木，故端用丙火。有一二点丙火出乾，无癸制者，可许科甲。即丙藏支内，亦有选拔恩封。或壬癸出乾，有戊制，可作能人。若壬透无戊，贫贱之人。支成水局，乾透壬癸，丙丁全无，虽有戊制，贫乏到老。冬月之木，虽取戊制水，不可作用，端取丙火则可。用火者，木妻、火子。乙木生于冬至之后，坐下木局，得丙透乾者，富贵之造。即丁出乾，亦有衣禄，须忌癸制丁。乙木生于冬月，己土透干，又有丙透，大富贵之造。","丙1":"三阳开泰，火气渐炎，取壬为尊，庚金佐之，壬庚两透，科甲定然，即壬透庚藏，亦有异途显达。若一庚高透，支藏一二丙火，纳粟奏名，主为人慷慨英雄，有才迈众。或一派庚辛混杂，常人，得时月两透庚金、无辛者，定主清贵，或辛年辛时，名为贪合，酒也之徒，女命一理。或丙少壬多，而无戊制，名杀重身轻，斯人篌里藏刀，寻非痞棍，或见一戊制壬，反成富贵，宜见一二比肩方妙。或一片戊土，甲不出乾，终非大器，且恐孤贫，正月之丙，忌戊晦光，或支成火局，端取壬水为贵，无壬、癸亦姑用，若壬癸俱无，取戊以泄火气，但属平人。或支成火局，吊作炎上而推，但不逢时耳，若不见东南岁运，反致孤贫。或四柱有甲木，得康金暗制，可作秀才。无壬用癸者，略富贵，且官杀亦要旺有限，丙火无壬，多主贫贼，屡徵屡验。或火多无水，一至水必死。不然，定有灾咎，惟五月丙火，合炎上格，则不喜水破格、用癸无根，定主日疾。用壬者，金妻水子。用庚者，土妻金子。","丙2":"阳气舒升，端用壬水，壬透天干，不见丁化，加以庚辛已亦透，壬水有根，定主科甲。或无壬水，己土姑用，主有才学，虽不能成名，必衣食充足。或一派壬水，见一戊制，虽不科甲，亦有恩庇。或无戊透，则有辰戌丑未之戊，但辰宫癸水，贪合成火，不能制壬，此平常衣禄。若支下全无一戊，此系奔流之人，加以金多生水，下贱之命。或一派戊土，亦用壬水，运喜行木，见土不祥，行火亦不利。或丙子日辛卯时，乃从化格，但不逢时贪才坏印，难招祖业。若得一二重丁火破辛，壬水得位，亦主富贵，虽不科甲，亦有异途，名传郡邑。合此格，主妻妾多子。或月时见二辛卯，日乃丙子，名为争合，年不透丁制辛，此人昏酒色，年透丁火，反吉。或支成木局，反因奸得才，因酒得名。凡用壬者，金妻水子。","丙3":"气渐炎升，用壬水，或成土局，取甲木为辅，壬不可离，壬申两透，科甲定宜，惟忌庚出制甲，则秀才而已。无甲用庚，助壬水泄土气。壬透甲藏，富大贵小，有甲无壬，劳碌浊富，壬藏无甲，一介寒儒。壬甲两无，愚贱之辈，乙丁杂乱，定必属凡夫。用壬者，金妻水子，用甲者，水妻木子。","丙4":"建禄于巳，火势炎炎，宜专用壬水，解炎威之力，成既济之功。如无壬水，孤阳失辅，难透清光，得庚发水源，方为有根之水。壬庚两透，不见戊土，号曰湖水汪洋，广映太阳，光辉显著，文明之象，人合此格，不但科甲峥嵘，必有恩谥封荣。若不验，必暗损阴德。或无壬水，癸亦姑用，见庚透癸，不富必贵。但心性乖僻，巧谋善辩。或壬癸俱无，愚顽之辈，火炎无制，僧道之流。或一派庚金，不见比劫，有富无贵。或丙什日乾，四柱多壬，不见戊制，名曰阴刑杀重，光棍之流。或支成水局，加之重重壬透，一无制伏，盗贼之命，如见己土，下贱鄙夫。用壬者金妻水子。","丙5":"五月丙火愈炎，得壬庚高透，方为上命。或一壬无庚，亦主页监，犹防戊己出乾，丁壬化合，则为平人，即不透庚壬。或有申宫长生之水，济之坐禄之金，至妙，必入词林，又怕戊己杂乱，则为异路。或成火局，不见滴水者，乃僧道鳏独之命，即有一二癸水，多遇火土，用之无力，瞽目之人，得戊己透火气，亦主刑克孤寡，行北运多凶，何也，所谓燥烈水激反凶。或成炎上格，柱运不见庚辛，多见甲乙者，反主大富贵，然亦不可见水运。或有庚癸透者，衣禄充足，支火轻，无目疾，支见水者，异途。或成土局，又为泄太过，得壬滋甲出乾，土被制而火得生扶，此必富贵寿考之格也。","丙6":"六月丙火退气，三代生寒，壬水为用，取庚辅佐。庚壬两透，贴身相生，可云科甲名宦，若无庚有壬，不见戊出，小富小贵，见戊制壬则为贤而已。或己土出乾混杂，此必庸夫俗子。或壬水浅，己土出乾，其人贫困，无壬下格，贱而且顽，男女一理。或天乾一派丙火，阳极生阴，干支两见庚壬。总之六月丙火用壬，不同馀月用壬、喜运行西北，六月用壬，喜运行西南。","丙7":"太阳转西，阳气衰矣，日近西山，见土皆晦，惟日照湖海，暮夜光天，故仍用壬水辅映光辉。如壬多，取戊制方妙，有壬透干，又见戊土出乾，可云科甲，如戊藏支内，不过生员，多壬无戊，平常人也。或戊多壬少，亦属常人，或多壬，一戊出制，所谓众杀猖狂，一仁可化，必主颢达，有权职。一派辛金，又为弃命从才，奇特之造，亦得恩荣，但多依亲戚而为进身之阶，从才者以水妻木子。","丙8":"日近黄昏，丙之馀光，存于湖海，仍用壬水辅映。四柱多丙，一壬高透为奇，定主登科及第，富贵双全，一壬藏支，亦主秀才。或戊多困水，则假作斯文，若无壬水，癸亦可用，但功名不久。或见辛透，不能从化，贫苦到老，或见一丁制辛，为人奸诈，不识高低，女命合此，长舌淫贱。或成金局，无辛出乾，此非从才，乃朱门饿莩，如辛出乾，不见比劫，此从才格，反主富贵，亲戚提拔，妻贤内助，用水者，金妻水子，从才者，水妻木子。","丙9":"火气愈退，所忌土晦光，必须先用甲木，次取壬水。甲壬两透，富贵非凡，苦无壬水，得癸透干，亦可，虽不科甲，异路功名，壬癸藏支，页监而已，甲藏壬透，无庚破甲，可许秀才。或庚戊困了水木，定是庸才，无甲壬癸者，下格。或一派火土，虽不太旺，亦自燥矣，如不离过继，亦主奔流，加以无庚辛壬癸出乾，必为夭命。或支成火局，炎上失时，若运入南方，一贫彻骨。用甲者，水妻木子，用壬者，金妻水子。","丙10":"太阳失令，得见甲戊庚出乾，可云科甲，主为人性好清高，斯文领袖。如辛透见辰，名化合逢时，主大贵。或壬多无甲，乃作弃命从杀，即不科甲，亦是宦僚。或壬多有甲无戊，郤非从杀，宜用己土混壬。总之十月丙火，木旺宜庚，水旺宜戊，火旺用壬，随宜酌用可也。","丙11":"冬至一阳生，弱中复强，壬水为最，戊土佐之。壬戊两透，科甲可许，无戊见己，异路功名。或无壬水，有癸出乾，得金滋无伤，又有丙透以解冻，可许衣衿。或一派壬，则端用戊土，此人虽不成名，文章迈众，但名利虚浮，何也，因戊晦光，又须甲木为药也，或无壬水，癸亦可用，但不甚显。或四柱多壬无甲，乃作弃命从杀，亦有云路。或水多、有甲、无戊，郤非从杀，宜用己土浊壬，十一月丙火，与十月颇同。","丙12":"气进二阳，每雪欺霜，喜壬为用，己土司令，土多又不可少甲，壬甲两透，科甲堪宜，甲藏则秀才而已，或无甲得一壬透，富中取贵。如见一派己土，不见甲乙，名假伤官，聪明性傲，名利虚浮。或一派癸水，得己出乾，必主自创基业，若制伏太过，又取辛金作用，得见癸透，此人即不成名，必清雅文墨之士。","丁1":"甲木当权，乃为母旺，非庚不能劈甲，何以引丁，姑用庚金。或一派甲木，无庚制之，非贫即夭。或只一甲木、多见乙木者，必离之客，焉问妻儿。或见甲乙，生庚子时，又主妻甲子早，宜可采芹。得壬化木，弱极复生，合此必主大贵，但此化合，反以不见庚破格为妙。或有庚金壬癸，得己出乾制之，此命不由科甲，亦有异途。或一派壬癸，不得寅时，又无庚金，必主穷困。或丁年、壬月、丁日、壬时，男主大贵，女则不宜，此格以土为妻、金为子，但子女艰难，女命合此，淫贱，刑夫克子。或支火局，无滴水解炎，僧道之命，见甲出略可，总不可无水，水多亦不宜。","丁2":"湿乙伤丁，先庚后甲，非不能去乙，非甲不能引丁。庚甲两透，科甲定然，庚透甲藏，亦有生贡，甲透庚藏，异路功名。或庚乙俱透，庚必输情于乙，未免贪合，运行金水，一贫彻骨。或庚透乙藏，则不能贪合，乙反引丁，即用乙亦无害．运入木火之乡，自然富贵，用乙者水妻木子。若尽是乙木，不见一甲，此人富贵不久，因贪致祸，弄巧反拙，且不能承先人之业。或支成木局，有庚透、主清贵，不见庚者、常人，二月乙木司权，必须有庚，有乙无庚，主贫苦无依，用庚者、土妻金子。得印旺杀高，大富大贵。或一派水，无一戊制，主贫苦无依。或乙少癸多，有戊去制，反吉。用土者、火妻土子。","丁3":"戊土司令，泄弱丁气，先用甲木引丁制土，次看庚金，庚甲两透，定主科甲，或一藏一透，终非白丁。或支成木局，取庚为先，得庚透，丁癸不透，亦有异路功名。或支成水局，加以壬透，名杀重身轻，必夭折天年。或遭凶死，或戊己两透，廊庙之客，若一甲破土，定是常人。用甲者、水妻木子，用金者、土妻金子。","丁4":"四月丁火乘旺，虽取甲引丁，必用庚劈甲，伐甲、方云木火通明，甲多、又取庚为先。但四柱忌见癸水，癸水一见，泄庚、湿甲、伤丁，故以癸为病。或癸水藏支，壬水出乾制丙，不夺丁光，自是雁塔题名，玉堂清贵。或有庚无甲，戊透天干，此为伤官生才，又取戊为用，必主富贵，戊土出乾，不见甲乙，又不见水，是伤官伤尽，八字清高，但不大贵，亦不大富，见水多木多，定是常人。或四柱多丙，不见壬癸，夺了丁光，此人贫苦，或丁年、巳月、丁巳日、丙午时，一丙不夺二丁，即不颢达，亦名播四邻。故书曰，丁火阴柔一烛灯，太阳相见夺光明，柱中若见甲木透，定许身安福自临。","丁5":"时归建禄，不宜乱用甲木。遇年透隔位之壬，不贪丁合者，忠而且厚，或支成火局，干见火出，得庚壬两透者，科甲定然，土透制壬，常人。即壬藏支中，亦非白丁，但要运行西北，方可发达，得一癸透，名独杀当权，出人头地。若见寅辰亥卯字，化木生火，平常人物，丰衣足食，中年富，但刑克子息，劳而无功，或丙午月、丁未日、辛亥时，亥中有壬制丙，不致贫苦，若丙午时，则滴水难救炎火，必主僧道，若年支见子，虽不科甲，亦有衣衿。若干支无火局，有水透干，须用甲木，又要庚劈甲方明，木火通明，主大富贵，或木少火多，焚其木性，不能光透九霄，荣华不久。或生月是禄，支皆生旺合局，右以火出，无滴水解炎，乃身旺无依，孤贫之格，女必为尼，即运北地，反主凶危。用壬者、金妻水子，用甲者、水妻木子。","丁6":"阴柔退气，但值三伏生寒，丁弱极矣，专取甲木，壬水次之。若得甲出天干，支成木局，见亥中之壬，为木神有根，接引丁火，必然科甲，即不见木局，支见壬水，虽不大贵，亦有凌云之气，无庚不妙。或支成水局，见水透干，则湿木性，不能引丁，必为平常人，有甲透、有才干。有庚透，无刑伤，若无甲木，假名假利。或年月日时，皆一派丁未之类，此为纯阴，终无大用。用甲者、水妻木子。","丁7":"退气柔弱，端用甲木，金虽乘旺司权，无伤丁之理，仍取庚劈甲，为引火之物，或借丙暖金晒甲，不虑丙夺丁光，凡两丙夹丁者，夏月忌之，馀月不忌，但此格少年困苦刑克中年富贵，必要地支见水制丙，方妙。或一重壬水，又多见癸水，必以戊土为制，自然富贵光辉。或一派庚金，名才多身弱，主富屋贫人，妻多主事，或壬多泄庚，丁壬化杀，反成富贵，若庚多无壬，奔流下贱。","丁8":"或八月一派辛金，不见庚金，又无比劫，比弃命从才，富而且贵，虽不科甲，亦有异途，从才者水为妻，不克，有正偏，木为子，不刑。或九月一派戊土，泄丁火之气，不见甲木，为伤官伤尽，非寻常可比，或甲木透出，为文书清贵，秋闱可夺，用甲者，庚不可少，水妻木子。","丁9":"九月丁火，端取甲木制土为用，庚金佐之，甲庚两透，科甲分明。或一派戊土，泄丁火之气，不见甲木，为伤官伤尽，非寻常可比，或甲木透出，为文书清贵，秋闱可夺，用甲者，庚不可少，水妻木子。或一派辛金，不见庚金，又无比劫，弃命从才，富而且贵，虽不科甲，亦有异途，从才者水为妻，木为子。","丁10":"三冬丁火微寒，端用庚甲，甲乃庚之良友，凡用甲木，庚不可少，无庚无甲，何能引丁，难云木火通明，冬丁有甲，不怕水多金多，可称上格，甲庚两透，科甲分明，见己则否，己多合甲，则为常人。或一丙夺丁，必赖支内水救，若有支金发水之源，官拜乌台有准，金无癸水制丙，无用之徒。或时月二壬争合，取戊破之，有戊稍有富贵，无戊常人。","丁11":"或仲冬水多癸旺，金无比印，此作弃命从杀，亦有异途功名，见丁比出乾，难合格局，常人，且主骨肉浮云，六亲流水，戊出破癸，颇有兄弟妻儿，此格用戊，火妻土子，用甲，水妻木子。或四柱多丙丁，又用癸制火，用癸者金妻水子。","丁12":"三冬丁火微寒，端用庚甲，甲乃庚之良友，凡用甲木，庚不可少，无庚无甲，何能引丁，难云木火通明，冬丁有甲，不怕水多金多，可称上格，甲庚两透，科甲分明，见己则否，己多合甲，则为常人。三冬丁火，甲木为尊，庚金佐之，戊癸权宜酌用可也。","戊1":"正二月即有甲癸，若无丙除寒，如万物生而不长，故无丙者，富贵艰辛，或有丙无甲癸者，名日春旱，如万物生而厄，无甲癸者，一生勤苦，劳而无功，或一丙火，有甲久癸，先泰后否，或支成火局，不见壬癸，僧道孤贫，癸透者贵，壬透者富。用水者要审水之多少，或一派，甲木无丙常人，得一庚透方妙，或支成水局，甲又出乾，又有庚透，富贵双全。或无庚金，又无比印，难作从杀，定主遭凶，不然，必为盗贼，若日下坐午，不得善终。或一派乙木，为官杀会党，即有庚从，郤难制乙，此人内奸外直，口是心非，加一甲在内，无庚，必懒惰自甘，好食无厌，或丙多甲多，宜以癸庚参用。","戊2":"二月戊土，正二月即有甲癸，若无丙除寒，如万物生而不长，故无丙者，富贵艰辛，先取丙火，次取甲木，甲癸出乾，定主科甲，加以一丙出透，势压百僚。或支成水局，甲又出乾，又有庚透，富贵双全。或无庚金，又无比印，难作从杀，定主遭凶，不然，必为盗贼。或一派乙木，为官杀会党，即有庚从，郤难制乙，此人内奸外直，口是心非。","戊3":"三月戊土司令，不见丙甲癸者，愚而且贱，毋癸透者、科甲，两癸透者、生员，甲癸俱藏者，只可云富，有癸异途。若丙多无癸，旱田无水，不能种苗，旧谷已没，新谷未登，此先富后贵之造，或火多有壬透者，先贫后富，癸透先贱后荣，壬藏不过食足，癸藏不过名传，即此亦须运美，或支成火局，得癸透者，富贵天然，壬透富贵辛苦，何也，癸乃天上甘霖，壬乃江河波浪，所以有劳逸之殊。支成木局，又甲乙出乾，此名官杀会党，官杀无去留之义，得一庚透，扫除官杀，亦主富贵，无庚乃浅薄之人，宜用火泄木气，有一命、丁未、癸卯、戊寅、乙卯、癸丁透干，加以戊癸化火，将甲木暗，反得武科探花。或木多无比印透，作从杀而论，亦富贵。或有比印，端看癸透，取癸而成贵格，无癸、无火、无金，名为土木自战，主腹主疾病，忧愁艰苦。用甲者，水妻、木子，用丙者，木妻、火子。丙寅，庚寅，戊辰，庚申，丙癸．","戊4":"阳气发升，寒气内藏，外实内虚，不畏火炎，无阳气相催，万物不长，故先用甲疏劈，次取丙癸为佐。丙透甲出，廊庙之材，丙癸俱透，科甲之士，即透一位，支藏得所，终非白丁。若一派丙火，为火炎土燥，僧道之流，得一癸透壬藏，功名有准，或支藏癸，衣食充足，但骨肉多刑。化合成局无破，富贵非轻。或支成金局，乾出癸水，此为奇格，正是土润金生，即不为桃浪之客，定有异路恩荣。此用癸水，金妻水子。","戊5":"仲夏火炎，先看壬水，次取甲木，丙火酌用，用癸力微。壬甲两透，名君臣庆会，自然桃浪先声，权高位显，又得辛透年乾，官居一品，一命、辛未、甲午、戊寅、壬子，壬甲两透，印旺杀高，出将入相，名播四夷。若支成火局，即透癸水，不能大济，是一杯水济车薪火也，人命合此，即好学不倦，亦能成名，且主目疾，若得壬水出乾，则此非比。又或土木重重，全无滴水，僧道孤贫之辈。用壬者，金妻水子。","戊6":"遇夏乾枯，先看癸水，次用丙火甲木。癸丙两透，科甲中人，或有癸无丙，见甲可许秀才，无甲略富，或有丙无癸，假道斯文，衣食颇足，或癸透辛出，以刀笔之才，可谋异路，无癸丙者，常人，若又无甲，下贱之辈。或土多得一甲出，不见庚辛，为人作事轩昂，性情谨慎，即不显扬，亦文章惊世。用癸者，金妻，水子，用丙者，木妻，火子，用甲者，水妻，木子。","戊7":"阳气渐入，寒气渐出，先丙后癸，甲木次之。丙癸甲透者，富贵极品，癸藏丙透，不仅秀才，丙申两透，癸水会局藏辰，亦不失富贵，无丙得癸甲透，此人清雅，家富千金，无癸甲者，常人，有丙火，妻肾子肖，若丙甲癸三者俱无，下流之命。或支成水局，休作弃命从才，宜取甲泄之，甲透者，稍有富贵，用神妻子同前。","戊8":"金泄身寒，赖丙照暖，喜水滋润，先丙后癸，不必木疏。丙癸两透，科甲中人，丙透癸藏，可许入泮，癸透丙藏，纳资得官，若丙藏又无癸，即多不透，此皆常人，癸丙全无，奔流之客。或四柱皆辛，无丙丁，此名伤官格为人清秀，即不能拾芥，亦可武庠，一见癸水，富而且贵。或支成水局，壬癸出乾，此名才多身弱，愚懦无能，若天干有比劫分散才神，颇言衣食。用神妻子同前，秋土生金极弱，须丙火丁火出乾方妙。","戊9":"九月戊土当权，不可专用丙，先看甲木，次取癸水，郤忌化合，见金先用癸水，后取丙火，配合支干，方成有生之土，定发云程。或无丙有癸，不见甲透者，衣衿小富，无癸丙，有甲者，衣食而已，若癸甲全无，虽有丙火，亦属平常，或为僧道。或支成水局，壬癸透干，用戊止流，有比透反主富。支成火局，名土燥，不发。得金水两透，此人清高，略可富贵，无水，一生困苦，妻子仝前。","戊10":"时值小阳，阳气略出，先用甲木，次取丙火，非甲，土不灵，非丙，土不暖，安能发生万物，甲丙两出，富贵中人。或甲得长生，遇支藏得地之水，一丙高透，亦主身贵扬名，支见庚金，入泮而已。若不见庚金，甲木藏支，丙火高透，科甲有之，若有庚，丁出制，必异路功名，或为典吏。即庚丁不透，甲丙藏支，亦云富贵。壬透得戊救丙，主富中取贵，丙甲俱无，必为僧道。","戊11":"十一二月严寒冰冻，丙火为尊，甲木为佐，丙甲两透，桃浪之人，丙出甲藏，采芹食廪，丙藏甲出，佐杂前程，有丙无甲者，豪富，有甲无丙者，清贫，丙甲全无，下流之造。或一派丙火，运值火土，弱中复强，又一壬透干，主清高荣禄，乏壬，僧道孤寒。或一派水土寒滞，不见一丙，得一癸透月时，亦不失儒雅风流。或一派壬水，不见比劫，可作从才而论，即有比劫，得甲出乾，又主富贵，若寒土无丙，虽有甲木，亦是内虚外实之人。","戊12":"十一二月严寒冰冻，丙火为尊，甲木为佐，丙甲两透，桃浪之人，丙出甲藏，采芹食廪，丙藏甲出，佐杂前程，有丙无甲者，豪富，有甲无丙者，清贫，丙甲全无，下流之造。或一派丙火，运值火土，弱中复强，又一壬透干，主清高荣禄，乏壬，僧道孤寒。或二癸透月时，名为争合，终属劳碌之人，得一己出乾制癸，反为忠义之士。年月透辛金者，土金伤官，异路功名可许，以金为妻，水为子。","己1":"田园犹冻，盖因腊气未除，馀寒未退，故丙为尊，得丙照暖，万物自生，忌见壬水，反为己病，何也，壬乃江湖之水，湖水一发，则田园洗荡，变为沙土，而根苗尽没矣，须戊作堤，以保园圃，壬多要见戊制，有戊出乾者，定主玉堂金马，若乏制戊，必属平常。或一派甲木，有庚出乾，加以癸丙齐透，配得中和，亦名利双全。即丙生寅月，庚透天干，亦有俊秀。若甲多无庚，残疾废人，宜用丁泄。或一派火，即不见水无碍，何也，正月己土湿，必丙燥暖，反主厚禄，加一癸透，科甲自然，戊透，反作常人。或一派戊土，有甲出制，又主荣显，如见乙出，虽多不能疏土，且乙多者奸诈小人。用丙者，木妻，火子。","己2":"阳气渐升，虽禾稼未成，万物出土，田园未展，先取甲木疏之，忌合，次取癸水润之，甲癸出乾，定主科甲，加以一丙出透，势压百僚，一见壬水，微末官职。或见庚制甲，壬水出乾，比劫重重，此必俗子，丙透犹有小富，丙藏衣禄无亏。或支成木局，庚透富贵，若柱多乙木，乙又屈庚，庚必输情于乙，不能扫邪于正，此必狡诈之徒，运入东南，恐有不测，当用丁泄之，有丁者，小人而已，不致无良。无比印，从杀者贵。若柱中无甲丙癸者，皆下格，妻子用神仝前。","己3":"正栽培禾稼之时，先丙后癸，土暖而润，随用甲疏，三者俱透天干，必官居黄阁，或三者透一，科甲定然，但要得地，郤以庚金为病。或有丙甲无癸，亦可致富，但不贵显，或有癸而无甲丙，亦有衣衿，或有丙癸无甲，亦系才人，丙癸全无，流俗之辈。或一片乙木，无金制伏，贫而且夭也，妻子仝前。","己4":"三夏己土，杂气才官，禾稼在田，最喜甘沛，取癸为要，次用丙火，夏无太阳，禾稼不长，故无癸曰旱田，无丙曰孤阴。或丙癸两透，又加辛金生癸，此富贵之格，名水火既济，鼎甲之人，郤忌戊癸化合。或有丙无癸，有壬亦可，但不大发。用癸者，金妻，水子，用丙者，木妻，火子。","己5":"三夏己土，杂气才官，禾稼在田，最喜甘沛，取癸为要，次用丙火，夏无太阳，禾稼不长，故无癸曰旱田，无丙曰孤阴。或丙癸两透，又加辛金生癸，此富贵之格，名水火既济，鼎甲之人，郤忌戊癸化合。或有丙无癸，有壬亦可，但不大发。或壬癸并出，破火润土，此人聪颖特达，富中取贵。用癸者，金妻，水子，用丙者，木妻，火子。","己6":"三夏己土，杂气才官，禾稼在田，最喜甘沛，取癸为要，次用丙火，夏无太阳，禾稼不长，故无癸曰旱田，无丙曰孤阴。或丙癸两透，又加辛金生癸，此富贵之格，名水火既济，鼎甲之人，郤忌戊癸化合。或有丙无癸，有壬亦可，但不大发。用癸者，金妻，水子，用丙者，木妻，火子。","己7":"三秋己土，万物收藏之际，外虚内实，寒气渐升，须丙火温之，癸水润之，不特此也，且癸能泄金，丙能制金，补土精神，则秋生之物咸茂矣，癸先丙后。丙癸两透，雁塔题名，或无癸，有两丙透者，异途显达，或武职权高，或有丙火，不见壬癸，为假道斯文，终无诚实。或支成金局，癸透有根，此人家畜万缗，富中取贵。总之三秋己土，先癸后丙，取辛辅癸，九月土盛，宜甲木疏之，馀皆酌用。","己8":"三秋己土，万物收藏之际，外虚内实，寒气渐升，须丙火温之，癸水润之，不特此也，且癸能泄金，丙能制金，补土精神，则秋生之物咸茂矣，癸先丙后。丙癸两透，雁塔题名，或无癸，有两丙透者，异途显达，或武职权高。八月支成金局，无丙丁出救，此人零丁孤苦，如得丙透丁藏，生己元神，此人名魁天下，五福完人。总之三秋己土，先癸后丙，取辛辅癸，馀皆酌用。","己9":"三秋己土，万物收藏之际，外虚内实，寒气渐升，须丙火温之，癸水润之，癸先丙后。丙癸两透，雁塔题名，或无癸，有两丙透者，异途显达，或武职权高。或支四库，甲透者富，乏甲者孤贫。九月土盛，宜甲木疏之，或支成水局，壬癸透干，用戊止流，有比透反主富。总之三秋己土，先癸后丙，取辛辅癸，九月宜甲疏土为要。","己10":"三冬己土，湿泥寒冻，非丙暖不生，取丙为尊，甲木参酌，戊土癸水不用，惟初冬壬旺，取戊制之，馀皆用丙丁，但丁不能解冻除寒，不能大济。或乾透一丙，支藏一丙，如以甲透，科甲有准，即藏丙无制，亦主衣衿。或多壬水，得戊透制之，此命安然富中取贵，不见戊土，富屋贫人。","己11":"三冬己土，湿泥寒冻，非丙暖不生，取丙为尊，甲木参酌，戊土癸水不用，馀皆用丙丁，但丁不能解冻除寒，不能大济。或乾透一丙，支藏一丙，如以甲透，科甲有准。或多壬水，得戊透制之，此命安然富中取贵。或一派癸，不见比劫，此为从才，反主富贵，虽不科甲，恩诰有之。或一派戊己，取甲制之，甲透者富贵。","己12":"三冬己土，湿泥寒冻，非丙暖不生，取丙为尊，甲木参酌，戊土癸水不用，馀皆用丙丁，但丁不能解冻除寒，不能大济。或乾透一丙，支藏一丙，如以甲透，科甲有准，即藏丙无制，亦主衣衿。或多壬水，得戊透制之，此命安然富中取贵，不见戊土，富屋贫人。或一片辛庚，须用丙火，还须丁火为助，丙藏，富贵奇特之命。","庚1":"木旺之际，有土皆死，不能生金，且金之寒气未除，先用丙暖庚性，又虑土厚埋金，须甲疏泄，丙甲两透，科甲显荣，二者透一，亦有生监，丙藏甲透，异路功名。或柱中土多，甲透者贵，甲藏者富，庚出则否。或丁火出乾，加以戊己而无水者，又主富贵，何也，寅中甲木，引丁有根，无水为病，名官星有气，才旺生扶，故以富贵推之，如火多则用土，用土者火妻土子。或支成炎局，壬透，有根者，大富贵，无根者，小富贵，乏水者，残疾之人。或木被金伤，无丙丁出制，支无丁火，此系平人，或丙遭癸困，无戊制者亦然。总之正月庚金，丙甲为上，丁火次之，春金多火，不夭则贫，阳金最喜火炼，煆炼太过，反主奔流。","庚2":"柱中自然有乙，当令之乙，见庚必留情于乙，此金有暗强之势，如秋金一理，故二月庚金，专用丁火，借甲引丁，借庚劈甲，无丁用丙者，富贵多出于勉强。或丁在乾，甲透引丁，支下再见一庚制甲，配得中和，必然大贵，如不见庚合者，虽丁甲两透，亦属平人，春丁不旺不衰，故用甲为佐丁之物，甲若无庚劈，则不能引丁，乙木虽多，又忌湿乙伤丁，难为丁母，故有丁甲无庚者，常人，有丁庚，甲不出乾者，常人，或丁透无庚甲者，可许贡监，无丁有丙者，异路功名。或一片甲乙，忌庚出帮破才，乃从才格，反主富贵，若见一比，又主孤贫。从才者，火妻土子，用丁者，取甲为妻，若有庚制，难许同偕。死金嫌盖顶之泥，重见戊己，如人压伏之象，须甲透为妙。","庚3":"戊土司令，无生金之理，有埋金之忧，故先甲后丁，不用庚劈甲，三月之庚，土旺金顽，顽金宜丁，旺土须甲，乏甲不能立业，乏丁焉能成名，二者少一，富贵不真，庚金无火，非夭则贫，身弱才多，富贵不久。得丁甲丙透，不见比肩，科甲之命，但要好运相催，甲透丁藏，采芹拾芥，甲藏丁透，异路功名，丁甲俱藏，不受庚制，富中取富，刀笔起家，有甲无丁，平常之辈，有丁无甲，迂儒腐儒，丁甲两无，下贱之流。或一甲，无丁，有丙，由行伍而得官职，须不见壬，癸，为妙。或支成土局，无木，贫贱僧道，见乙，奸诈小人。或支成火局，癸水透，富贵，有丙丁出乾，见壬制之，方吉，无制，残疾之人。用甲者，水妻木子，用丁者，木妻火子。","庚4":"长生于巳，巳内有戊，丙不熔金，故不畏火炎，丙亦可作用，但先壬水，方得中和，故曰群金生夏，喜用勾陈，次取戊土，丙火佐之，三者皆全，登科及第，即透一二，亦非白丁。或一派丙火，名曰假杀为权，须不见壬制者，此人假作清，高并无仁义，刑妻克子，有壬制者，又主荣华，壬藏支者，有富贵之名，而无其实。或支成金局，变弱为强，用丙无力，用丁方妙，故丁透者吉，无丁，无用之人，或丁出三四，煆制太过，其人奔波。","庚5":"丁火旺烈，庚金败地，专用壬水，癸又次之。壬透癸藏，支见庚辛，必然科甲，切忌戊己透乾制水，则否，戊藏支内，不失儒林，或壬在支，有金生助，又得金神出乾，明经之贵，或癸出带辛，异路之荣。或支成炎局，乏水者，奔波之客，有壬癸制者，捐纳之人，又见戊己透者则否，无壬癸制火者，又宜戊己出乾补金泄火，庶不夭折孤贫。总之仲夏无水，非上格，或一派木火，无伤，印，比劫，又作从杀而论。己未，庚午，庚戌．","庚6":"三伏生寒，顽钝极矣，先用丁火，次取甲木。丁甲两透名显身荣，忌癸伤丁，有甲无丁，庸俗，有丁无甲，生员，丁甲全无，下贱之人，木虽有，丁不透，支又见水，执鞭之士，丁火无伤，贸易之流。支会土局，甲先丁后，甲透者，文章显达，丁透者，刀笔扬名。或柱多金，有二丁出制，异路功名。","庚7":"刚锐极矣，专用丁火煆炼，次取木引丁，故曰，秋金锐锐最为奇，壬癸相逢总不宜，如逢木火来成局，试看福寿与天齐，如得丁甲两透，定步青云，若有丁无甲为俊秀，有甲无丁是平人，丁甲两无无用物，只堪门下作闲人。或支成水局，乏丁用丙，柱中即有丙火，不见甲木者，必主愚懦，何也，当时金水两旺，金生水以制火，何能发达，或见甲出引丁，可云生监，甲弱者，衣食充盈。或支成土局，先甲后丁。支成火局，富贵中人，金刚木明，行商坐贾之人，金备申酉戌之地，富贵疑，金神入火乡，逢羊刃富贵荣华。","庚8":"刚锐支退，用丁甲，丙不可少，若丁甲透，又见一丙，功名显赫，且见羊刃无刑冲，丙杀藏支，名为羊刃架杀，主出将入相，直介忠臣。或丙火重重，一丁高透，亦主科甲，丙出丁藏，异路之仕。或甲藏支，火透而水不透者，亦主清高，衣衿可望。或丁藏支内，重见丙火者，此名假杀重重，虽羊刃帖身，郤难从杀也。即一丙透，秀而不富，或支见重重甲乙，无用人也，总之旺金木衰，非火莫制，不见丙丁，艺术之辈。","庚9":"戊土司令，最怕土厚埋金，宜先用甲疏，后用壬洗，则金自出矣，忌见己土浊壬。壬甲两透，科甲相宜，或甲透壬藏，乡魁可望，甲藏壬透，廪贡堪谋，有甲无壬，犹有学问，有壬无甲，莫问衣衿，壬甲两无，则为下格。或支成水局，丙透救之，此人才高迈众，名重乡闾，不见癸水，一榜可许。或四柱戊多金旺，全无甲壬者，即有衣禄，亦不能久，或庚戊多无壬甲者，愚顽之辈。","庚10":"水冷性寒，非丁莫造，非丙不暖。丁甲两透，支无水局，一榜有之，支藏丙火，桃浪之仙，支见亥子，得己出制，亦有功名。若见丙透无丁者，无显达，丁藏甲透，武职之人，以上不合者，庸俗。如金水混杂，全无丙丁者，鄙夫，支成金局，无火者，僧道之命也，书曰，水冷金寒爱丙丁。","庚11":"天气严寒，仍取丁甲，次取丙火照暖，或丁甲两透，丙在支中，必主科甲，即无丙火，亦有衣衿，有丁无甲，亦可富中取贵，有甲无丁，只作常人，或丙透丁藏，异途名望，丁藏有甲，武学可许。或重重丙火，可许一富，但不清高，丙戊生寅，或丙底坐寅，有一二者，富真贵假，若见癸透，一介寒儒。或支成水局，不见丙丁者，此乃伤官格，为人清雅，衣禄常盈，但子息艰难耳。或丙丁太多，名官煞混杂最无良，又怕身轻有损伤，如遇东南二运地，焉能挨得过时光，过于清冷，似有凄凉，柱中一派金水，不入火土之乡，主一生孤贫浪荡，难望有成也。","庚12":"寒气太重，且多湿泥，愈寒愈冻，先取丙火解冻，次取丁火炼金，甲亦不可少。丙丁甲透者，即不科甲，亦有恩荣，有丙无丁甲者，富中取贵，有丁甲无丙者，特达才人，有丙丁无甲者，白手成家，刀笔亨通，乏金更美，或支成金局无水，僧道之流。","辛1":"阳气舒而寒未除，不知正月建寅，中有长生之丙，解去寒气，忌甲木司权，辛金失令，取己土为身之本，欲得辛金发现，全赖壬水之功，己壬两透，支见庚制甲，科甲定然，或己土透干，支中有甲，异路恩荣，或己土不全，号曰君臣失势，富贵难全，或有丙火出乾，亦主武学，或见壬，无己庚者，贫贱之徒。或支成火局，即壬水出乾，不克己土，亦寻常之人，或庚壬两透，破局制火，必为显达之人。或支成水局，不见丙火，名为金弱沉寒，平常之士，书曰金水性寒寒到底，凄凉难免少年忧，得丙透照暖，反主富贵。故正月辛金，先己后壬，己为君，庚为佐，如用丙火须参看，用己，火妻土子，用壬，金妻水子。辛金珠玉，最怕红炉，辛逢卯日，子时，名曰朝阳。","辛2":"阳和之际，壬水为尊，见戊己为病，得甲制伏，则辛金不致埋没，壬水不致混浊，合此者必身入玉堂，故二月庚金，有壬甲透者贵显，不则，乡绅，或壬坐亥支，不见土出，可能入芥，家亦小康，得申中之壬者，异途名望，无壬者常人，其生克之理，与正月辛金皆同。或壬戊透，甲不出乾，此为病不遇药，平常之人，得乙破戊，颇有衣衿，但假名假利，刻薄乖张。或一派壬水汪洋，名金水淘洗太过，不得中和，略有衣食，全无作为，如壬水重重，得戊反吉。或支成木局，泄尽壬水，有庚富贵，无庚平人。或支成火局，名官印相争，金水两伤，下流之格，得二壬出制，富贵反奇。辛金生于春季，一派壬水，而无丙水，即能显达，家无宿舂，得壬丙齐透，方许大富大贵。","辛3":"戊土司令，辛承正气，母旺子相，先壬后甲，壬甲两透，富贵必然，壬透甲藏，廪贡不失，甲透壬藏，富贵可云，壬甲皆无，平常之格。所忌者丙贪合也，如月时皆丙，名为争合，主慷慨风流，交四海，若癸出乾制丙，可许采芹，或支坐亥子之乡，支又见申，即非玉堂，亦必高增禄位，若戊出乾制水，不见甲乙，清闲之人。又或支见四库，名土厚埋金，不见甲制，愚顽之辈。或四柱火多，无水制伏，名火土杂乱，主作缁衣，见癸可解。或比劫重重，壬癸浅弱，主夭，有甲出乾，则贵，然无庚制方妙。","辛4":"时道首夏，忌丙火之燥烈，喜壬水之洗淘，支成金局，水透出乾，有木制戊，名一清澈底，科甲功名，癸透壬藏，富真贵假，若壬癸皆藏，戊己亦藏，略富，若壬癸俱无，反见火出，必主鳏独。或支成火局，有制者吉，无制者凶，凡火旺无水，取土泄之。若壬水藏亥，戊不出乾，亦主上达，有戊常人，有一甲透，衣禄可求，若有甲无壬癸者，富贵虚浮，所谓羊质虎皮是也。壬，癸，甲，三者全无，又不合格，斯为下品。","辛5":"丁火司权，辛金失令，阴柔之极，不宜煆炼，须己壬兼用，何也，己为泥沙，壬为湖海，己无壬不湿，辛无己不生，故壬己并用，无壬，癸亦可用，但癸力小，或支成火局，即重见癸出，亦不济，得壬透破火方可，必主生员，若无壬，癸见戊，虽有午宫己土，燥泥成灰，金必煆熔，反遭埋没，必为僧道，有一二重比肩，不致孤独。","辛6":"己土当权，辅助太多，恐掩金光，先用壬水，取庚佐之，壬庚两透，科甲功名，即不出乾，藏支得所，亦有荣华，但忌戊出，得甲制之，方吉，甲须隔位，恐贪己合，反掩金光，又寒壬水之流，下贱之格，又忌庚出制甲，或只有未中一己，见子壬水，又为湿泥，不可见甲，甲出，反作平人，总以一壬一己，见庚无甲，方妙，与五月用己壬同。或丁乙出乾，又有庚壬者，显贵，无壬者，否，或支成木局，得壬透，又有庚金发水之源，可云富贵。","辛7":"值庚司令，不旺自旺，且壬水居申，四柱不见戊土，胎元戊藏申内，为壬岸，人命得此，为官清正，但不富耳。或有土无甲，为有病无药，常人，有甲者，衣衿可望。或四柱金多，宜水泄之，若一金水，得一戊土，反为辛用，又宜甲制，自然富贵。或干支水多，重见戊土，逢生得位，福寿之造。","辛8":"当权得令，旺之极矣，专用壬水淘洗，故云金见水以流通，如见戊己，则生扶太过，故以土为病，见甲制土，方妙，无戊，不宜用甲。或四柱一点壬水，甲多泄水，此为用神无力，奸诈之徒，得庚制者，反主仁义，或三点辛金，一重壬水，多见甲木，有庚透者，主大富贵，不见丁为美，若见一丁，此人风雅清高，衣食饶裕而已。或一二比肩，壬甲皆一，无庚出乾，亦有恩荣。若二三比肩，一点壬水，戊土多见，此为土厚埋金，此人愚懦，见一甲出，必为创立之人。或一派辛金，一位壬水，无庚杂乱，又主富中取贵。或一派壬水泄金，无戊出制，为沙水同流，主奔波贫苦，若得支见一戊止流，其人颇有才略，艺术过人。或支成金局，干见比肩，无壬淘洗，此宜用丁，无丁必主凶顽无赖，若得一壬高透，以泄群金，又名一清到底，定有治国之材。或支成金局，戊己透干，壬透无火，名白虎格，运行西北，富贵大显，子息艰难，或透丙火，虽有壬出，亦属平庸。或一二辛金，一派己土，定为僧道，或乾透己土，支见庚甲，一生安闲。或一派乙木，不见庚壬，为才多身弱，一见庚制，富贵可期。金生秋月土重，贫无寸铁，六辛日透戊子时，运喜西方，阴若朝阳，切忌丙丁离位，庚辛局全巳酉丑，位重权高。","辛9":"成土司令，母旺子相，须甲疏土，壬泄旺金，先壬后甲，壬甲两透，桃洞之仙，或壬透甲藏，又见者，平人，甲透，壬藏，戊在支内，异途之仕。或辛日甲月，壬水在支，有庚自能去浊留清，秋闻一榜，若戊戌月，即有甲在支亦否。总之土太多，甲不出乾，莫问功名，一壬出，洗土助甲，虽不发达，富而可求。或土多无壬甲，时月多透丙辛者，略贵，加以辰字在支，则荣显莫及。或木多土厚，无水者常人，或干上重见癸水，虽无淘洗之功，颇有清金之用，此命主富，辛苦。或己透无壬有癸，亦能滋生金力，衣衿之贵，但恐己多，不免浊富。","辛10":"时值小阳，阳渐升，寒气将降，先用壬水，次取丙火，壬丙两透，金榜题名，何也，盖辛金有壬水丙火，名金白水清，又在亥月故发。丙透壬藏，采芹之造，丙藏壬透，富有千金，壬丙在支，聪明之士。戊壬存柱，积蓄之人，或壬多无戊，名辛水汪洋，反成贫贱，戊多壬少，又主成名。或甲多戊少，因艺术而蓄金。若己多有戊，壬水被困，金被埋，不过诚实之人，或壬癸多无戊丙者，劳碌辛苦，十月辛金，先壬后丙，馀皆参用。","辛11":"癸水司令，为寒冬雨露，切忌癸出冻金，而困丙火，壬丙两透，不见戊癸，衣锦腰金，即壬藏丙透，一榜堪图。或壬多有戊，丙甲出乾者，青云之客，若壬多无戊丙者，泄金太过，定主寒儒，或壬多，甲乙重重，无丙火者，贫寒。或支成水局，癸水出乾，有二戊制者，富贵恩荣，无戊者常人。或支见亥子丑，乾出比劫，无丙，名润下格，富贵双全，运喜西北，若无庚辛，又出甲乙，无戊丙者，必主僧道。或支成木局，有丁出乾，又见戊者，功名特达，冬月辛金，须丙温暖，方妙。","辛12":"寒冻之极，先丙后壬，炳不能解冻，无壬不能洗淘，丙壬两透，金马玉堂之客，壬丙俱藏，游庠食　之人，有丙无壬，富真贵假，有壬乏丙，贱而且贫，或丙多，无壬，有癸，市中贸易之流。或水多，有戊己出乾，又有丙丁，必主衣食充盈，一生安乐，十二月辛金，丙先壬后，戊己次之。","壬1":"汪洋之象，能并百川之流，然水性柔弱，宜用庚金之源，庶不致汪洋无度，有庚丙戊三者齐透，科甲功名，或庚戊藏支，丙坐寅支者，亦有恩诰，即一庚透，贡监有之。凡壬日无比肩羊刃者，不必用戊，专用庚金，以丙为佐。或见比劫，又有庚辛，此弱极复旺，又宜制伏，成透，可云科甲，戊藏，则是秀才，然必丙透不合，为妙。或支见多戊，又有甲出乾，名一将当关，群邪自伏，主光明磊落，名重百寮。或支成火局，借不逢时，主名利皆虚，文章骇俗。用庚者，土妻金子，用丙者，木妻火子，用戊者，火妻土子。","壬2":"寒气初除，有并流之象，不用丙暖，专取戊土辛金，二月壬水，先戊后辛，庚金次之。戊辛两透，雁塔题名，戊透辛藏，亦有恩诰，或戊辛不透，有庚出乾者，主富。或支成木局，有庚透者，金榜题名，在水，者异途之任。或木出火多，名木盛火炎，须比肩羊刃，尤宜水透，富贵恩荣，乏水者则否。或比肩重重，又须戊土，书曰，土止流水福寿全，若戊不见，名水泛木浮，一生辛苦，再行水运，落水身亡。或甲乙重重无比肩者，此依人度日，全无作为，若见庚辛，饥寒可免。","壬3":"戊土司权，死有推山塞海之患，先用甲疏季土，次取庚金。甲庚俱透，科甲定然，甲透庚藏，修齐品格，甲藏有根，可云俊秀，有癸滋甲，必主乾城，独甲藏支，必富，独庚在柱，常人，无甲，刚暴之徒，乏庚，愚顽之辈。或时乾透丁者，此为化合，助火而不助水，见丁未一理。或支成四库，乏甲者，名杀重身轻，终身有损。凡水旺多见庚金者，乃无用之人，须丙制之方妙。","壬4":"丙火司权，水弱极矣，专取壬水比肩为助，次取辛金发源，且暗合丙火，庚金为佐。壬辛两透，金榜有名，或癸辛两出，加以甲透，亦主异路之荣，无甲者，富贵门下之客。如无壬，木少火多者，又作弃命从才格，因妻致富，癸透者残疾。或四柱多金得地，则弱极复强，须用巳中戊土，亦主名利双全，或异途之贵，若见一甲藏寅，与己相刑，主有暗疾，名利皆虚，不能创立。或多甲乙，有庚出乾者，贵，无庚者否。或支成水局，大贵。","壬5":"丁旺壬弱，取癸为用，取庚为佐，无庚不能发水，无癸不能伤丁，五月壬水，辛癸亦可参用，其理与四月皆同。庚癸两透，科甲必然，庚壬两透，官居极品，有庚无壬癸者，常人。或支成火局，全无金水，名才多身弱，富屋贫人，若又甲乙多者，僧道之命。","壬6":"己土当权，丁火退气，先用辛金癸水，次用甲木劈土，六月壬水，先辛后甲，次取癸水。辛甲两透，富贵清高，甲藏辛透，贡监生员，辛藏甲透，异途武职，甲壬两透，无伤，有治国之贵，即甲藏壬出无破，是拾芥之才，或支多土火，又只清贫。或一派己土，此假从杀格，为人奸诈，且主孤贫，得甲乙出制可救，凡土居生旺之地，须用木制方妙。或支成木局，泄水太过，当用金水为贵，以金为妻，水为子。","壬7":"庚金司令，壬得申之长生，源流自远，转弱为强，专用戊土，次取丁火佐戊制庚，但用辰戌之戊，不用申中受病之戊，戊丁俱透，科甲生员，戊透天干，丁藏午戌，恩封可待，特忌戊癸化合，即支见寅戌，年出丁火，可许衣衿，或丁戊两藏，富中取贵。或四柱多壬戊又透干，名假杀化权，阆苑之仙，支中见甲，亦不忌也，但太多者，常人，有庚居申，颇有衣禄。或戊多而透，得一甲制，略贵，无甲常人，或一派甲木，又见火多，无庚出者，别祖离乡，随缘度日，盖申中之庚，不能救也。","壬8":"辛金司权，正金白水清，忌戊土为病，专用甲木，甲木一透制戊，壬水澈底澄清，名高翰苑，若甲出时干，功名显达，设见庚破，又属常人，即甲藏支，无庚，秀才可许。或天干有壬，支见申亥，此非用甲，戊土作用，亥虽有甲，又有申中之金制甲，秀才一定，且富足多才。或无戊，多金水者，主人清才浊，困苦寒儒。无甲用金，发水之源，名独水三犯庚辛，号曰体全之象。","壬9":"九月壬水进气，其性将厚，若一派壬水，见一甲，制戌中之戊，戊又出乾，斯用丙火，此格清贵极矣，正合一将当关，群邪自伏，或不见丙戊，亦不为妙。或一派戊土，无一己庚杂乱，得一甲透时干，玉堂清贵，即甲透月上，亦主科甲，若支藏己土，一榜可图，或庚乏丁，贫贱之人。或丁透见甲，略贵。或水多乏丙者，又用戊土，常人。","壬10":"十月壬水司权，至旺之极，取戊为用，若生辰日乾，又见辰时，必须戊透，又须庚制甲，不伤戊土，戊庚两全，定主登科及第，，位显权高，或甲出制戊，不见庚救者，断之困穷，戊藏无制，可许生员，或戊庚两透无甲者，亦主荣显。或支木局，有甲乙出乾，得庚透者，富贵，无庚者，平常。或支成水局，不见戊己，名润下格，运行西北，大富贵，行东南者，必危。或丙戊两透，行火土运，名利双全，或有丙无戊，可云衣禄，有戊无丙，难许推盈，十月壬水，专用戊丙，次取庚金。","壬11":"阳刃帮身，较前更旺，先取戊土，次用丙火，丙戊两透，富贵荣华，有戊无丙，略可言富，有丙无戊，好谋无成。或支成水局，丙不出乾，即有戊土，亦系庸人，或丙透得所，即戊藏支，亦可显达，须运得用方妙。或支成火局，一富而已。或比见月时，年见丁火，平常之辈，支成四库，富贵中人，或丁出时干，名为争合，主名利难成。或壬子日，丁未时，虽不能科甲，亦有恩荣，何也，盖用子中癸水为宫，号曰用神得地，亦主荣华。","壬12":"旺极复衰，何也，上半月癸辛主事，故旺，专用丙火，下半月己土主事，故衰，亦用丙火，甲木佐之。有丙解冻，名利双全，丙透甲出，科甲之贵，然四柱无壬，方妙，无丙，单寒之士。或四柱多壬，戊透制之，衣衿可望。或丁出时干，化合成木，月乾又见丁火，无癸破格，亦主富贵。或支成金局，不见丙丁，名金寒水冷，一世孤贫，见火略可，即丙透遇辛，亦不为妙，见丁颇吉。腊月壬水，先取丙火，丁甲为佐，故水冷金寒爱丙丁，用火者，木妻火子。水旺居垣须有智，水土混杂必愚顽，壬癸路经南域，主健，富贵堪图，又云，惟有水木伤官格，才官相见始为欢。","癸1":"值三阳之后，雨露之精，其性至柔，先用辛金，生癸水之源，次用丙火照暖，名阴阳和合，万物发生，辛丙两透，金榜有名。或支成火局，辛金受伤，有壬出救者，富贵，无壬者，贫穷，或丙出天干，辛在酉丑，亦有衣衿，若辛丙皆无，贫寒下格，或辛透丙藏，恩荣之造，丙辛在柱，以富得官。或戊透月上，坐辰时，不见比劫，丙丁出乾，此为化合，定主腰金，见刑冲，则否。或支成水局，宜有丙透，无壬者，衣禄不少，若见丙火重重，又作贵推。","癸2":"二月葵水，不刚不柔，乙木司令，泄弱元神，专用庚金为用，辛金次之，庚辛俱透，无丁出乾者，贵由科甲，无庚辛者常人。或庚透辛藏，荣封有准，庚藏辛透，亦有衣衿，庚辛两藏，富中取贵，或刀笔扬名，或庚辛重见，有己丁出乾者亦贵。或支成木局，月时又见木者，为泄水太过，定主贫困多灾，即运入西方，亦属无用。","癸3":"要分清明谷雨，清明后，火气未炽，专用丙火，为阴阳合谐，谷雨后，虽用丙火，尚宜辛甲佐之，如辛卯，壬辰，癸未，丙辰，生上半月，用丙火，显达，生下半月，必无伤辛金癸水，方妙，然丙亦不可少，用丙，木妻水子。","癸4":"喜辛金为用，无辛用庚，若辛高透，不见丁火，加以壬透，主科名荣贵，声播四夷，若有丁破格，贫无立锥，有壬可免，辛藏无丁，贡监衣衿。或一派火土乏辛，即有巳庚，亦不能生水，又无比肩羊刃，必至熬乾癸水，损日无疑，艾壬两透，泄制火土，名劫印化晋，极贵之造，有丁见乾者，则否，如有庚无壬，亦无丁破金者，堪入儒林，有庚无辛者，异路功名，总之四月癸水，专用辛金方妙。","癸5":"至弱无根，必须庚辛为生身之本，但丁火司权，金难敌火，安能滋养癸水，宜见比劫，方得辛金之用，五月癸水，庚辛壬参酌并用可也。如庚辛透干，又见壬癸者，定主锺鼎名家，或有金透，支见申子辰者，亦主金榜挂名，或无水出乾，支只一水，虽有庚辛，一富之造，故曰，水源会，富重贵轻，又曰，金水会夏天，富贵永无边，运行火土地，快乐似神仙。或支成炎局，无壬出乾，定主僧道，或二壬一庚同透，衣锦腰金。或一派己土，无甲出制，此作从杀而论，又主大贵，凡从杀者，切不可破格方吉。","癸6":"有上下月之分，下半月庚辛有气，上半月庚辛休囚，凡六癸日，多不验者，何也，俗士不知此理，因未中有乙巳同宫，破而不破，故癸水不能从杀，所以专用庚辛，如上半月金神衰弱，火气炎烈，宜比劫助身，可云富贵，与五月一理，下半月庚辛有气，即无比劫亦可，又忌丁透，即丁在支亦不吉，其生克制化，与五月略同。","癸7":"正母旺子相之时，癸虽死申，殊不知申中有庚生之，名死处逢生，弱中复强，即运行西北，亦不死也，但庚司令，刚锐极矣，必取丁火为用，或丁透有甲，名有焰之火，必主科甲，或丁透无甲，又无壬癸，即有一二庚金，亦有生监，有二丁更妙，或金多乏丁制者，贫困之人。或一丁坐午，名独才格，主金玉满堂，富中取贵，若在未戌，则是常人，或柱见二戌二未，又得丙丁藏支，干见甲出，无水，亦作富贵而推。","癸8":"辛金虚灵，非顽金可比，正金白水清，故取辛金为用，丙火佐之，名水暖金温，如丙与辛隔位同透，主科甲功名，或丙透辛藏，一榜之士，或土多克水，生意中心，八月癸水，丙辛怕用。","癸9":"失令无根，戊土司权，克制太过，专用辛金发水之源，要比肩滋甲制戊方妙。或辛甲两透，支见子癸，定主平步青云，或癸甲两透，富贵成名，或有甲辛无癸者，亦有恩封，或有甲癸无辛者，富大贵小，有甲无癸辛者，常人，二者俱无，贫贱之格。或有甲见壬者，颇许衣衿。","癸10":"旺中有弱，何也，因亥摇木，泄散元神，宜用庚辛为妙，得庚辛两透，不见丁伤者，功名有准。或支成木局，有丁出乾，为木旺火相，制住庚辛不生水，必主清寒，或成木局，干见丙丁，异路之荣。或一派壬水，不见戊制，名冬水汪洋，奔波到老，若得戊透，清贵堪夸。或一派庚辛，得丁出制，主名利双全，若不见丁，又主贫薄。或四柱火多，名才多身弱，富屋贫人。","癸11":"值冰冻之时，金水无交欢之象，专用丙火解冻，庶不致成冰，又要辛金滋扶，无丙有辛，不妙，凡冬季癸水，有丙透解冻，则金温水暖，两两相生，要不见壬透，自然登科及第，紫诰金章。或一派壬水，无丙出乾，寒困之士，一派癸水，孤贱之流，或支成水局，得丙火重出乾者，又主蟒袍玉带之荣。或支成金局，丙火无踪者，芒鞋革履之流。如辛年，丙月，癸日，有火者，主恩荣宠锡，绕膝芝兰，无火者，损资得贵，位重当朝。或一派戊己，名杀重身轻，非贫即夭。用火者，木妻火子，用辛者，土妻金子。","癸12":"寒极成冰，万物不能舒泰，宜丙火解冻，或丙透年时，加以壬透，支中多戊，名水辅阳光，主显达名臣，无戊者，异途之职，若有丙无壬，黉门之客，有壬无丙，戊又出乾者，皂隶之流。或支见子丑，比肩出乾，即有丙透，不能解冻，此属平常，或无癸水，有辛与合，亦不为美，有丁出，颇吉。或一片癸己会党，年透丁火，名雪后灯光，夜生者贵，日生者否，若无丁火，又主孤贫。或支成水局，无丙者，四海为家，一生劳苦。或支成火局，有庚辛透者，衣食充足，无金出，孤苦零丁。或支成金局，丙透得地，名金温水暖，彼此相生，定许光大门闾，声驰翰苑，乏丙者，即文章骇世，总为孙山。或支成木局，泄水太过，主残病呻吟，得金出乾辅救，技艺之流。凡冬月用丙，须丙火得地方妙，不然，即重重丙火出乾，安能轻许富贵哉。"};

function getSolarYear(year, month, day) {
  // 返回干支年：以立春(约2月4日)为界换年
  let y = year;
  if (month < 2 || (month === 2 && day < 4)) y--;
  return y;
}

function getYearGanzhi(year) {
  const idx = ((year - 4) % 60 + 60) % 60;
  return { tg: TIANGAN[idx % 10], dz: DIZHI[idx % 12], idx };
}

function getMonthGanzhi(year, month, day) {
  // FIX: 修复月柱undefined bug - lunarMonthIdx=-1时归入腊月(11)
  const solarYear = getSolarYear(year, month, day);
  const inputDate = new Date(year, month - 1, day);
  let lunarMonthIdx = -1;

  for (let i = 0; i < 12; i++) {
    const jq = JIEQI_MONTHS[i];
    const jqDate = new Date(year, jq.m - 1, jq.d);
    let nextDate;
    if (i < 11) {
      const nj = JIEQI_MONTHS[i + 1];
      const njYear = (nj.m === 1) ? year + 1 : year;
      nextDate = new Date(njYear, nj.m - 1, nj.d);
    } else {
      nextDate = new Date(year + 1, 1, 4); // 下一年立春
    }
    if (inputDate >= jqDate && inputDate < nextDate) {
      lunarMonthIdx = i;
      break;
    }
  }

  // 未匹配（极少边界情况）：归入上一年腊月
  if (lunarMonthIdx === -1) lunarMonthIdx = 11;

  const ygIdx = ((solarYear - 4) % 10 + 10) % 10;
  // 五虎遁年起月法：甲己→丙寅(2), 乙庚→戊寅(4), 丙辛→庚寅(6), 丁壬→壬寅(8), 戊癸→甲寅(0)
  const monthTgBase = ((ygIdx % 5) * 2 + 2) % 10;
  const monthTgIdx = (monthTgBase + lunarMonthIdx) % 10;
  const monthDzIdx = (2 + lunarMonthIdx) % 12;

  return {
    tg: TIANGAN[monthTgIdx],
    dz: DIZHI[monthDzIdx],
    monthIdx: lunarMonthIdx
  };
}

// 日柱：以2000年1月1日(戊午日, idx=54)为基准
// 锚点：万年历确认1995年4月26日=丁亥日(idx=23)，由此反推2000/1/1的idx=54
function getDayGanzhi(year, month, day) {
  const base = new Date(2000, 0, 1);
  const target = new Date(year, month - 1, day);
  const diff = Math.round((target - base) / 86400000);
  const idx = ((54 + diff) % 60 + 60) % 60;
  return { tg: TIANGAN[idx % 10], dz: DIZHI[idx % 12], idx };
}

function getHourGanzhi(dayTgIdx, hour) {
  // 时辰
  let dzIdx;
  if (hour === 23 || hour === 0) dzIdx = 0;
  else dzIdx = Math.floor((hour + 1) / 2) % 12;
  
  const tgBase = (dayTgIdx % 5) * 2;
  const tgIdx = (tgBase + dzIdx) % 10;
  return { tg: TIANGAN[tgIdx], dz: DIZHI[dzIdx] };
}

// 获取月令当令人元（司令藏干）
// lunarMonthIdx: getMonthGanzhi返回的monthIdx (0=寅月, 1=卯月...11=丑月)
// year/month/day: 用于计算入月节气后天数（使用calcYear/calcMonth/calcDay）
function getYuanlingGan(lunarMonthIdx, year, month, day) {
  const jq = JIEQI_MONTHS[lunarMonthIdx];
  const jqDate = new Date(year, jq.m - 1, jq.d);
  const inputDate = new Date(year, month - 1, day);
  const daysIn = Math.max(1, Math.round((inputDate - jqDate) / 86400000) + 1);

  const monthDzIdx = (2 + lunarMonthIdx) % 12; // 寅月=2,卯月=3,...,丑月=1
  const table = YUANLING_TABLE[monthDzIdx];
  let cumDays = 0;
  for (const seg of table) {
    cumDays += seg.days;
    if (daysIn <= cumDays) return { gan: seg.gan, daysIn };
  }
  return { gan: table[table.length - 1].gan, daysIn };
}

function getChangsheng(tg, dz) {
  const tgIdx = TIANGAN.indexOf(tg);
  const dzIdx = DIZHI.indexOf(dz);
  const startDz = CHANGSHENG_START[tg];
  const isYang = YANGGAN.includes(tg);
  let diff;
  if (isYang) {
    diff = (dzIdx - startDz + 12) % 12;
  } else {
    diff = (startDz - dzIdx + 12) % 12;
  }
  return CHANGSHENG[diff];
}

function getNayin(tgIdx, dzIdx) {
  const ganzhiIdx = Math.floor(((tgIdx) * 6 + dzIdx * 0.5)) % 30;
  // 纳音：每两个干支共一纳音
  const pairIdx = Math.floor(((tgIdx % 10) + (dzIdx % 12)) / 2) % 30;
  // 简化算法
  const idx60 = ((tgIdx % 10) * 6) % 30;
  return NAYIN[Math.abs(tgIdx * 3 + Math.floor(dzIdx/2)) % 30];
}

// 十神
function getShishen(riTg, targetTg) {
  const riWx = WUXING_TG[TIANGAN.indexOf(riTg)];
  const targetWx = WUXING_TG[TIANGAN.indexOf(targetTg)];
  const riYy = YINYANG_TG[TIANGAN.indexOf(riTg)];
  const targetYy = YINYANG_TG[TIANGAN.indexOf(targetTg)];
  const same = riYy === targetYy;
  
  const SHENG = {木:'火',火:'土',土:'金',金:'水',水:'木'};
  const KE = {木:'土',土:'水',水:'火',火:'金',金:'木'};
  
  if (targetWx === riWx) return same ? '比肩' : '劫财';
  if (SHENG[riWx] === targetWx) return same ? '食神' : '伤官';
  if (SHENG[targetWx] === riWx) return same ? '偏印' : '正印';
  if (KE[riWx] === targetWx) return same ? '偏财' : '正财';
  if (KE[targetWx] === riWx) return same ? '七杀' : '正官';
  return '';
}

function calcBazi(year, month, day, hour, gender) {
  // 早子时（00:00–01:00）：时柱为子时，但日柱以前一天计
  // 例：用户输入3月6日早子时 → 日柱用3月5日，时柱仍为子时
  let calcYear = year, calcMonth = month, calcDay = day;
  if (hour === 0) {
    const prev = new Date(year, month - 1, day - 1);
    calcYear  = prev.getFullYear();
    calcMonth = prev.getMonth() + 1;
    calcDay   = prev.getDate();
  }

  const yearGZ  = getYearGanzhi(calcYear);
  const monthGZ = getMonthGanzhi(calcYear, calcMonth, calcDay);
  const dayGZ   = getDayGanzhi(calcYear, calcMonth, calcDay);
  // 晚子时（23:00）：日柱用当天，但时柱天干用次日日干推算
  let hourDayTgIdx;
  if (hour === 23) {
    const nextDay = new Date(calcYear, calcMonth - 1, calcDay + 1);
    const nextDayGZ = getDayGanzhi(nextDay.getFullYear(), nextDay.getMonth() + 1, nextDay.getDate());
    hourDayTgIdx = TIANGAN.indexOf(nextDayGZ.tg);
  } else {
    hourDayTgIdx = TIANGAN.indexOf(dayGZ.tg);
  }
  const hourGZ  = getHourGanzhi(hourDayTgIdx, hour);

  const pillars = [
    { label: '年柱', ...yearGZ, cs: getChangsheng(dayGZ.tg, yearGZ.dz) },
    { label: '月柱', ...monthGZ, cs: getChangsheng(dayGZ.tg, monthGZ.dz) },
    { label: '日柱', ...dayGZ, cs: '日主' },
    { label: '时柱', ...hourGZ, cs: getChangsheng(dayGZ.tg, hourGZ.dz) }
  ];

  // 五行统计
  const wuxingCount = {木:0, 火:0, 土:0, 金:0, 水:0};
  pillars.forEach(p => {
    wuxingCount[WUXING_TG[TIANGAN.indexOf(p.tg)]]++;
    wuxingCount[WUXING_DZ[DIZHI.indexOf(p.dz)]]++;
    // 藏干
    CANGGAN[p.dz]?.forEach(cg => {
      wuxingCount[WUXING_TG[TIANGAN.indexOf(cg)]] += 0.5;
    });
  });

  // 大运
  const dayuns = calcDayun(year, month, day, monthGZ.monthIdx, gender, yearGZ.tg);

  // 十神
  pillars.forEach((p, i) => {
    if (i !== 2) {
      p.shishen_tg = getShishen(dayGZ.tg, p.tg);
    } else {
      p.shishen_tg = '日主';
    }
    p.shishen_dz = CANGGAN[p.dz]?.[0] ? getShishen(dayGZ.tg, CANGGAN[p.dz][0]) : '';
    p.canggan = CANGGAN[p.dz] || [];
  });

  // 空亡
  const dayIdx = dayGZ.idx;
  const xunStart = Math.floor(dayIdx / 10) * 10;
  const kongwang = DIZHI[(xunStart % 12) + 10] + DIZHI[(xunStart % 12) + 11] || '戌亥';

  return { pillars, wuxingCount, dayuns, dayGZ, yearGZ, kongwang, gender,
           monthIdx: monthGZ.monthIdx, calcYear, calcMonth, calcDay };
}

function calcDayun(year, month, day, monthIdx, gender, yearTg) {
  // 阳年男、阴年女顺排；阴年男、阳年女逆排
  const yearTgIdx = TIANGAN.indexOf(yearTg);
  const isYangYear = yearTgIdx % 2 === 0;
  const isMale = gender === 'male';
  const shun = (isYangYear && isMale) || (!isYangYear && !isMale);

  // 起运岁数：出生日到下一个（顺）或上一个（逆）节气的实际天数÷3取整
  const birthDate = new Date(year, month - 1, day);
  let qiyunDays;
  if (shun) {
    const nextMonthIdx = (monthIdx + 1) % 12;
    const nextJq = JIEQI_MONTHS[nextMonthIdx];
    let njYear = year;
    if (nextJq.m < month) njYear = year + 1; // 跨年（如子月→小寒1月）
    const nextJqDate = new Date(njYear, nextJq.m - 1, nextJq.d);
    qiyunDays = Math.round((nextJqDate - birthDate) / 86400000);
  } else {
    const jq = JIEQI_MONTHS[monthIdx];
    let jqYear = year;
    if (jq.m > month) jqYear = year - 1; // 跨年（如子月生于1月，节气在前年12月）
    const jqDate = new Date(jqYear, jq.m - 1, jq.d);
    qiyunDays = Math.round((birthDate - jqDate) / 86400000);
  }
  const qiyunAge = Math.max(1, Math.round(qiyunDays / 3));

  const dayuns = [];
  // 月柱干支索引
  const monthTgBase = (Math.floor(((year - 4) % 10 + 10) % 10 / 1) % 5) * 2;
  const startTgIdx = TIANGAN.indexOf(TIANGAN[monthTgBase + monthIdx % 10]) ;
  
  // 重新计算月柱干支索引
  const yearSolar = getSolarYear(year, month, day);
  const ygIdx = ((yearSolar - 4) % 10 + 10) % 10;
  const mTgBase = ((ygIdx % 5) * 2 + 2) % 10;
  const mTgIdx = (mTgBase + monthIdx) % 10;
  const mDzIdx = (2 + monthIdx) % 12;

  for (let i = 1; i <= 10; i++) {
    let tgIdx, dzIdx;
    if (shun) {
      tgIdx = (mTgIdx + i) % 10;
      dzIdx = (mDzIdx + i) % 12;
    } else {
      tgIdx = (mTgIdx - i + 100) % 10;
      dzIdx = (mDzIdx - i + 120) % 12;
    }
    dayuns.push({
      tg: TIANGAN[tgIdx],
      dz: DIZHI[dzIdx],
      startAge: qiyunAge + (i - 1) * 10,
      endAge: qiyunAge + i * 10 - 1,
      startYear: year + qiyunAge + (i - 1) * 10
    });
  }
  return { list: dayuns, qiyunAge };
}

function renderWuxing(wuxingCount) {
  const total = Object.values(wuxingCount).reduce((a,b) => a+b, 0);
  const items = [
    {name:'木', color:'#2d7a3a', count: wuxingCount['木']},
    {name:'火', color:'#aa3030', count: wuxingCount['火']},
    {name:'土', color:'#8a6010', count: wuxingCount['土']},
    {name:'金', color:'#3a6888', count: wuxingCount['金']},
    {name:'水', color:'#2a4a9a', count: wuxingCount['水']},
  ];

  // FIX 7: Bars with explicit inline background-color + show percentage
  let barsHtml = '';
  items.forEach(item => {
    const pct = total > 0 ? Math.round(item.count / total * 100) : 0;
    barsHtml += `
      <div class="bar-item">
        <div class="bar-label" style="color:${item.color}">${item.name}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background-color:${item.color};height:100%;"></div>
        </div>
        <div class="bar-pct">${pct}%</div>
      </div>
    `;
  });
  document.getElementById('wuxingBars').innerHTML = barsHtml;

  // FIX 6: Pentagon SVG - labels placed at labelR=r+22 to avoid overlap
  // SVG viewBox 200x200, cx=100,cy=100, r=72 (leaves room for labels at r+22=94)
  const cx = 100, cy = 100, r = 72, labelR = 94;
  const angles = [-90, -18, 54, 126, 198];

  const outerPts = angles.map(a => {
    const rad = a * Math.PI / 180;
    return `${(cx + r * Math.cos(rad)).toFixed(1)},${(cy + r * Math.sin(rad)).toFixed(1)}`;
  }).join(' ');

  // Data polygon: min radius 8 so always visible
  const dataCoords = items.map((item, i) => {
    const ratio = total > 0 ? item.count / (total / 5 * 2.5) : 0;
    const pr = Math.max(8, Math.min(r * ratio, r));
    const rad = angles[i] * Math.PI / 180;
    return { x: (cx + pr * Math.cos(rad)).toFixed(1), y: (cy + pr * Math.sin(rad)).toFixed(1) };
  });

  const dataPts = dataCoords.map(p => `${p.x},${p.y}`).join(' ');

  let svgHtml = '';

  // Grid rings at 1/3, 2/3, 1
  [1/3, 2/3, 1].forEach(f => {
    const gPts = angles.map(a => {
      const rad = a * Math.PI / 180;
      return `${(cx + r*f * Math.cos(rad)).toFixed(1)},${(cy + r*f * Math.sin(rad)).toFixed(1)}`;
    }).join(' ');
    svgHtml += `<polygon points="${gPts}" fill="none" stroke="rgba(201,168,76,${f===1?0.2:0.08})" stroke-width="1"/>`;
  });

  // Axis lines
  angles.forEach(a => {
    const rad = a * Math.PI / 180;
    svgHtml += `<line x1="${cx}" y1="${cy}" x2="${(cx+r*Math.cos(rad)).toFixed(1)}" y2="${(cy+r*Math.sin(rad)).toFixed(1)}" stroke="rgba(201,168,76,0.12)" stroke-width="1"/>`;
  });

  // Data area
  svgHtml += `<polygon points="${dataPts}" fill="rgba(201,168,76,0.18)" stroke="rgba(201,168,76,0.7)" stroke-width="1.5"/>`;
  dataCoords.forEach(p => {
    svgHtml += `<circle cx="${p.x}" cy="${p.y}" r="3" fill="rgba(201,168,76,0.8)"/>`;
  });

  // Labels at labelR - NO overlap with data area since labelR > r
  items.forEach((item, i) => {
    const rad = angles[i] * Math.PI / 180;
    const lx = (cx + labelR * Math.cos(rad)).toFixed(1);
    const ly = (cy + labelR * Math.sin(rad) + 5).toFixed(1);
    svgHtml += `<text x="${lx}" y="${ly}" text-anchor="middle" fill="${item.color}" font-size="14" font-family="'Noto Serif SC','SimSun',serif" font-weight="600">${item.name}</text>`;
  });

  document.getElementById('pentagonChart').innerHTML = svgHtml;
}

function solar2lunar(sy, sm, sd) {
  var r = window._lunarSolarToLunar(sy, sm, sd);
  return { year: r.year, month: r.month, day: r.day, isLeap: r.isLeap };
}

// 对外接口：农历→公历
function lunar2solar(ly, lm, ld, isLeap) {
  return window._lunarLunarToSolar(ly, lm, ld, isLeap || false);
}

const LUNAR_MONTH_NAMES = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
const LUNAR_DAY_NAMES = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
  '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
  '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

function lunarMonthName(m, isLeap) {
  return (isLeap ? '闰' : '') + LUNAR_MONTH_NAMES[m - 1] + '月';
}

function lunarDayName(d) {
  return LUNAR_DAY_NAMES[d - 1] || d + '日';
}

// 已选公历日期（主数据源）

// ── 农历↔公历互转：点击确认后用本地算法转换 ──────────────────
// 状态：是否已完成日期确认
let _dateConfirmed = false;

// 公历确认按钮
function onSolarConfirm() {
  const y = parseInt(document.getElementById('solar-year').value);
  const m = parseInt(document.getElementById('solar-month').value);
  const d = parseInt(document.getElementById('solar-day').value);
  if (!y || !m || !d || y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1 || d > 31) return;
  selectedSolarYear = y; selectedSolarMonth = m; selectedSolarDay = d;
  // 用本地算法同步农历输入框
  try {
    const lunar = solar2lunar(y, m, d);
    document.getElementById('lunar-year').value = lunar.year;
    document.getElementById('lunar-month').value = lunar.month;
    document.getElementById('lunar-day').value = lunar.day;
  } catch(e) {}
  _dateConfirmed = true;
}

// 农历确认按钮：用本地算法转换为公历
function onLunarConfirm() {
  const ly = parseInt(document.getElementById('lunar-year').value);
  const lm = parseInt(document.getElementById('lunar-month').value);
  const ld = parseInt(document.getElementById('lunar-day').value);
  if (!ly || !lm || !ld || ly < 1900 || ly > 2100 || lm < 1 || lm > 13 || ld < 1 || ld > 30) return;
  try {
    const solar = lunar2solar(ly, lm, ld, false);
    selectedSolarYear = solar.year; selectedSolarMonth = solar.month; selectedSolarDay = solar.day;
    document.getElementById('solar-year').value = solar.year;
    document.getElementById('solar-month').value = solar.month;
    document.getElementById('solar-day').value = solar.day;
  } catch(e) {
    alert('农历日期转换失败，请检查输入');
    return;
  }
  _dateConfirmed = true;
}

function openCal(mode) {
  calMode = mode;
  calSelectMode = 'days';
  if (mode === 'solar') {
    calViewYear = selectedSolarYear || 1980;
    calViewMonth = selectedSolarMonth || 1;
  } else {
    try {
      const lunar = solar2lunar(selectedSolarYear, selectedSolarMonth, selectedSolarDay);
      calViewYear = lunar.year;
      calViewMonth = lunar.month;
    } catch(e) {
      calViewYear = 1980; calViewMonth = 1;
    }
  }
  document.getElementById('calOverlay').classList.add('open');
  const popup = document.getElementById('calPopup');
  popup.classList.add('open');

  // Position popup near the button
  const btn = event.target.closest('.cal-btn');
  if (btn) {
    const rect = btn.getBoundingClientRect();
    const popW = 320;
    let left = rect.left;
    if (left + popW > window.innerWidth) left = window.innerWidth - popW - 10;
    let top = rect.bottom + 8;
    if (top + 380 > window.innerHeight) top = rect.top - 390;
    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
  }

  renderCal();
}

function closeCal() {
  document.getElementById('calOverlay').classList.remove('open');
  document.getElementById('calPopup').classList.remove('open');
}

function calNavigate(dir) {
  if (calSelectMode === 'years') {
    calViewYear += dir * 12;
  } else if (calSelectMode === 'months') {
    calViewYear += dir;
  } else {
    calViewMonth += dir;
    if (calViewMonth > 12) { calViewMonth = 1; calViewYear++; }
    if (calViewMonth < 1) { calViewMonth = 12; calViewYear--; }
  }
  renderCal();
}

function calToggleMode() {
  if (calSelectMode === 'days') calSelectMode = 'months';
  else if (calSelectMode === 'months') calSelectMode = 'years';
  else calSelectMode = 'days';
  renderCal();
}

function renderCal() {
  const body = document.getElementById('calBody');
  const title = document.getElementById('calTitle');

  if (calSelectMode === 'years') {
    const start = Math.floor(calViewYear / 12) * 12;
    title.textContent = `${start} – ${start + 11}`;
    let html = '<div class="cal-year-grid">';
    for (let y = start; y < start + 12; y++) {
      const sel = (calMode === 'solar' && y === selectedSolarYear) ||
                  (calMode === 'lunar' && (() => { try { return solar2lunar(selectedSolarYear,selectedSolarMonth,selectedSolarDay).year === y; } catch(e){ return false; } })());
      html += `<div class="cal-year-item${sel?' selected':''}" onclick="calSelectYear(${y})">${y}</div>`;
    }
    html += '</div>';
    body.innerHTML = html;
    return;
  }

  if (calSelectMode === 'months') {
    title.textContent = `${calViewYear}年`;
    const CN_MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const LUNAR_MONTHS_CN = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
    const names = calMode === 'solar' ? CN_MONTHS : LUNAR_MONTHS_CN;
    let html = '<div class="cal-month-grid">';
    for (let m = 1; m <= 12; m++) {
      const sel = (calMode === 'solar' && calViewYear === selectedSolarYear && m === selectedSolarMonth) ||
                  (calMode === 'lunar' && (() => { try { const l=solar2lunar(selectedSolarYear,selectedSolarMonth,selectedSolarDay); return l.year===calViewYear && l.month===m; } catch(e){ return false; } })());
      html += `<div class="cal-month-item${sel?' selected':''}" onclick="calSelectMonth(${m})">${names[m-1]}</div>`;
    }
    html += '</div>';
    body.innerHTML = html;
    return;
  }

  // Days view
  if (calMode === 'solar') {
    renderSolarCalDays();
  } else {
    renderLunarCalDays();
  }
}

function calSelectYear(y) { calViewYear = y; calSelectMode = 'months'; renderCal(); }
function calSelectMonth(m) { calViewMonth = m; calSelectMode = 'days'; renderCal(); }

function renderSolarCalDays() {
  const title = document.getElementById('calTitle');
  const CN_MONTHS = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  title.textContent = `${calViewYear}年 ${CN_MONTHS[calViewMonth-1]}`;

  const firstDay = new Date(calViewYear, calViewMonth - 1, 1).getDay();
  const daysInMonth = new Date(calViewYear, calViewMonth, 0).getDate();
  const daysInPrev = new Date(calViewYear, calViewMonth - 1, 0).getDate();

  let html = `
    <div class="cal-grid">
      <div class="cal-weekdays">
        ${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
  `;

  // Prev month days
  for (let i = firstDay - 1; i >= 0; i--) {
    const d = daysInPrev - i;
    const lunar = solar2lunar(calViewMonth === 1 ? calViewYear-1 : calViewYear, calViewMonth === 1 ? 12 : calViewMonth-1, d);
    html += `<div class="cal-day other-month" onclick="calPickSolar(${calViewMonth===1?calViewYear-1:calViewYear},${calViewMonth===1?12:calViewMonth-1},${d})">
      ${d}<span class="cal-lunar-day">${lunarDayName(lunar.day)}</span></div>`;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const isSelected = calViewYear === selectedSolarYear && calViewMonth === selectedSolarMonth && d === selectedSolarDay;
    let lunar;
    try { lunar = solar2lunar(calViewYear, calViewMonth, d); } catch(e) { lunar = {day:1}; }
    const lunarLabel = lunar.day === 1 ? lunarMonthName(lunar.month, lunar.isLeap) : lunarDayName(lunar.day);
    html += `<div class="cal-day${isSelected?' selected':''}" onclick="calPickSolar(${calViewYear},${calViewMonth},${d})">
      ${d}<span class="cal-lunar-day">${lunarLabel}</span></div>`;
  }

  // Next month fill
  const remaining = 42 - firstDay - daysInMonth;
  for (let d = 1; d <= remaining && remaining < 7; d++) {
    const lunar = solar2lunar(calViewMonth === 12 ? calViewYear+1 : calViewYear, calViewMonth === 12 ? 1 : calViewMonth+1, d);
    html += `<div class="cal-day other-month" onclick="calPickSolar(${calViewMonth===12?calViewYear+1:calViewYear},${calViewMonth===12?1:calViewMonth+1},${d})">
      ${d}<span class="cal-lunar-day">${lunarDayName(lunar.day)}</span></div>`;
  }

  html += '</div></div>';
  document.getElementById('calBody').innerHTML = html;
}

function renderLunarCalDays() {
  const title = document.getElementById('calTitle');
  title.textContent = `${calViewYear}年 ${lunarMonthName(calViewMonth, false)}`;

  const daysInMonth = getLunarMonthDays(calViewYear, calViewMonth);
  // 找本农历月初一对应的公历（用于确定星期）
  const firstSolar = lunar2solar(calViewYear, calViewMonth, 1, false);
  const firstDow = new Date(firstSolar.year, firstSolar.month - 1, firstSolar.day).getDay();

  let html = `
    <div class="cal-grid">
      <div class="cal-weekdays">
        ${['日','一','二','三','四','五','六'].map(d=>`<div class="cal-weekday">${d}</div>`).join('')}
      </div>
      <div class="cal-days">
  `;

  // Empty cells before first day
  for (let i = 0; i < firstDow; i++) {
    html += `<div class="cal-day empty"></div>`;
  }

  // Get current lunar from selected solar
  let selLunar;
  try { selLunar = solar2lunar(selectedSolarYear, selectedSolarMonth, selectedSolarDay); } catch(e) { selLunar = {}; }

  for (let d = 1; d <= daysInMonth; d++) {
    const isSelected = selLunar.year === calViewYear && selLunar.month === calViewMonth && selLunar.day === d;
    const solar = lunar2solar(calViewYear, calViewMonth, d, false);
    html += `<div class="cal-day${isSelected?' selected':''}" onclick="calPickLunar(${calViewYear},${calViewMonth},${d})">
      <span style="font-size:11px;color:var(--text-dim)">${solar.month}/${solar.day}</span>
      <span style="font-size:14px;margin-top:2px">${lunarDayName(d)}</span></div>`;
  }

  html += '</div></div>';
  document.getElementById('calBody').innerHTML = html;
}

function calPickSolar(y, m, d) {
  selectedSolarYear = y; selectedSolarMonth = m; selectedSolarDay = d;
  document.getElementById('solar-year').value = y;
  document.getElementById('solar-month').value = m;
  document.getElementById('solar-day').value = d;
  _dateConfirmed = true;
  // Update calendar view
  calViewYear = y; calViewMonth = m;
  closeCal();
}

function calPickLunar(ly, lm, ld) {
  try {
    const solar = lunar2solar(ly, lm, ld, false);
    calPickSolar(solar.year, solar.month, solar.day);
    // Update lunar fields
    document.getElementById('lunar-year').value = ly;
    document.getElementById('lunar-month').value = lm;
    document.getElementById('lunar-day').value = ld;
  } catch(e) {}
  closeCal();
}

【一·提纲用神】

  归禄格（日禄居时，无官星）：「青云得路，专禄带食伤权掌閫外」，生平不喜官星，喜财运助发；归禄带食伤者主掌兵权外务。「日禄归时刑冲破害，见七杀官星空亡冲刃必死」——归禄格最忌刑冲。

▸ 官杀清浊辨（万金赋 + 子平举要歌核心法则，须于格局定位前先行检验）：
  「官杀混杂当寿夭」——官杀双透而无法制化，主寿元有损，贫贱之命。

  「去官留杀」：命中官杀混杂，以合去或冲去正官而留七杀清格，此后「留杀去官莫逢官」——再逢官星入命则格又杂，凶。

▸ 财格：身强无重劫则成；「财多生官须身健」，身弱财多则财旺生官反克身（财旺生鬼）；正财忌官星（官盗财气）、忌比劫分夺、忌身弱；偏财为众人之财，尤怕比劫分夺，财盛身弱逢官运则双重克身；「财旺生官者，贵少而富多」——财格成局多主富而非贵；「财轻勿经劫地，频见妻灾」。「财要藏，藏则丰厚」——财星入库藏支，积聚内敛，财富深厚；财宜聚不宜露（渊海寸金论）。
▸ 印格：「有官无印非真官，有印无官反成其福」；官印双全最贵；月令得印最紧，时上次之；忌财破印（财伤印主破家离祖）；印绶多而身太旺，须官杀制衡方有用；「印旺官生，必作钧衡之任」——官印并旺主宰执重臣。
▸ 食神格：食神有气胜财官；食神居先七杀居后衣禄丰厚；身强食旺财透为贵格；忌偏印（枭神/倒食）夺食，忌官星（食神不喜官），忌身弱印多；喜财相生，喜身旺，不喜印绶（印能制食）；「食神有气胜财官，只怕伤残前外截」——食神最忌被枭印夺食或刑冲破害。
▸ 七杀格：食神制杀上也，印护杀次之；「元有制伏喜行杀旺运，元无制伏喜行制伏运」；制伏太过亦祸（制伏复行制伏，如灰烬无焰）；身旺合杀（贪合忘杀）为贵；忌财党杀，忌印去食护杀；身强有制为偏官（贵），身弱无制为七杀（凶）。「阳刃入官杀，威震边疆」——刃杀俱全主掌兵权。「煞用食制，不要露财透印」（子平真诠论偏官）——财能转食生煞（财资杀而解去食制），印能去食护煞（印克食神使煞得不制）；七杀格以食制为上，一见财星或印绶并透，则食制之力或被旁路绕过，格局破败；此为七杀食制格最常见的两大败格机制，断七杀格必须先验此二点。
▸ 伤官格：须依五行分类断之——
  「火土伤官」宜伤尽，最忌官星透露，见官祸百端；
  「金水伤官」要见官，见官反为秀气，带煞尤贵；
  「木火伤官」官有旺则可用，喜官星根深；
  「土金伤官」官去返成官，伤官与官互相制衡；
  「水木伤官」财官两见始为欢，须财官俱全方贵。
  通则：伤官务要伤尽（留一点则见官即祸）；身弱伤重须佩印；伤官生财转凶为吉；伤官忌见官（金水除外）；运逢官星而无财印救，祸不可言。
  「腊月伤官喜见官」：丑月（冬末）寒气极重，伤官见官不为祸，反借官星调候，此为特例。
  「伤官见贵者，官高而财足」——伤官佩印见官，反主官高。
  「伤官见官，元有者重，元无者轻」（渊海杂论）——本命原有官星再遇伤官，两者直接相克，伤克之力重；本命原无官星，流年大运方透官，伤官见官之祸相对较轻；断伤官见官祸福轻重须先辨命局有无官星原存。
  「伤官财印俱彰」的解法：身旺者取财为用（用财则去印）；身弱者取印为用（用印则去财）；用财去印、用印去财，方能发福。
▸ 阳刃格：「杀无刃不显，刃无杀不威」，刃杀俱全非常人命；「劫财阳刃有官杀，台阁之臣」——刃杀俱全且有官者主台阁重臣；宜官煞制刃，财印相随尤贵；「命有刃无杀→逢杀旺运反转为福」；「命有刃有杀→岁运再逢刃杀则大祸」；忌财旺（财生杀），忌三合会刃（刃过旺），忌伤食合官。「阳刃用官，透刃不虑；阳刃露煞，透刃无成」（子平真诠论阳刃）——正官能制约阳刃，故命中既用正官制刃，再透阳刃也无妨（官制刃有余力）；但七杀格中阳刃能合住七杀（刃合杀），若再透刃则刃合杀贪合忘克，七杀失去伏制作用，格局无功；断阳刃格关键：官格透刃可贵，煞格透刃则煞功尽失。
▸ 建禄月劫：孤官无辅不贵；须财印相随，或食伤化劫；「归禄带食伤，权掌閫外」——禄格带食伤主外任掌权。「十干背禄，岁时喜见财星；运至比肩，号曰背禄逐马」——建禄格忌大运透出比肩劫财，比肩一现则禄马被夺，由富转贫，此为禄格最忌之运。
▸ 弃命从格（须优先于常规格局判断）：
  弃命从财：日主无根，财星当令，四柱全从财气，须无一点比印方成；「弃命从财须要会财」——须财局成会；「从财忌杀」——从财格见杀则克身变凶。
  弃命从杀：日主无根，七杀当令，全局从杀；「弃命从杀须要会杀」；「从杀喜财」——财生杀旺为美；「命逢根气，命殒无猜」——从格命主忌见日主根气复生，逢则必凶。
  身弱入格：「身弱弃命要无根，官居宰辅」——身弱而从格纯粹者，反主大贵；「主衰身化得其时，位近天廷」——化格得时者同。
  「身弱徒然入格，纵发早亡」——从格或化格若根气稍存（非真从），纵有一时发达，终主早亡。
指出该命成格之处与败格隐患，有救应则说明救应之字。带忌者点明忌在何处。
「格清局正，当为台阁之臣；格局驳杂，居安须虑危」——以格局纯杂定品第大方向。

▸ 相神紧要（子平真诠核心法则）：
  月令用神既定，四柱中必有一字辅成格局者，即为相神——「若君之有相，辅者是也」。如官逢财生则财为相神；煞逢食制则食为相神；财逢食生则食为相神；印逢官煞则官为相神。凡全局格局赖此一字而成立者，均谓之相神。
  「伤用神甚于伤身，伤相甚于伤用」——克伤相神比直接克伤用神更为严重；须于格局判断前优先检查相神是否完好无损。
  「相神无破，贵格已成；相神相伤，立败其格」——相神被合绊、冲破、克伤，整格立刻崩败，即使用神本身尚存亦无济于事。
  相神举例（以此类推）：甲用酉官，以壬印合丁解伤存官→壬印是相神，若壬被戊合，则相神伤，官格立败；甲用子财，以己合煞存财→己是相神，若己被甲合去，则格败；煞格以食神制煞，若印来护煞制去食神→食神（相神）被印所破，制化之功尽失，煞格败坏为凶。有情而化无情之变，根源往往在相神被伤。

▸ 四吉四凶双向辨（子平真诠）：
  「四吉神」（财官印食）用之不当亦能破格：食神带煞格中若透财→财生煞而破食制之局（财能破格）；春木火旺之命若见官→官克日主格局乱（官能破格）；煞格逢食制若透印→印护煞而制去食神（印能破格）；财旺生官格中若露食伤→食伤克官而格杂（食能破格）。
  「四凶神」（煞伤枭刃）施之得宜亦能成格：印绶根轻格中透煞→煞生印有助（煞能成格）；财逢比劫争夺若有伤官→伤官化劫生财（伤能成格）；食神带煞格中遇枭→枭护身以就煞（枭能成格）；财逢七煞格中有阳刃→刃制煞护财（刃能成格）。
  要义：「吉凶喜忌，全在是否合于格局需要，不因神之名称而有分别也」——须以整体格局所需判断每字作用，切勿以表面善恶论喜忌，参苓良药用之失宜亦能伤人。

▸ 三命通会六神篇精要（取用法则补充）：
  「正官佩印不如乘马」——官格日主强旺，财资官（乘财马）比印护官更能使官星显贵发用；身强官旺时，财生官比印护官更直接有力。
  「七煞用财岂宜得禄」——煞格以财生煞后，不可再令日主归禄帝旺，否则日主恃旺与煞相争，两相搏击必凶；煞旺财生，须日主稍弱承受，方成贵格。
  「印逢财而罢职，财逢印以迁官」——印格行财运，财克印使格局破坏，主罢黜降职；财格行印运，若日主身旺，印反能护身制煞，令财格提升，主迁升得贵。
  「一将当关，群邪自服」——格局中若有一字根深力厚、位当其宜，则众忌神皆不能乘势为害；反之，无一力量足以制众忌神，则凶象蜂起难以逐一化解。
  「官居煞地难守其官，煞在官乡岂能变煞」——正官藏居七杀旺地（如午月官宿于煞宫），官气被煞污染，难以守清；七杀入官格（与官同透），煞性不因官气而改变，仍属凶神，混杂则格降。
  「遇比用财缠万贯」——财格逢比劫争夺，若七杀出现制服比劫，则比劫反成护身之用，主大富；七杀与比劫双现时须辨：有食制杀存财→主贵，有杀制比护财→主富。
  「月上有用神得祖宗之力，时上有用神得子孙之力」——月令有用神则根基深厚，幼年早岁即有贵人扶助、祖业可承；时柱有用神则晚景佳，子孙承业，晚年荣达；月令用神胜于时柱用神，先天本命格局更重。

▸ 宝法四诀连锁验证（格局互克的关键检查）：
  「逢官看财」：官格中，财是否在场生官？有财则官格富贵双全；无财则官孤无辅，格降一等。
  「逢财看杀」：财格中，是否有七杀透出？有杀无制则财生杀旺，由富贵之格变贫贱之格；须见食制方解。
  「逢杀看印」：杀格中，是否有印绶化杀？有印则杀化权贵；无印无食则杀克身，凶。
  「逢印看官」：印格中，是否有官星生印？有官则官印相生，格局清贵；无官则印格孤立，清而不贵。
  依上述四诀，对此命格局作一轮复验，补充初步判断的遗漏。

▸ 生克连环链判断（最高层命格诊断）：
  「富贵链」：财→生官→生印→生身，四环俱通且无冲破，富贵双全，格局最高。
  「凶穷链」：比劫/财→党杀→攻身，三环俱动且无食制，凶穷两逼，最下格。
  须识别此命属何种连环结构，以定命格大势。
  「富莫富于纯粹，贫莫贫于战争；贵莫贵于秀实，贱莫贱于反伤」——以此定命格品质总纲。

▸ 去官留杀 vs 去杀留官辨：
  「去杀留官」→论福，官纯则贵；
  「去官留杀」→有威权，以杀化权则贵（须有制/印）；
  二者皆须看哪一方根气更强、更有制化，不可一律以官为贵、以杀为凶。

▸ 合官/合杀的特殊处理：「合官非为贵取」（官被合则以官论贵须重审，合后官星失用则格降）；「合杀莫作凶推」（杀被合则杀化为闲神，凶势大减，甚至转化为「贪合忘杀」之福）。须重新定格，勿沿用合前之判断。

▸ 合而不合辨（子平真诠）：天干之合并非见之即成，须辨「合而有情」与「合而无情」：「隔位之合」——甲己相合，若中间夹有庚辛等字相隔，则甲己情志被阻，合而无力，不可以合论；「太远之合」——年干与时干相隔四字之遥，距离甚远，合力极微，亦不可轻论化合；「有伤之合」——合神旁有刑冲克破，合势被扰，虽合亦不化；「合而有情」——两干紧邻相合（年月、月日、日时），中无间隔，情专力厚，方为真合。判断合是否成立，须先查：①两干是否紧邻？②中间是否有字相隔？③合神是否被冲克？三者俱无障碍，方论真合。

▸ 天战地战精义（滴天髓）：
  「天战」（天干相冲，如甲庚、乙辛、丙壬、丁癸、戊甲等）：天干争斗于表，主变动、不稳；「天战犹可解」——天干有合神在旁可救解，尚可调和。
  「地战」（地支相冲，如子午、寅申、卯酉、辰戌、巳亥）：地支相冲为「地战」，根气受损深重；「地战不可为」——地战伤根，岁运再临冲运主大祸，几无化解之途。
  「天克地冲」（干支双双相制，如庚申克甲寅、壬子克丙午）：「天克地冲者，危在旦夕」——四柱干支同时相克相冲，是命局中最严重的破坏结构，遇岁运天克地冲并临必主大灾或生死关头。须专项检查此命四柱及当前岁运中是否存在天克地冲之组合，若有则明确点出并评估有无化解。
  「上下情协」（天干与地支同气相配，如甲寅、壬子）：干支同党，情投意合，力量倍增，格局纯粹，成格尤速。
  「左右同志」（相邻柱位间干支协同相生）：四柱左右相辅，联手护用神，格局稳固有力。

【三·用神旺衰与喜忌】
以月令、通根、长生帝旺综合断日主旺衰（注意：阳长生有力，阴长生稍弱；逢库为根，不必逢冲；得比肩不如通根）。明确喜用神与忌神。
▸ 通根比劫轻重辨（子平真诠核心法则）：通根重于比劫，根深方为真旺：「得三比肩，不如得一余气」（乙逢辰、丁逢未等余气之根）；「得二比肩，不如得一长生禄刃」（甲逢亥子寅卯之类）；「阳干逢库为有根，阴干逢库为无用」——阳得兼阴（如壬逢辰为水库，有根），阴不能兼阳（如癸逢辰无用，不作通根）；「阴长生不作此论」（如乙逢午，丁逢酉，为阴干长生，稍弱，仍有根但不比阳干长生有力）。推论：评断日主强弱时，须先查地支通根，再计比劫数量，切勿以天干比劫堆叠误判为旺。
特别注意干支有别：天干动而有为（透出即用），地支静以待用（须会合透清方发动）；支中暗藏之神，逢运透干方见其验。

▸ 「四柱元有病，要去病；不去病不发」：指出此命之「病」（忌神）在何处，「药」（克制忌神之字）是否已存于命，若无则需运补。「无伤不贵，有病者奇」——有病有药者反而成就非凡，无忌神则格局平淡。
▸ 格局品质口诀（杂论）：「一格二格，非卿即相；三格四格，财官不纯，非隶卒多是九流」——格局越杂越降品。「入格清奇者富，入格不成者贫」；「源清者其流必远，本浊者所作无成」；「八字超群，不贵则当大富；五行驳杂，居安可不虑危」。
▸ 官杀混杂判断：月令正官而时干透偏官（或反之），则混杂须清；清法：以合去一方（如乙合庚留辛，或丙合辛留庚），或以食伤制杀存官；混而不清者，降格论断。
▸ 倒食（偏印）克食神：如甲见壬克丙食神，主有始无终、财源屡败、福浅寿薄；用食神格或财格者，须先检查是否有偏印克食之字。
▸ 劫财辨：五阳见五阴为败财（克妻害子），五阴见五阳为劫财（破耗、防小人，不克妻）；须区分论断。
▸ 日主强弱总诀：「天元虽旺若无依倚是常人；日主太柔纵遇财官为寒士；身旺无依不迁祖便死外地」；「衰则变官为鬼，旺则化鬼为官」——日主旺衰直接决定官星性质。「日干旺而灾咎寡，财命衰而惆怅多」；「太过宜脱剥，不及喜生扶」。
▸ 五行颠倒旺衰（滴天髓精义，须于格局判断前先验证）：
  「旺之极处是弱，弱之极处是旺」——五行运动循环，过极则反。
  「木旺极者似金，金旺极者似火，火旺极者似水，水旺极者似土，土旺极者似木」——五行极旺而物极必反，旺者虽强，过极则脆折；故极旺之命反应以从旺/从强论，不可再以普通身弱法生扶助之。
  「极旺之命再助旺神→过犹不及，格局反破」——须先辨是否已达从旺/从强格。若可从，则喜克泄（正向反克即为从格之用），不喜同类再生，切勿与普通身弱之命混同。
  「太过宜脱剥，不及喜生扶」——旺命宜食伤泄秀或财官克泄；弱命喜印比生扶；此为旺弱判断最高总则，从格则另论。

▸ 五行生克精义（五行生克赋）：死木宜活水濡；顽金喜火煅；火隔水不能熔金（水多隔绝，金不受克）；金沉水岂能克木（金沉于水，失克木之力）；活木忌埋根之铁（根被金克则折）；水寒不流，木寒不发，土寒不生，火寒不烈，金寒不熔——须调候温养。北金恋水沉形（水多金沉无用）；南木飞灰脱体（火旺木焚失根）；东水旺木以枯源（木盛水缩失生）；西土实金虚己（金多土散）；火因土晦（土多火埋）。五行贵在中和，须以此精义辨别五行质量，而非单以数量多寡论强弱。
▸ 空亡五行辨吉凶（渊海子平六亲篇）：「金空则鸣，火空则发，水空则流，此三者上吉；木空则朽，土空则崩，二者主凶」——同是空亡，五行性质不同，吉凶各异：金空反响显贵，火空旺发，水空流动通畅，三者遇空亡反为吉应；木空则腐朽无根，土空则崩塌失守，此二者遇空亡为真凶。论空亡须先辨五行属性，不可一概以「空亡则无力」断之。
▸ 通关用神（滴天髓精义）：
  「木土而要火，火金而要土，土水而要金，金木而要水，水火而要木」——两行五元对峙互克时，取中间流通之神为通关用神，化战克为生化之局。
  通关条件：通关之神须无合绊（被合住则失通关之力），无刑冲（被冲坏则断绝），且根气须透干或暗会，方能真正引通两方；若命中已有通关神，须其根气深厚，力足制化两端。
  「关内有织女，关外有牛郎，此关若通也，相邀入洞户」——两行对峙如牛郎织女相隔，得通关神引路则两情相合，格局由凶化吉，主名利双收。
  若命中无通关神，则须待岁运逢之，暗冲暗会而通，方见兴发之机；若通关神被合劫，须岁运冲开、合去间神，方能疏通。
▸ 四言独步要诀（格局精要）：月令见禄不住祖屋，一见财官自然发福；财官临库不冲不发；提纲有用最怕刑冲，冲运则缓冲用则凶；「先财后印反成其福，先印后财反成其辱」——财印在柱中出现的先后顺序决定吉凶方向；「印绶根轻旺中显达，印绶根深旺中不发」——印绶深根反碍发达，须细辨。
▸ 生克先后分吉凶（子平真诠精义）：四柱同类字先后位置影响吉凶走向，不可不察。
  「正官格同是财伤并透，先财后伤→财先护官而伤在后，尚有补救；先伤后财→官先受伤破格，财虽在后亦难挽回」。
  「印格同是财印并透，先财印者稍顺晚境；先印后财者，财冲印而晚景亦悴」。
  「食神格财枭并透，先枭后财→枭先夺食，财在后亦无力；先财后枭→食先生财已有成局，枭虽来夺，晚运可亨」。
  「七煞格财食并透，先食后财→食制煞而财在后，仍主大贵；先财后食→财先党煞克身，食在后力已弱」。
  推广原则：凡格局成败，「有时以一字之隔而祸福天渊」——柱中一字相隔使得合绊失效或破坏生克路径，须细察干支位置关系，合而有情还是无情，全在先后与隔位之间。
▸ 外格用舍辨（子平真诠）：月令已有正用神者，不另立外格；「提纲有用提纲重，有官莫寻格局」——月令透出官财印食等有情用神，格局已定；若日时另有归禄、飞天拱禄等外格征象，亦不可喧宾夺主，外格只在月令无用神时权用。

▸ 用神变化（子平真诠）：月令藏干不止一神时，随透干而变格：「变之而善」——辛生寅月，丙透则财生官，以官为格，格局清贵；「变之不善」——壬生寅月，丙透克日主，变格反凶；「变而不失本格」——月令主气未变而他干透出，若本气仍有力，仍以本格为主，他透为辅。用神变化后须重新检验相神、格局成败。

▸ 用神纯杂（子平真诠）：月令两神并透时辨纯杂：「两神相生为纯，相克为杂」。纯者格局完整主贵；杂者格局驳乱主降。举例：辛生寅月甲丙并透——甲木（财）生丙火（官），财官相生为纯，大贵；壬生未月乙己并透——乙木（伤官）克己土（正官），官伤相克为杂，格败。「纯则贵，杂则贱，杂而有救则中等」——相克之杂格若有字合去或制住克者，可论中等。

▸ 格局高低有情无情（子平真诠）：格局贵贱分四层：「有情兼有力」为最高（用神根深且与相神顺而相成）；「有情无力」次之（用神相神情通，然根气虚浮）；「无情有力」再次（力量雄厚但用神与相神相克，格成而无情）；「无情无力」最下（虚浮且相克，格局虚设）。有情=顺而相成（用神与相神互生互护）；无情=用神虽在而相神受克（如官格有财生官，财被合去则无情）；有力=根深透干，地支帮扶；无力=透干无根，遇运即倒。

▸ 杂气取用（辰戌丑未月，子平真诠）：杂气月取用三法：「透干用之」——月令藏干已透天干者，以所透干为格；「会支用之」——他支与月支三合六合成局者，以所会之局为格；「冲动用之」——辰戌相冲、丑未相冲动库，所冲出之干头已透者为格。优劣：透干有根（情专力厚）> 会支成局 > 冲动库神（冲则杂气俱出，须辨所冲何物）。无干透无局会无冲，则以月令本气最旺之藏干为用，属杂气难取，格局较低。

▸ 墓库刑冲辨（子平真诠）：辰戌丑未含官财，冲与不冲须分类论断：「财官属土，冲则发」——官财属土藏于库，冲开墓库则土气出用，主发达；「财官属水，冲则累」——官财属水藏于库，冲动水库反使水气散乱受损，不主发；「干头透出者胜于冲开」——官财已透天干有根，则不必强求冲库，透出力更专；「不可滥求刑冲」——官财根气尚浅时强行冲库，反激浊气伤格，切忌见库便论冲。

▸ 特殊日柱检查（若适用则注明）：
  日贵（丁酉、丁亥、癸巳、癸卯）：忌刑冲破害、空亡；主仁德纯粹；刑冲则贵人生怒反祸。
  日德（甲寅、戊辰、丙辰、庚辰、壬戌）：忌财官、刑冲、魁罡；主慈善福厚；「日德见魁罡，遇刑冲贫寒之士」。
  魁罡（壬辰、庚戌、戊戌、庚辰）：叠见掌大权；忌财官（一见祸至）；「魁罡见财星，总得地禄食之人」。
  金神（癸酉、己巳、乙丑时）：「金神入火逢刃杀，贵而无疑」；喜火制入火乡为贵；忌水乡。

【四·调候参验】
结合生月气候审五行寒燥，以「既济」为贵：
▸ 冬木：冻水不生木，喜火调候；身印两旺透食尤为秀气；透官难必贵。「壬癸路经南域，主健财贵堪图」——水命行南方火运，财贵可期。
▸ 夏木：木火通明，不利见官；伤官佩印其秀百倍；燥土不灵。「甲乙运入西方，身旺功名可许」——木命行西方金运，身旺则功名有望。
▸ 三冬水冷金寒：得火相扶，莫作等闲；壬日午位号「禄马同乡」，癸日巳宫乃「财官双美」。「庚逢水重，水冷金寒喜炎热」——金水寒命，火运为救。
▸ 南方火炎无水：利入北方水运；北方水寒无火：利入南方火运；东方木多：宜西方金运；西方金旺：宜东方木运。
▸ 夏日火土多：得水相济方贵中和（「水火既济」）；「金坚爱水之相涵，文学堪夸」——金水相逢文学显达。「木旺宜火之光辉，秋闱可试」——木旺透食伤化秀，主文采科名。
▸ 金水伤官：见官反为秀气，带煞尤贵；调候须辨是否需丙丁暖金。
▸ 土命夏生火土多：喜水济；冬生水冷：喜火暖。「戊遇酉多，身衰气锐爱荧煌」——戊土被金泄气过旺，需火生土。
是否需调候字？命中有无？若无，说明缺憾及需行何方位运补足。

【五·大运推断（重点）】
取运之法：以运之干支配命中八字逐字审其喜忌。须辨：
① 行干不行支 vs 行支不行干（干动支静，冲年月急、冲日时缓）
  ▸ 「运贵在于支取」：大运吉凶主要看地支（地支静以待用，支气持久10年）；「岁重向乎干求」：流年吉凶主要看天干（天干动而有为，透出即现）。
  ▸ 枭印克食神危局：「年时月令有偏印，大运流年逢食神（寿星），灾殃立至」——偏印在命中潜伏，逢运年透出食神时偏印当场克之，食神既去则财无所生，且枭印乘旺，主贫、夭、或乞化。须专项检查此命是否有偏印伏藏。
② 运逢成格变格：运助用神透干会支则成格，运透忌神出支中伏藏则变格破局。
② 似喜而实忌 / 似忌而实喜（子平真诠精义，大运判断最易误处）：
  「似喜而实忌」——表面看此运五行属喜神，但与本命原有字发生不利互动，反成败局：
  · 官格逢印运，本命有合印之字→印被合住，护官之功失，印运反无用；
  · 印格逢官运，本命已用煞→官与煞混杂，官运反杂乱格局；
  · 财格逢食运，本命食神已过重→再助食伤则身更泄，财运反凶；
  凡此类型，须以本命有无「克制该运之功用」的字来判断，不可仅见喜神便断为美运。
  「似忌而实喜」——表面看此运五行属忌神，但本命已有救应字，反成顺局：
  · 官格逢伤运，本命透印→印制伤，官星安然，伤官运反不破官；
  · 财格行煞运，本命透食→食神制煞，煞不克财，煞运反可发财；
  · 印格逢财运，本命有劫财→劫财护印克财，财运反无害；
  要义：「同此一运，有时为喜，有时为忌，全在本命有无救应字以定之」——论大运须将运干支与八字全盘统看，不可孤立判断运之五行属性。
③ 美运认定标准（依格局）：
   官格：运喜印旺身旺，官轻则助官；忌伤食，忌合官，忌重官。
   财格：财旺生官喜印身旺，忌伤食；财用食生喜财食，忌官印；财带煞喜食伤身旺。
   印格：印用官喜财，印用伤食喜财，印用煞忌财，印遇财喜劫地。
   食神格：食生财重则喜帮身；食用煞印喜印旺忌财；食太旺带印喜财忌印官煞。
   七杀格：元有制伏→喜行杀旺运；元无制伏→喜行制伏运；制伏太过→喜行杀旺补足；食制煞忌印夺食忌财党煞；印护煞喜伤食身旺忌财；煞带官喜制伏清格。「煞用食制，不要露财透印」——财能转食生煞，印能去食护煞，两者皆破食制之局；但须辨「财先食后→财生煞而食以制之」或「印先食后→印制太过之食→格反成贵」：先后位置不同结论逆转，须细察。「食居先，杀居后，功名两全」（渊海五行元理消息赋）——食神在前制杀在后，先以食神驾驭七杀，格局清正有制，主功名双全；与食神格「食神居先七杀居后」互证，先后有序则贵。
   伤官格：伤用财财重则喜印比；佩印喜官煞忌财；兼财印财多喜印，印多喜财；用煞印喜印忌财。
   阳刃：用官喜助官忌伤合；用煞喜助煞，煞重喜身旺印；官煞并出喜制伏。
   建禄月劫：用官喜印财，忌合官忌煞；用财带食喜财食，逢煞无伤，遇官非福；用煞食制喜助食或助煞。

④ 继善篇救克法则（流年大运互动须检验）：
   庚辛克甲乙→须丙丁先见方无危；丙丁被庚辛克→壬癸遇之不畏；戊己遇甲乙→须庚辛制之；壬癸克戊己→须甲乙在场有救；壬克丙→须戊字当头；癸克丁→须己来相制；甲以乙妹妻庚（乙合庚）→凶化吉兆；庚得壬男制丙→夭作长年。
   ▸ 凡流年大运出现上述相克组合，须核查是否有救神在场，有救则减轻，无救则凶必应。

⑤ 群兴论——一生兴衰格局类型判断：
   「当兴」：日主专旺，用神得令不杂，运步步吉，源清流洁，保始终享福。
   「崛起」：用神成格而日主无力，早年偃蹇；待运扶日主，用神得力，忽然勃兴。「根甘裔苦，贾谊屈于长沙；源浊流清，太公兴于渭水」——早年根基好晚年反败，或早年困顿晚年得运，均属此类。
   「聚兴」：日主与杀俱旺，命中无制；待制杀运到，杀化为权，功名显达（出类超群）。
   「中兴/末兴」：早年穷困，中晚年逢财官旺运或制煞运而崛起；「末兴」尤指用神平生无气，至晚运方成。「运行老而得时，优游晚景」——晚运得势者属此。
   依此命格局类型，判断属何种兴衰模式，并指出转折关键运。
   「先强后弱→必先吉后凶；始弱终强→亦始凶终吉」——据此判断此命为顺型还是逆型。

// Click nav button → smooth scroll to that section
function switchTab(name) {
  const el = document.getElementById('tab-' + name);
  if (el) {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

function setNavActive(name) {

  if (btn) btn.classList.add('active');
}

// Scroll sync: observe which section is in view and highlight nav
(function() {
  var observer;
  function initScrollSync() {
    const sections = ['tab-basic', 'tab-dayun', 'tab-ai'];
    const navBtns = {};
    sections.forEach(function(id) {
      navBtns[id] = document.querySelector('.side-nav-btn[data-target="' + id + '"]');
    });

    if (observer) observer.disconnect();
    observer = new IntersectionObserver(function(entries) {
      // Find the topmost visible section
      var best = null, bestY = Infinity;
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          const rect = entry.boundingClientRect;
          if (rect.top < bestY) { bestY = rect.top; best = entry.target.id; }
        }
      });
      if (best) {
        sections.forEach(function(id) {
          if (navBtns[id]) navBtns[id].classList.toggle('active', id === best);
        });
      }
    }, { threshold: 0.15, rootMargin: '-60px 0px -40% 0px' });

    sections.forEach(function(id) {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
  }

  // Re-init when results become visible
  var resultsEl = document.getElementById('results');
  if (resultsEl) {
    var resObs = new MutationObserver(function(muts) {
      muts.forEach(function(m) {
        if (m.type === 'attributes' && m.attributeName === 'style') {
          if (resultsEl.style.display !== 'none') {
            setTimeout(initScrollSync, 100);
          }
        }
      });
    });
    resObs.observe(resultsEl, { attributes: true });
  }
})();

  var inDayun = false;
  var dayunKeys = ['大运', '流年', '运程', '运势'];
  // 去重：防止模型重复输出同一章节
  var seenSections = {};

  for (var ri = 0; ri < lines.length; ri++) {
    var line = lines[ri].trim();
    if (!line) continue;

    var hm = line.match(/^「(.+?)」(.*)$/);  // unused
    var hm2 = line.match(/^【(.+?)】(.*)$/);
    if (hm2) {
      var title = hm2[1];
      if (seenSections[title]) continue;
      seenSections[title] = true;
      inDayun = dayunKeys.some(function(k){ return title.indexOf(k) >= 0; });
      var titleHtml = '<div class="ai-section-title">' + title + '</div>';
      var restHtml = hm2[2].trim() ? (buildItem(hm2[2].trim()) || '') : '';
      if (inDayun) { outDayun += titleHtml + restHtml; }
      else         { outMain  += titleHtml + restHtml; }
      continue;
    }
    var itemHtml = buildItem(line);
    if (!itemHtml) continue;
    if (inDayun) { outDayun += itemHtml; }
    else         { outMain  += itemHtml; }
  }

  el.innerHTML = outMain;

  var dayunEl  = document.getElementById('aiDayunContent');
  var dayunSec = document.getElementById('aiDayunSection');
  if (dayunEl && outDayun) {
    dayunEl.innerHTML = outDayun;
    if (dayunSec) dayunSec.style.display = 'block';
    dayunEl.querySelectorAll('.ai-item.has-yin .ai-guo').forEach(function(g){
      g.addEventListener('click', function(){ g.closest('.ai-item').classList.toggle('open'); });
    });
  }
  el.querySelectorAll('.ai-item.has-yin .ai-guo').forEach(function(guo) {
    guo.addEventListener('click', function() {
      guo.closest('.ai-item').classList.toggle('open');
    });
  });
}

function buildItem(line) {
  // 过滤废话（无实质内容的断语）
  var stripped = line.replace(/[（(][^）)]*[）)]/g, '');
  var uselessPatterns = [
    '没有特别值得注意','没有特别需要注意','没有特别突出',
    '比较平淡，没有','无特殊从化','没有明显特点','没有特别',
    '无需特别','无特别关注'
  ];
  for (var i = 0; i < uselessPatterns.length; i++) {
    if (stripped.indexOf(uselessPatterns[i]) >= 0) return '';
  }

  // 找第一个全角（或半角( — 括号前是黑字结论，括号内到最后一个）是灰字依据
  var idxFull = line.indexOf('\uff08');
  var idxHalf = line.indexOf('(');
  var endFull = line.lastIndexOf('\uff09');
  var endHalf = line.lastIndexOf(')');

  // 选最早出现的开括号
  var idx = -1, end = -1;
  if (idxFull >= 0 && (idxHalf < 0 || idxFull <= idxHalf)) {
    idx = idxFull; end = endFull;
  } else if (idxHalf >= 0) {
    idx = idxHalf; end = endHalf;
  }

  if (idx > 0 && end > idx) {
    // guo = 括号前 + 括号后（尾部补充文字也留在黑字）
    var before = line.slice(0, idx).replace(/[。，、；：\s]+$/, '');
    var after  = line.slice(end + 1).replace(/^[，、；：\s]+/, '');
    var guo = before + (after ? after : '');
    var yin = line.slice(idx + 1, end).trim();
    if (guo && yin) {
      return '<div class="ai-item has-yin">' +
        '<div class="ai-guo"><span class="ai-arrow">&#9658;</span><span>' + guo + '</span></div>' +
        '<div class="ai-yin">' + yin + '</div>' +
        '</div>';
    }
  }
  // 无括号：清理残余括号后直接显示
  var cleaned = line.replace(/[（(][^）)]*[）)]/g, '').replace(/[。，、；\s]+$/, '');
  if (!cleaned) return '';
  return '<div class="ai-item"><div class="ai-guo">' +
    '<span style="display:inline-block;width:16px;flex-shrink:0"></span>' +
    '<span>' + cleaned + '</span></div></div>';
}

</script>
</body>
